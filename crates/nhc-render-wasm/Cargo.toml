# nhc-render-wasm â€” browser-side WASM bundle for the NHC
# rendering pipeline.
#
# A thin wrapper around `nhc-render` (built with
# ``--no-default-features --features wasm``). Every
# ``#[wasm_bindgen]`` export that the JS dispatcher in
# ``nhc/web/static/js/`` consumes lives here; the rendering
# primitives, op handlers, and Painter implementations stay in
# ``nhc-render``.
#
# Build the bundle from the workspace root with:
#
#     wasm-pack build crates/nhc-render-wasm --target web
#
# Native unit tests run on the host arch (no browser needed):
#
#     cargo test -p nhc-render-wasm --lib --release
#
# This crate is the Phase 5.1 deliverable from
# ``plans/nhc_pure_ir_v5_migration_plan.md``. The CanvasPainter
# impl (5.2), ``transform/canvas/`` op dispatcher (5.3), and JS
# dispatcher wiring (5.4) land in subsequent commits.

[package]
name = "nhc-render-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "NHC procedural map rendering â€” browser WASM bundle"
publish = false

[lib]
name = "nhc_render_wasm"
# cdylib: the wasm-pack output. rlib: enables ``cargo test`` to
# link the library so the native unit-test pass exercises the
# Rust logic without needing a wasm runner.
crate-type = ["cdylib", "rlib"]

[dependencies]
nhc-render = { path = "../nhc-render", default-features = false, features = ["wasm"] }
wasm-bindgen = "0.2"
# Routes Rust panics to ``console.error`` with the panic
# message + a JS stack frame. Without this, panics surface as
# the bare ``RuntimeError: unreachable`` from V8 with no hint
# of which assertion / unwrap fired. ~3 KB cost on the wasm
# bundle; the parity gate's PSNR comparison would be
# impossible to debug without it. Phase 5.5's ``-O1`` /
# ``panic = "abort"`` still strip most of std's panic
# infrastructure â€” the hook just keeps the print path alive.
console_error_panic_hook = "0.1"

# ``getrandom`` is a transitive dep (rand â†’ getrandom) that
# refuses to build for ``wasm32-unknown-unknown`` without the
# ``js`` feature, since the wasm runtime has no OS RNG. The
# ``js`` feature routes ``getrandom`` to the browser's
# ``crypto.getRandomValues`` via web-sys. ``web-sys`` carries
# the per-feature gates needed by the Phase 5.3 ``WebCanvasCtx``
# impl. Both deps are wasm32-only â€” host-side ``cargo test``
# builds skip them entirely so the smoke / canvas tests run
# without a browser.
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
web-sys = { version = "0.3", features = [
    "CanvasRenderingContext2d",
    "CanvasWindingRule",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Window",
] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

# Phase 5.5 bundle hygiene. wasm-pack's *bundled* binaryen is too
# old for ``--enable-bulk-memory-opt`` (it failed the production
# --base build), so disable wasm-pack's own wasm-opt and run a
# pinned binaryen wasm-opt explicitly. The canonical flag set +
# invocation live in the repo-root Makefile ``wasm-build`` target
# (single-sourced; the Dockerfile calls the same target). ``-O1``
# is the empirical sweet spot for *gzipped* size on this crate;
# the repo-root profile.release already sets ``opt-level = "z"``,
# ``lto = "fat"``, ``codegen-units = 1``, ``strip = true``, and
# ``panic = "abort"`` so the cargo-side bundle is already lean.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
