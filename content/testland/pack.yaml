# Bundled procedural test setting for overland hexcrawl mode.
#
# See design/overland_hexcrawl.md for the engine design and
# ~/src/nhc_overland_hexcrawl_plan.md for the implementation roadmap.
#
# This pack stays minimal: the entire map is generated from the
# BSP region partitioner (see nhc/hexcrawl/generator.py). Real
# setting content (Blackmarsh) lands in a later phase.

id: testland
version: 2
attribution: "NHC test setting (procedural)"

# Rectangular odd-q staggered silhouette: 25 columns alternating
# between 16-hex (even cols) and 15-hex (odd cols) lengths. Total
# valid hexes = 13*16 + 12*15 = 388. Width is odd so the shape is
# symmetric left-to-right.
#
# The underlying axial bounding box the BSP partitioner sees is
# wider on the r axis (r_offset = (width-1)//2 = 12 extra rows),
# but the generator filters cells to the actual rectangular shape.
map:
  generator: bsp_regions
  width: 25
  height: 16
  num_regions: 24
  region_min: 10
  region_max: 24

# Feature counts scaled for the bigger map: several settlements,
# a fistful of dungeons, a few wonders to make each session feel
# different.
features:
  hub: 1
  village:
    min: 2
    max: 4
  dungeon:
    min: 6
    max: 10
  wonder:
    min: 2
    max: 4

rivers:
  max_rivers: 2
  min_length: 3
  bifurcation_chance: 0.03

paths:
  connect_towers: 0.5
  connect_caves: 0.15
