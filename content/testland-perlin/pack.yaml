# Noise-based variant of the bundled test setting. Exercises
# the perlin_regions generator landed in M-G.4; the default
# testland pack (bsp_regions) stays in place as the baseline.
#
# Same shape and feature targets as content/testland/ -- only
# the generator differs. That keeps biome-count and feature-
# count invariants comparable between BSP and noise output for
# any quick visual A/B check.

id: testland-perlin
version: 2
attribution: "NHC test setting (noise-based)"

map:
  generator: perlin_regions
  width: 25
  height: 16
  # Simplex input-coord multipliers. Smaller = larger
  # continents on the same map. 0.08 / 0.12 tuned by eye for
  # the 25x16 shape; adjust downstream per-pack if desired.
  elevation_scale: 0.08
  moisture_scale: 0.12
  octaves: 4

features:
  hub: 1
  village:
    min: 2
    max: 4
  dungeon:
    min: 6
    max: 10
  wonder:
    min: 2
    max: 4

rivers:
  max_rivers: 2
  min_length: 6
  bifurcation_chance: 0.03

paths:
  connect_towers: 0.6
  connect_caves: 0.2
