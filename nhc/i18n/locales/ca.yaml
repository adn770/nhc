    long: >-
      Un horror no mort que irradia maldat freda.
      El seu tacte drenava la força vital.
  spectre:
    name: "espectre"
    gender: "m"
    short: "una ombra espectral"
    long: >-
      Un fantasma translúcid que plana per sobre del terra.
      La seva mirada et gela fins als ossos.
  basilisk:
    name: "basilisc"
    gender: "m"
    short: "un basilisc"
    long: >-
      Un llangardaix de vuit potes amb ulls brillants.
      No li miris als ulls o et petrificarà.
  kobold:
    name: "kobold"
    plural: "cobolds"
    gender: "m"
    short: "un kobold espavilat"
    long: >-
      Un humanoide minúscul amb morro de gos vestit amb restes de cuir.
      Xiscla i s'atansa amb una fulla rovellada.
  hobgoblin:
    name: "hobgoblin"
    plural: "hobgòblins"
    gender: "m"
    short: "un soldat hobgoblin"
    long: >-
      Un goblinoide gran de pell vermella amb posat militar.
      Es mou en formació disciplinada i combat sense pietat.
  bugbear:
    name: "osgo"
    gender: "m"
    short: "un osgo amenaçant"
    long: >-
      Un goblinoide pelut semblant a un os que es mou amb silenci inquietant.
      Les seves urpes estan tenyides de sang vella.
  ogre:
    name: "ogre"
    gender: "m"
    short: "un ogre colossal"
    long: >-
      Un gegant enorme i ximple que destrossa tot al seu pas.
      Porta un tronc d'arbre com a maça.
  bandit:
    name: "bandoler"
    plural: "bandits"
    gender: "m"
    short: "un bandoler encaputxat"
    long: >-
      Un proscrip humà amb la cara marcada i ulls famèlics.
      Surt de les ombres amb la fulla desembeinada.
  warg:
    name: "uarg"
    gender: "m"
    short: "un gran uarg"
    long: >-
      Un llop enorme de pelatge negre i ulls intel·ligents i cruels.
      Caça acompanyat d'orcs i gruny amb veu gutural.
  wolf:
    name: "llop"
    plural: "llops"
    gender: "m"
    short: "un llop gris"
    long: >-
      Un llop gris i esmaperdut que rodeja cautelosament abans de llançar-se.
      En manada, són veritablement mortals.
  dire_wolf:
    name: "llop terrible"
    gender: "m"
    short: "un llop terrible"
    long: >-
      Un llop de la mida d'un cavall, amb mandíbules que podrien trencar pedra.
      Els seus ulls vermells et fixen amb certesa depredadora.
  giant_bat:
    name: "ratpenat gegant"
    gender: "m"
    short: "un ratpenat gegant"
    long: >-
      Un ratpenat amb una envergadura d'ales més ampla que un home alt.
      S'abat des de la foscor amb un xiscle.
  black_bear:
    name: "os negre"
    gender: "m"
    short: "un os negre"
    long: >-
      Un os compacte però poderós, generalment desconfiat dels humans.
      Acorralat, combat amb ferocitat salvatge.
  brown_bear:
    name: "os bru"
    gender: "m"
    short: "un os bru"
    long: >-
      Un os marró enorme de gairebé dos metres i mig d'alçada.
      El seu rugit fa tremolar les parets de la masmorra.
  frogman:
    name: "granyotic"
    plural: "homes granota"
    gender: "m"
    short: "un guerrer granyotic"
    long: >-
      Un humanoide amb pell verdosa maculada, ulls abombats i
      cames poderoses que el porten per sobre dels obstacles d'un salt.
  lizardman:
    name: "llangardànic"
    gender: "m"
    short: "un llangardànic"
    long: >-
      Un llangardaix bípede amb armadura tosca, escatós i de sang freda.
      Els seus ulls sense parpelles segueixen cada moviment teu.
  fire_beetle:
    name: "escarabat de foc gegant"
    gender: "m"
    short: "un escarabat de foc"
    long: >-
      Un escarabat de la mida d'un gos, amb glàndules taronges brillants al
      tòrax i abdomen que emeten una llum carmesí inquietant.
  amalgamkin:
    name: "gentmalgama"
    gender: "m"
    short: "un gentmalgama"
    long: >-
      Una criatura apedaçada assemblada amb parts animals desiguals.
      Dues caps discuteixen des de quin costat atacar.
  ghoul:
    name: "gul"
    plural: "guls"
    gender: "m"
    short: "un fètid gul"
    long: >-
      Un horror no mort que pesta a tomba. Les seves urpes
      drenen l'espurna vital dels vivents.
  giant_scorpion:
    name: "escorpí gegant"
    plural: "escorpins gegants"
    gender: "m"
    short: "un escorpí gegant"
    long: >-
      Un arácnid de la mida d'un cavall amb pinces massives
      i una cua amb agulló que degota verí potent.
  giant_centipede:
    name: "centpeus gegant"
    plural: "centpeus gegants"
    gender: "m"
    short: "un centpeus gegant"
    long: >-
      Un horror segmentat de seixanta centímetres amb centenars de
      potes i mandíbules verinoses. La seva mossegada és sorprenentment perillosa.
  giant_tarantula:
    name: "taràntula gegant"
    gender: "f"
    short: "una taràntula gegant"
    long: >-
      Una aranya peluda prou gran per atacar un home.
      Els seus ullals injecten un verí lent i agònic.
  snakeman:
    name: "home serp"
    gender: "m"
    short: "un home serp escatós"
    long: >-
      Un humanoide amb cap de cobra i pell verda escatosa.
      Xiula una maledicció abans de colpejar amb precisió.
  stirge:
    name: "estirge"
    gender: "m"
    short: "un estirge xuclasang"
    long: >-
      Un horror amb ales de mosquit i trompa d'agulla.
      Un cop perfora la carn, drena la sang a velocitat aterridora.
  giant_leech:
    name: "sangonera gegant"
    plural: "sangoneres gegants"
    gender: "f"
    short: "una sangonera gegant"
    long: >-
      Un cuc gras i gomós de quasi un metre de llarg. S'agafa
      a la presa i li drena la sang fins a saciar-se o ser abatuda.
  cockatrice:
    name: "cocatriu"
    gender: "f"
    short: "una cocatriu"
    long: >-
      Un drac de dues potes amb cap de gall i cua de serp.
      El seu tacte converteix la carn en pedra freda i grisa.
  ill_omen_bird:
    name: "ocell mal averany"
    gender: "m"
    short: "un ocell mal averany"
    long: >-
      Un corb gegant de plomes negres com la nit i ulls pàl·lids
      que brillen amb malícia sobrenatural. El seu crit glaça la sang.
  tentacle_worm:
    name: "cuc de tentacles"
    gender: "m"
    short: "un cuc de tentacles"
    long: >-
      Un cuc pal·lid i gras envoltat de tentacles que s'agafen.
      Secreta un verí adormir que deixa les preses indefenses.
  winter_wolf:
    name: "llop d'hivern"
    plural: "llops d'hivern"
    gender: "m"
    short: "un llop d'hivern"
    long: >-
      Un gran llop blanc del nord glaçat. Exhala glaç àrtic
      que cobreix els enemics de gel alhora que els mossega salvagement.
  disenchanter:
    name: "desencantador"
    gender: "m"
    short: "un desencantador"
    long: >-
      Un depredador pal·lid i en forma de llimac que s'alimenta
      d'energia màgica. El seu tacte desfà encanteris i deixa els
      pergamins fets pols.
  shrieker:
    name: "cridaner"
    gender: "m"
    short: "un cridaner"
    long: >-
      Un bolet de tapadora violeta que emet un crit ensordidor quan
      és pertorbat, alertant totes les criatures que senten el so.
  giant_snake:
    name: "serp gegant"
    gender: "f"
    short: "una serp gegant"
    long: >-
      Una serp colossal que pot empassar-se un home sencer.
      Els seus ullals buits injecten un verí letal.
  troll:
    name: "trol"
    gender: "m"
    short: "un repugnant trol"
    long: >-
      Un gegant gomós i rampant amb una boca enorme i urpes de ferro negre.
      Les seves ferides es tanquen davant teus — només el foc atura la regeneració.
  mummy:
    name: "mòmia"
    gender: "f"
    short: "una mòmia embolicada"
    long: >-
      Un cadàver desseccat embolcallat en lli groguenc. La simple vista
      inspira paor sobrenatural, i el seu tacte escampa la podridura que
      consumeix lentament els vius.
  gargoyle:
    name: "gàrgola"
    gender: "f"
    short: "una gàrgola de pedra"
    long: >-
      Una estàtua alada que ha après a viure. La pell de pedra deflecteix
      les armes ordinàries — només la màgia pot travessar la seva pell.
  banshee:
    name: "banshee"
    gender: "f"
    short: "una banshee ululant"
    long: >-
      L'esperit d'una dona injuriada en vida, planant amb robes
      fúnebres esqueixades. El seu crit pot aturar un cor en fred.
  mimic:
    name: "mímic"
    gender: "m"
    short: "un cofre del tresor"
    long: >-
      El que prenies per un cofre del tresor s'atança amb una boca
      plena de dents. Les mímesis són caçadors d'emboscada pacients i letals.
  harpy:
    name: "hàrpia"
    gender: "f"
    short: "una hàrpia cantora"
    long: >-
      Una dona alada amb cos de voltor i veu com campanes de plata.
      La seva cançó obliga els oients a caminar cegament cap a les seves
      urpes.
  dryad:
    name: "dríade"
    gender: "f"
    short: "una dríade fascinadora"
    long: >-
      Un esperit del bosc de bellesa immaculada, guardiana d'un arbre
      antic. El seu tacte teixeix un encantament que converteix els
      enemics en servidors voluntaris.
  wyvern:
    name: "víbria"
    gender: "f"
    short: "una víbria letal"
    long: >-
      Un depredador dracònic de dues potes amb una cua amb pues coberta
      de verí. Li manca la màgia d'un drac però ho compensa amb ferocitat.
  wraith:
    name: "aparegut"
    gender: "m"
    short: "un aparegut espectral"
    long: >-
      Un horror incorpori d'ombra i malícia. El seu tacte gelat
      drena la vida dels vivents, deixant només closques fredes.
  rat:
    name: "rata"
    gender: "f"
    short: "una rata"
    long: >-
      Una rata comuna, petita i ràpida. Sola és apenas una molèstia,
      però en eixams poden aclaparar els desprevinguts.
  bat:
    name: "ratpenat"
    gender: "m"
    short: "un ratpenat"
    long: >-
      Un petit ratpenat que vola erràticament pels corredors foscos.
      La seva ecolocalització el guia infaliblement en la foscor total.
  giant_eagle:
    name: "àliga gegant"
    gender: "f"
    short: "una àliga gegant"
    long: >-
      Un raptor magnífic amb una envergadura d'ales de sis metres.
      Es llança des de dalt amb urpes que poden esclafar un crani.
  giant_frog:
    name: "granota gegant"
    gender: "f"
    short: "una granota gegant"
    long: >-
      Un amfibi inflat de la mida d'un poni. La seva llengua enganxosa
      s'allarga per arrossegar les preses a la seva gola cavernosa.
  owlbear:
    name: "os oliba"
    gender: "m"
    short: "un os oliba furiós"
    long: >-
      Un híbrid monstruós de mussol i os, amb un bec ganxut i
      braços aixafadors. Abraça les preses fins a matar-les.
  giant_lizard:
    name: "llangardaix gegant"
    gender: "m"
    short: "un llangardaix gegant"
    long: >-
      Un rèptil massiu amb mandíbules poderoses i una cua pesada.
      Descansa en la calor de la masmorra, esperant que la presa s'acosti.
  werewolf:
    name: "licàntrop llop"
    gender: "m"
    short: "un licàntrop llop"
    long: >-
      Un humà maleït atrapat entre llop i home. Només les armes de
      plata o màgiques poden travessar la seva pell sobrenaturalment dura.
  wererat:
    name: "licàntrop rata"
    gender: "m"
    short: "un licàntrop rata furtiu"
    long: >-
      Una figura prima amb bigotis tremolosos i ulls petits. Canvia
      entre forma humana i de rata, amagant-se en clavegueres i ombres.
  werebear:
    name: "licàntrop os"
    gender: "m"
    short: "un licàntrop os massís"
    long: >-
      Un licàntrop imponent amb la força d'un os. A diferència de la
      majoria de canviaformes, els licàntrops os de vegades protegeixen
      la natura.
  ochre_jelly:
    name: "gelatina ocre"
    gender: "f"
    short: "una gelatina ocre tremolosa"
    long: >-
      Una massa informe de llim ocre que s'escorre per terres i parets.
      Es divideix en còpies més petites quan és colpejada amb armes tallants.
  green_slime:
    name: "llim verd"
    gender: "m"
    short: "una taca de llim verd"
    long: >-
      Una pel·lícula verda brillant enganxada al sostre. Cau sobre
      els desprevinguts, dissolent armadura i carn a velocitat aterridora.
  black_pudding:
    name: "púding negre"
    gender: "m"
    short: "un púding negre"
    long: >-
      El més gran i mortal dels oozes, una massa quitranosa d'àcid que
      dissol les armes metàl·liques al contacte i es divideix en ser colpejat.
  violet_fungus:
    name: "bolet violeta"
    gender: "m"
    short: "un bolet violeta"
    long: >-
      Un creixement semblant a un bolet amb tentacles que es retorcen
      amb podridura necròtica. El seu tacte marceix la carn al contacte.
  yellow_mold:
    name: "fong groc"
    gender: "m"
    short: "una taca de fong groc"
    long: >-
      Un creixement daurat pelut que cobreix les parets. Quan és
      pertorbat allibera un núvol d'espores mortals que ofeguen els pulmons.
  mycelian:
    name: "micèlic"
    gender: "m"
    short: "un micèlic"
    long: >-
      Una criatura fúngica intel·ligent que es comunica mitjançant
      núvols d'espores. Cuida els seus jardins subterranis amb calma.
  carnivorous_flower:
    name: "flor carnívora"
    gender: "f"
    short: "una flor carnívora"
    long: >-
      Una floració massiva amb pètals dentats que es tanquen sobre la
      presa. Un perfum dolç emmascara la pudor de les víctimes digerides.
  dung_worm:
    name: "cuc femer"
    gender: "m"
    short: "un cuc femer"
    long: >-
      Un cuc segmentat que excava entre les deixalles i la terra fluixa.
      Les seves secrecions àcides dissolen la matèria orgànica amb facilitat.
  animated_armor:
    name: "armadura animada"
    gender: "f"
    short: "una armadura animada"
    long: >-
      Una armadura de plaques buida que es mou amb un propòsit inquietant.
      Cap ment hi habita — només la màgia anima la seva closca buida.
  invisible_stalker:
    name: "assetjador invisible"
    gender: "m"
    short: "una tremolor a l'aire"
    long: >-
      Un elemental d'aire lligat a la servitud, permanentment invisible.
      Només la més lleu distorsió a l'aire delata la seva presència.
  centaur:
    name: "centaure"
    gender: "m"
    short: "un centaure"
    long: >-
      Una criatura noble amb el tors d'un humà i el cos d'un cavall.
      Carrega amb la llança baixa a velocitat tremenda.
  dragon_lizard:
    name: "llangardaix drac"
    gender: "m"
    short: "un llangardaix drac"
    long: >-
      Un rèptil gran amb ales vestigials i una gola que brilla amb
      foc interior. Escup raigs de flama a tot el que es mou.
  geckonid:
    name: "llangardaix gecònid"
    gender: "m"
    short: "un llangardaix gecònid"
    long: >-
      Un llangardaix àgil amb coixinets adhesius als peus que li
      permeten córrer per parets i sostres amb velocitat antinatural.
  cave_locust:
    name: "llagosta de cova"
    gender: "f"
    short: "una llagosta de cova gegant"
    long: >-
      Un insecte enorme amb potes posteriors poderoses que el propulsen
      en grans salts. Escup un líquid marró fastigós quan se sent amenaçat.
  insect_swarm:
    name: "eixam d'insectes"
    gender: "m"
    short: "un eixam d'insectes brunzent"
    long: >-
      Un núvol agitat d'insectes que mosseguen i piquen. Els cops
      individuals fan poc — l'eixam s'ha de cremar o fugir-ne.
  mechanical_raven:
    name: "corb mecànic"
    gender: "m"
    short: "un corb mecànic"
    long: >-
      Un ocell de rellotgeria de llautó i engranatges de plata. Els
      seus ulls de vidre registren tot el que veuen per al seu amo distant.
  chaos_spawn:
    name: "desori"
    gender: "m"
    short: "un desori retorçat"
    long: >-
      Una criatura d'entropia pura, la seva forma canviant constantment
      entre estats. La realitat es deforma i es desfà al seu pas caòtic.
  fell_spirit:
    name: "drapat"
    gender: "m"
    short: "un drapat rialler"
    long: >-
      Una petita criatura semblant a un dimoniet amb ales de ratpenat
      i un somriure maliciós. Es delecta en entremaliadures i bromes cruels.
  gray_ooze:
    name: "llot gris"
    gender: "m"
    short: "un llot gris"
    long: >-
      Un bassiot de llim gris viscós que s'assembla a pedra mullada.
      El seu cos àcid dissol el metall al contacte, arruïnant armes i
      armadures.
  merchant:
    name: "mercader"
    gender: "m"
    short: "un mercader itinerant"
    long: >-
      Un comerciant curtit amb un farcell pesant i ulls astuts.
      S'aventura a les profunditats de la masmorra cercant benefici
      i troballes rares.
  innkeeper:
    name: "taverner"
    gender: "m"
    short: "un taverner afable"
    long: >-
      El regent de la taverna del poble. Comercia amb pa calent,
      llits més calents encara, i els rumors que porten les
      caravanes de pas.
  farmer:
    name: "pagès"
    gender: "m"
    short: "un pagès fornit"
    long: >-
      Un camperol fort amb barret de palla, sempre disposat a
      compartir les darreres tafaneries dels hexàgons veïns mentre
      s'arrecera al pal d'un tancat.
  farmhand:
    name: "jornaler"
    gender: "m"
    short: "un jornaler callat"
    long: >-
      Un treballador del camp ajupit entre els solcs, amb els ulls
      a la terra i lluny dels tafaners de pas.
  pilgrim:
    name: "pelegrí"
    gender: "m"
    short: "un pelegrí devot"
    long: >-
      Un viatger amb hàbit gris, el cap inclinat davant el lloc
      sagrat, mormolant una pregària que ha portat per molts camins.
  noble:
    name: "noble"
    gender: "m"
    short: "un noble altiu"
    long: >-
      Senyor terratinent amb roba fina, mira cada visitant per damunt
      del nas. Aquí la cortesia val més que el diner.
  campsite_traveller:
    name: "caminant"
    gender: "m"
    short: "un caminant cansat"
    long: >-
      Un viatger avesat atiant un foc modest. Ha vist desenes de
      camins aquest mes i bescanvia històries per una estona
      d'escalf.
  orchardist:
    name: "hortolà"
    gender: "m"
    short: "un hortolà pacient"
    long: >-
      Un cultivador d'arbres fruiters amb estisores de podar a la
      cintura. Recull més noves del que es pensa dels collidors
      que hi passen.
  priest:
    name: "sacerdot"
    gender: "m"
    short: "un sacerdot encaputxat"
    long: >-
      Un clergue serè amb hàbits blancs, atenent l'altar d'una divinitat
      oblidada. Ofereix curacions, benediccions i aigua beneïda a qui
      pagui el seu delme.
  animated_bones:
    name: "ossos animats"
    gender: "m"
    short: "un munt d'ossos animats"
    long: >-
      Una col·lecció d'ossos mantinguts per necromància esvaint-se.
      Traquetegen i raspen mentre s'arrosseguen cap als vivents.
  adventurer:
    name: "aventurer"
    gender: "m"
    short: "un aventurer company"
    long: >-
      Un explorador experimentat que busca companys per les profunditats
      de la masmorra. Ofereix la seva espasa — pel preu just.
  villager:
    name: "vilatà"
    gender: "m"
    short: "un vilatà del poble"
    long: >-
      Un habitant del poble fent la seva — carregant llenya, portant
      un encàrrec o simplement xerrant a una parada. No et fa gaire
      cas mentre no alteris la pau.
  pickpocket:
    name: "vilatà"
    gender: "m"
    short: "un vilatà del poble"
    long: >-
      Un habitant del poble fent la seva — carregant llenya, portant
      un encàrrec o simplement xerrant a una parada. No et fa gaire
      cas mentre no alteris la pau.
  cultist:
    name: "cultista"
    gender: "m"
    short: "un cultista encaputxat"
    long: >-
      Un fanàtic amb túnica que duu les marques d'un credo prohibit.
      Els seus cants són baixos i la seva daga, ràpida.
  frozen_dead:
    name: "mort glaçat"
    gender: "m"
    short: "un cadàver glaçat"
    long: >-
      Un cadàver conservat sota la gelada profunda, amb la carn
      cobeta de gebre blavós. Avança arrossegant-se amb membres que
      es trenquen com gel esquerdat.
  yeti:
    name: "ieti"
    gender: "m"
    short: "un ieti enorme"
    long: >-
      Un gegant blanc i pelut dels passos alts, amb espatlles
      carregades de gebre. El seu rugit fa caure la neu de cada cornisa.
  cult_leader:
    name: "líder del culte"
    gender: "m"
    short: "un líder del culte"
    long: >-
      Un zelot veterà amb vestidures fosques, una daga
      ensangonada en una mà i un llibre de ritus prohibits
      en l'altra.
  lizardman_chief:
    name: "cap llangardànic"
    gender: "m"
    short: "un cap llangardànic"
    long: >-
      Un guerrer escatós carregat amb trofeus d'os, més gran i
      astut que els seus. El seu xisclet empeny la ventrada
      cap a la frenesí.
  gnoll_chieftain:
    name: "cabdill gnoll"
    gender: "m"
    short: "un cabdill gnoll"
    long: >-
      L'alfa brutal d'una manada de gnolls, cobert de pells i
      trofeus. La seva rialla ressona per les dunes i la manada
      riu amb ell.
  hermit:
    name: "ermità"
    gender: "m"
    short: "un vell ermità"
    long: >-
      Un reclús ancià que fa temps que va canviar la vila per
      una casa tranquil·la al bosc. Et mira amb ulls pacients
      i cansats, i t'ofereix seient vora el foc.
  witch:
    name: "bruixa"
    gender: "f"
    short: "una bruixa de mirada salvatge"
    long: >-
      Una fetillera esparracada que ha fet seva aquesta casa
      abandonada. Els seus murmuris es resolen en paraules de
      lligam; els dits se li mouen cap a un pergamí al cinturó.
  guard:
    name: "guàrdia"
    gender: "m"
    short: "un guàrdia del castell"
    long: >-
      Un guàrdia uniformat que vetlla el pati del castell, llança
      a terra i mirada atenta a qualsevol que no tingui feina aquí.
  quartermaster:
    name: "intendent"
    gender: "m"
    short: "l'intendent del castell"
    long: >-
      L'intendent del castell, que pesa cada nouvingut contra el
      registre de la caseta de guàrdia. Un manat de claus li dringa
      al cinturó.
  commander:
    name: "comandant"
    gender: "m"
    short: "el comandant del castell"
    long: >-
      L'oficial al comandament del castell, amb la capa guarnida
      amb els colors de la guarnició. Un veterà que guanya cada
      ordre que crida plantant-se a la primera línia.
  hermit_priest:
    name: "sacerdot ermità"
    gender: "m"
    short: "un sacerdot ermità"
    long: >-
      Un clergue solitari que cuida d'aquest santuari oblidat.
      El seu llibre de ritus és prim i les seves pregàries
      poques; pot oferir una benedicció, però la curació real
      requereix un temple de veritat.

