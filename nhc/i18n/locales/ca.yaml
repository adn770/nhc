      Augmenta permanentment la teva força.
  potion_frost:
    name: "Poció de Gel"
    gender: "f"
    short: "una poció blau gel"
    long: >-
      Cristalls gelats giren dins del vial. En consumir-la,
      envia una ona de fred glacial cap enfora.
