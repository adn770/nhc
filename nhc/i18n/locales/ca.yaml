# ── Atmosfera de nivell ───────────────────────────────────────────────
atmosphere:
  dungeon:
    "1": "L'aire és dens amb olor de pedra humida i ferro vell."
    "2": "La llum de les torxes tremola contra murs regalimants d'humitat."
    "3": "Ecos llunyans suggereixen que aquestes sales no són del tot buides."
    "4": "Les teranyines s'aferren a cada racó, intactes des de fa segles."
    "5": "El sostre degota sense parar, cada gota un petit batec a la foscor."
    "6": "Cadenes rovellades pengen dels murs, restes de presoners oblidats."
    "7": "Un corrent d'aire fred s'enrosca als teus turmells com dits invisibles."
    "8": "Les lloses estan desgastades per innombrables peus — o urpes."
    "9": "En algun lloc endavant, metall rasca contra pedra."
    "10": "Gravats esvaïts als murs insinuen advertències ignorades fa temps."
    "11": "El silenci aquí és opressiu, trencat només per la teva respiració."
    "12": "Una feble olor de descomposició arriba de més endins."
  crypt:
    "1": "L'aire estancat porta la dolçor de les herbes d'embalsamar."
    "2": "Nínxols als murs contenen les restes engrunadisses dels enterrats."
    "3": "Espelmes consumides crepiten en fornícules, com si algú les encengués fa poc."
    "4": "Partícules de pols floten en la penombra com petites ànimes perdudes."
    "5": "Els sarcòfags de pedra tenen cares esculpides desgastades pel temps."
    "6": "Un gemec baix puja i baixa — el vent, potser, o alguna altra cosa."
    "7": "Estendards funeraris esquinçats pengen del sostre de volta."
    "8": "El terra és granulós amb pols d'os que cruix sota els peus."
    "9": "El fred sura dels murs com si els mateixos morts el respirin."
    "10": "Epitafis en escriptures oblidades cobreixen cada superfície."
    "11": "Un altar al fons encara porta taques fosques."
    "12": "El silenci aquí té pes, pressionant sobre les teves espatlles."
  cave:
    "1": "L'aigua degota d'estalactites cap a basses invisibles a sota."
    "2": "Les parets de la cova brillen amb dipòsits minerals a la llum."
    "3": "Una brisa humida porta l'olor terrosa de la pedra profunda."
    "4": "Fongs bioluminescents projecten un feble resplendor blavós als murs."
    "5": "El passadís s'estreny, la roca pressionant per tots costats."
    "6": "En algun lloc a la foscor, alguna cosa esquitxa en aigua quieta."
    "7": "Cristalls incrustats a la roca capturen la llum i la dispersen."
    "8": "L'aire és més fresc aquí, carregat d'olor d'argila humida."
    "9": "Excrements de ratpenat cruixen sota els peus — no ets el primer visitant."
    "10": "La cova s'obre en una cambra vasta, el sostre perdut en l'ombra."
    "11": "Ecos estranys fan impossible distingir la direcció o la distància."
    "12": "Una boira fina s'afereix al terra, arremolinant-se als teus peus."
  castle:
    "1": "Grans tapissos pengen fets miques, els seus colors esvaïts com fantasmes."
    "2": "Els terres de marbre estan esquerdats però encara brillen feblement."
    "3": "Armadures completes fan de sentinelles silencioses al llarg del corredor."
    "4": "Un llum de sostre jeu trencat al terra, els seus cristalls escampats."
    "5": "Les restes d'un festí es podreixen sobre una llarga taula de banquet."
    "6": "Finestrals alts deixen entrar llum pàl·lida a través de vitralls trencats."
    "7": "Un tron seu buit al fons, cobert de teranyines."
    "8": "Escuts heràldics cobreixen els murs, les seves insígnies ja sense sentit."
    "9": "La catifa és gastada però encara amorteix els teus passos."
    "10": "Un rellotge d'armari al racó s'ha aturat a mitjanit."
    "11": "Els retrats als murs semblen seguir-te amb ulls pintats."
    "12": "L'aire fa olor de cera per a fusta i decadència lenta."
  abyss:
    "1": "La foscor aquí és absoluta — la teva llum amb prou feines l'aguanta."
    "2": "La realitat es percep fina, com si el món pogués esquinçar-se amb un toc."
    "3": "Xiuxiuejos rellisquen al límit de l'oïda, parlant cap llengua coneguda."
    "4": "La pedra pulsa amb una calor feble i irregular."
    "5": "La gravetat es percep errònia, estirant en direccions subtils i canviants."
    "6": "L'aire té gust d'ozó i d'alguna cosa més antiga, alguna cosa malèfica."
    "7": "Formes es mouen a la perifèria de la teva visió, desapareixen quan mires."
    "8": "Els murs són llisos i negres, com obsidiana polida."
    "9": "Una vibració baixa brunzeix pel terra, més sentida que escoltada."
    "10": "Estrelles semblen brillar dins la mateixa roca."
    "11": "La teva ombra es comporta estranyament, endarrerint-se darrere teu."
    "12": "El silenci aquí no és buit — està esperant."

