  end_footer: "Has sobreviscut {turn} torns. Prem qualsevol tecla per sortir."

# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "un goblin grunyidor"
    long: >-
      Una criatura prima de pell verda amb ullals grocs
      i una fulla rovellada.
  skeleton:
    name: "Esquelet"
    short: "un esquelet sorollós"
    long: >-
      Ossos blanquejats mantinguts per màgia fosca,
      empunyant una fulla mellada.
  rat:
    name: "Rata Gegant"
    short: "una rata gegant"
    long: >-
      Una rata sarnosa de la mida d'un gos, amb els ulls
      brillants de fam salvatge.
  orc:
    name: "Orc"
    short: "un orc corpulent"
    long: >-
      Un brut musculós amb ullals i armadura de ferro tosca.
      Gruny agressivament.
  zombie:
    name: "Zombie"
    short: "un zombie arrossegat"
    long: >-
      Un cadàver en descomposició que es nega a restar mort.
      La pudor és aclaparadora.
  gnoll:
    name: "Gnoll"
    short: "un gnoll cap d'hiena"
    long: >-
      Un humanoide corpulent amb cap d'hiena.
      Riu maníacament mentre es prepara per atacar.
  giant_bee:
    name: "Abella Gegant"
    short: "una abella gegant"
    long: >-
      Una abella de la mida d'un gat, amb l'agulló
      degotant verí ambre.
  wight:
    name: "Entitat"
    short: "una pàl·lida entitat"
    long: >-
      Un horror no mort que irradia maldat freda.
      El seu tacte drenava la força vital.
  spectre:
    name: "Espectre"
    short: "una ombra espectral"
    long: >-
      Un fantasma translúcid que plana per sobre del terra.
      La seva mirada et gela fins als ossos.
  basilisk:
    name: "Basilisc"
    short: "un basilisc"
    long: >-
      Un llangardaix de vuit potes amb ulls brillants.
      No li miris als ulls o et petrificarà.
  kobold:
    name: "Kobold"
    short: "un kobold espavilat"
    long: >-
      Un humanoide minúscul amb morro de gos vestit amb restes de cuir.
      Xiscla i s'atansa amb una fulla rovellada.
  hobgoblin:
    name: "Hobgoblin"
    short: "un soldat hobgoblin"
    long: >-
      Un goblinoide gran de pell vermella amb posat militar.
      Es mou en formació disciplinada i combat sense pietat.
  osgo:
    name: "Osgo"
    short: "un osgo amenaçant"
    long: >-
      Un goblinoide pelut semblant a un os que es mou amb silenci inquietant.
      Les seves urpes estan tenyides de sang vella.
  ogre:
    name: "Ogre"
    short: "un ogre colossal"
    long: >-
      Un gegant enorme i ximple que destrossa tot al seu pas.
      Porta un tronc d'arbre com a maça.
  bandoler:
    name: "Bandoler"
    short: "un bandoler encaputxat"
    long: >-
      Un proscrip humà amb la cara marcada i ulls famèlics.
      Surt de les ombres amb la fulla desembeinada.
  uarg:
    name: "Uarg"
    short: "un gran uarg"
    long: >-
      Un llop enorme de pelatge negre i ulls intel·ligents i cruels.
      Caça acompanyat d'orcs i gruny amb veu gutural.
  llop:
    name: "Llop"
    short: "un llop gris"
    long: >-
      Un llop gris i esmaperdut que rodeja cautelosament abans de llançar-se.
      En manada, són veritablement mortals.
  llop_terrible:
    name: "Llop Terrible"
    short: "un llop terrible"
    long: >-
      Un llop de la mida d'un cavall, amb mandíbules que podrien trencar pedra.
      Els seus ulls vermells et fixen amb certesa depredadora.
  ratpenat_gegant:
    name: "Ratpenat Gegant"
    short: "un ratpenat gegant"
    long: >-
      Un ratpenat amb una envergadura d'ales més ampla que un home alt.
      S'abat des de la foscor amb un xiscle.
  os_negre:
    name: "Os Negre"
    short: "un os negre"
    long: >-
      Un os compacte però poderós, generalment desconfiat dels humans.
      Acorralat, combat amb ferocitat salvatge.
  os_bru:
    name: "Os Bru"
    short: "un os bru"
    long: >-
      Un os marró enorme de gairebé dos metres i mig d'alçada.
      El seu rugit fa tremolar les parets de la masmorra.
  granyotic:
    name: "Granyotic"
    short: "un guerrer granyotic"
    long: >-
      Un humanoide amb pell verdosa maculada, ulls abombats i
      cames poderoses que el porten per sobre dels obstacles d'un salt.
  llangardanic:
    name: "Llangardànic"
    short: "un llangardànic"
    long: >-
      Un llangardaix bípede amb armadura tosca, escatós i de sang freda.
      Els seus ulls sense parpelles segueixen cada moviment teu.
  escarabat_foc:
    name: "Escarabat de Foc Gegant"
    short: "un escarabat de foc"
    long: >-
      Un escarabat de la mida d'un gos, amb glàndules taronges brillants al
      tòrax i abdomen que emeten una llum carmesí inquietant.
  gentmalgama:
    name: "Gentmalgama"
    short: "un gentmalgama"
    long: >-
      Una criatura apedaçada assemblada amb parts animals desiguals.
      Dues caps discuteixen des de quin costat atacar.
  gul:
    name: "Gul"
    short: "un fètid gul"
    long: >-
      Un horror no mort que pesta a tomba. Les seves urpes
      drenen l'espurna vital dels vivents.
  escorpi_gegant:
    name: "Escorpí Gegant"
    short: "un escorpí gegant"
    long: >-
      Un arácnid de la mida d'un cavall amb pinces massives
      i una cua amb agulló que degota verí potent.
  centpeus_gegant:
    name: "Centpeus Gegant"
    short: "un centpeus gegant"
    long: >-
      Un horror segmentat de seixanta centímetres amb centenars de
      potes i mandíbules verinoses. La seva mossegada és sorprenentment perillosa.
  tarantula_gegant:
    name: "Taràntula Gegant"
    short: "una taràntula gegant"
    long: >-
      Una aranya peluda prou gran per atacar un home.
      Els seus ullals injecten un verí lent i agònic.
  home_serp:
    name: "Home Serp"
    short: "un home serp escatós"
    long: >-
      Un humanoide amb cap de cobra i pell verda escatosa.
      Xiula una maledicció abans de colpejar amb precisió.
  stirge:
    name: "Estirge"
    short: "un estirge xuclasang"
    long: >-
      Un horror amb ales de mosquit i trompa d'agulla.
      Un cop perfora la carn, drena la sang a velocitat aterridora.
  sangonera_gegant:
    name: "Sangonera Gegant"
    short: "una sangonera gegant"
    long: >-
      Un cuc gras i gomós de quasi un metre de llarg. S'agafa
      a la presa i li drena la sang fins a saciar-se o ser abatuda.
  cocatriu:
    name: "Cocatriu"
    short: "una cocatriu"
    long: >-
      Un drac de dues potes amb cap de gall i cua de serp.
      El seu tacte converteix la carn en pedra freda i grisa.
  ocell_mal_averany:
    name: "Ocell Mal Averany"
    short: "un ocell mal averany"
    long: >-
      Un corb gegant de plomes negres com la nit i ulls pàl·lids
      que brillen amb malícia sobrenatural. El seu crit glaça la sang.
  cuc_tentacles:
    name: "Cuc de Tentacles"
    short: "un cuc de tentacles"
    long: >-
      Un cuc pal·lid i gras envoltat de tentacles que s'agafen.
      Secreta un verí adormir que deixa les preses indefenses.
  llop_hivern:
    name: "Llop d'Hivern"
    short: "un llop d'hivern"
    long: >-
      Un gran llop blanc del nord glaçat. Exhala glaç àrtic
      que cobreix els enemics de gel alhora que els mossega salvagement.
  desencantador:
    name: "Desencantador"
    short: "un desencantador"
    long: >-
      Un depredador pal·lid i en forma de llimac que s'alimenta
      d'energia màgica. El seu tacte desfà encanteris i deixa els
      pergamins fets pols.
  cridaner:
    name: "Cridaner"
    short: "un cridaner"
    long: >-
      Un bolet de tapadora violeta que emet un crit ensordidor quan
      és pertorbat, alertant totes les criatures que senten el so.
  serp_gegant:
    name: "Serp Gegant"
    short: "una serp gegant"
    long: >-
      Una serp colossal que pot empassar-se un home sencer.
      Els seus ullals buits injecten un verí letal.
  troll:
    name: "Trol"
    short: "un repugnant trol"
    long: >-
      Un gegant gomós i rampant amb una boca enorme i urpes de ferro negre.
      Les seves ferides es tanquen davant teus — només el foc atura la regeneració.
  mummy:
    name: "Mòmia"
    short: "una mòmia embolicada"
    long: >-
      Un cadàver desseccat embolcallat en lli groguenc. La simple vista
      inspira paor sobrenatural, i el seu tacte escampa la podridura que
      consumeix lentament els vius.
  gargoyle:
    name: "Gàrgola"
    short: "una gàrgola de pedra"
    long: >-
      Una estàtua alada que ha après a viure. La pell de pedra deflecteix
      les armes ordinàries — només la màgia pot travessar la seva pell.
  banshee:
    name: "Banshee"
    short: "una banshee ululant"
    long: >-
      L'esperit d'una dona injuriada en vida, planant amb robes
      fúnebres esqueixades. El seu crit pot aturar un cor en fred.
  mimic:
    name: "Mímesi"
    short: "un cofre del tresor"
    long: >-
      El que prenies per un cofre del tresor s'atança amb una boca
      plena de dents. Les mímesis són caçadors d'emboscada pacients i letals.
  harpy:
    name: "Hàrpia"
    short: "una hàrpia cantora"
    long: >-
      Una dona alada amb cos de voltor i veu com campanes de plata.
      La seva cançó obliga els oients a caminar cegament cap a les seves
      urpes.
  dryad:
    name: "Dríade"
    short: "una dríade fascinadora"
    long: >-
      Un esperit del bosc de bellesa immaculada, guardiana d'un arbre
      antic. El seu tacte teixeix un encantament que converteix els
      enemics en servidors voluntaris.
  wyvern:
    name: "Víbria"
    short: "una víbria letal"
    long: >-
      Un depredador dracònic de dues potes amb una cua amb pues coberta
      de verí. Li manca la màgia d'un drac però ho compensa amb ferocitat.

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Espasa"
    short: "una espasa d'acer"
    long: >-
      Una fulla ben equilibrada d'acer temperat, gastada però esmolada.
  dagger:
    name: "Daga"
    short: "una daga esmolada"
    long: >-
      Una fulla curta amb empunyadura de cuir.
      Ràpida de treure, ràpida de tallar.
  short_sword:
    name: "Espasa Curta"
    short: "una espasa curta"
    long: >-
      Una fulla compacta preferida pels escaramussers.
      Ideal per a espais reduïts.
  healing_potion:
    name: "Poció de Curació"
    short: "una poció carmesí"
    long: >-
      Un petit vial de vidre ple d'un líquid vermell brillant.
      Fa una lleugera olor de ferro i herbes.
  gold:
    name: "Or"
    short: "un munt de monedes d'or"
    long: >-
      Monedes ennegrides amb un emblema desconegut.
      Encara prou bones per gastar.
  shield:
    name: "Escut"
    short: "un escut de fusta"
    long: >-
      Un escut rodó de fusta reforçat amb bandes de ferro.
      Atorga +1 defensa d'armadura.
  scroll_lightning:
    name: "Pergamí de Llamp"
    short: "un pergamí crepitant"
    long: >-
      Un pergamí inscrit amb símbols arcans.
      Llamps salten entre les lletres.
  scroll_sleep:
    name: "Pergamí de Dormir"
    short: "un pergamí blau pal·lid"
    long: >-
      Tinta violeta somnolenta omple aquest pergamí amb
      sígils en espiral que semblen moure's lentament.
  scroll_magic_missile:
    name: "Pergamí de Projectil Màgic"
    short: "un pergamí lluminós"
    long: >-
      Una notació arcana densa descriu un dard de força
      que vola recte i mai no falla el seu objectiu.
  scroll_hold_person:
    name: "Pergamí de Retenir Persona"
    short: "un pergamí groc"
    long: >-
      Paraules de lligament omplen aquest pergamí.
      Els humanoides que les senten pronunciar queden paralitzats.
  scroll_fireball:
    name: "Pergamí de Bola de Foc"
    short: "un pergamí cremat"
    long: >-
      Calent al tacte i amb olor de sofre. Un diagrama
      mostra una esfera de flama de sis metres de diàmetre.
  scroll_web:
    name: "Pergamí de Teranyina"
    short: "un pergamí enganxós"
    long: >-
      Fils fins estan teixits entre les lletres d'aquest pergamí.
      Omple una sala de teranyines que paralitzen qui les toca.
  scroll_charm_person:
    name: "Pergamí d'Encantar Persona"
    short: "un pergamí rosat"
    long: >-
      Cal·ligrafiat en tinta rosa amb espirals i llunes.
      Les paraules fan que un humanoide et vegi com un amic de confiança.
  scroll_bless:
    name: "Pergamí de Benedicció"
    short: "un pergamí daurat"
    long: >-
      Gravat en or sobre pergamí blanc. Llegir-lo
      omple els aliats de coratge diví i determinació marcial.
  scroll_mirror_image:
    name: "Pergamí d'Imatge en Mirall"
    short: "un pergamí platejat"
    long: >-
      El pergamí reflecteix la teva cara. Llegir-lo
      conjura 1d4 duplicats il·lusoris per confondre els atacants.
  scroll_invisibility:
    name: "Pergamí d'Invisibilitat"
    short: "un pergamí translúcid"
    long: >-
      Pergamí quasi transparent amb paraules visibles sols
      a certs angles. Llegir-lo et torna invisible.
  scroll_haste:
    name: "Pergamí d'Acceleració"
    short: "un pergamí borrós"
    long: >-
      Les lletres semblen moure's mentre llegeixes el pergamí.
      L'acceleració dobla els teus atacs durant 3 torns.
  scroll_cure_wounds:
    name: "Pergamí de Curar Ferides"
    short: "un pergamí verd"
    long: >-
      Escrit en tinta esmeralda tranquil·litzadora. Llegir-lo
      tanca ferides menors i restaura 1d6+1 PV.
  scroll_protection_evil:
    name: "Pergamí de Protecció del Mal"
    short: "un pergamí blau brillant"
    long: >-
      Inscrit amb guàrdies santes i cercles protectors.
      Atorga +1 als salvaments i dificulta les criatures malvades durant 12 torns.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Trampa de Fossa"
    short: "una fossa oculta"
    long: >-
      Les lloses aquí semblen subtilment diferents — més clares,
      com si haguessin estat col·locades més recentment.
