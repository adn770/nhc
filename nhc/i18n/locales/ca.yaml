    name: "Poció de Visió Mental"
    gender: "f"
    short: "una poció porpra arremolinada"
    long: >-
      Vapors porpres ballen dins del vial. Beure-la afina els
      teus sentits per detectar criatures vives a través de les parets.
  potion_paralytic_gas:
