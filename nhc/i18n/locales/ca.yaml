    name: "Perfum"
    gender: "m"
    short: "una ampolla de perfum"
    long: "Una petita ampolla de cristall de perfum fort. Emmascara l'olor."
  pick:
    name: "Pic"
    gender: "m"
    short: "un pic de miner"
    long: "Una eina pesada punxeguda per trencar roca i cavar."
  iron_tongs:
    name: "Pinces de Ferro"
    gender: "f"
    short: "unes pinces de ferro"
    long: "Pinces de mànec llarg per agafar objectes calents o perillosos."
  face_paint:
    name: "Pintura Facial"
    gender: "f"
    short: "un pot de pintura facial"
    long: "Pasta de colors per a disfresses, pintures de guerra o camuflatge."
  quill_and_ink:
    name: "Ploma i Tinta"
    gender: "f"
    short: "una ploma i un pot de tinta"
    long: "Una ploma d'oca i un pot petit de tinta negra."
  pulley:
    name: "Corriola"
    gender: "f"
    short: "una corriola de corda"
    long: "Una petita corriola de fusta per alçar càrregues pesades amb corda."
  tar_pot:
    name: "Pot de Quitrà"
    gender: "m"
    short: "un pot de quitrà"
    long: "Un pot segellat de quitrà espès i negre. Crema ferotgement si s'encén."
  hourglass:
    name: "Rellotge de Sorra"
    gender: "m"
    short: "un rellotge de sorra"
    long: "Un rellotge de sorra amb marc de llautó que mesura una hora."
  soap:
    name: "Sabó"
    gender: "m"
    short: "una pastilla de sabó"
    long: "Una pastilla de sabó de lleixiu aspre. Neteja qualsevol cosa."
  sleeping_bag:
    name: "Sac de Dormir"
    gender: "m"
    short: "un sac de dormir"
    long: "Una manta enrotllada i tela de terra per dormir a l'aire lliure."
  saw:
    name: "Serra"
    gender: "f"
    short: "una serra de mà"
    long: "Una serra de fulla curta per tallar fusta i os."
  bear_trap:
    name: "Trampa d'Os"
    gender: "f"
    short: "una trampa d'os"
    long: "Una trampa de ferro amb mandíbules de molla. Mortal."
  drill:
    name: "Trepant"
    gender: "m"
    short: "un trepant de mà"
    long: "Una eina de punta espiral per foradar fusta i pedra fina."
  net:
    name: "Xarxa"
    gender: "f"
    short: "una xarxa de llançar"
    long: "Una xarxa amb pesos per embolicar criatures."
  whistle:
    name: "Xiulet"
    gender: "m"
    short: "un xiulet de llautó"
    long: "Un xiulet estrident per fer senyals o distreure."
  lamp_oil:
    name: "Oli de Llum"
    gender: "m"
    short: "un flascó d'oli de llum"
    long: "Un flascó d'oli per a llanternes. Crema durant vuit hores."
  ring_mending:
    name: "Anell de Guarició"
    gender: "m"
    short: "un anell de guarició"
    long: "Un anell càlid que polsa suaument. Regenera 1 PV cada 5 torns."
  ring_haste:
    name: "Anell de Celeritat"
    gender: "m"
    short: "un anell de celeritat"
    long: "El temps es difumina al voltant d'aquest anell. Atorga una acció extra."
  ring_detection:
    name: "Anell de Detecció"
    gender: "m"
    short: "un anell de detecció"
    long: "Formigueja prop de coses ocultes. Revela trampes i portes secretes."
  ring_elements:
    name: "Anell dels Elements"
    gender: "m"
    short: "un anell dels elements"
    long: "Centellea amb foc i gel interior. Redueix a la meitat el dany de foc i fred."
  ring_accuracy:
    name: "Anell de Precisió"
    gender: "m"
    short: "un anell de precisió"
    long: "Estabilitza la mà. Atorga +2 a les tirades d'atac cos a cos."
  ring_evasion:
    name: "Anell d'Evasió"
    gender: "m"
    short: "un anell d'evasió"
    long: "Lleuger com una ploma al dit. Atorga +2 a la defensa d'armadura."
  ring_shadows:
    name: "Anell de les Ombres"
    gender: "m"
    short: "un anell de les ombres"
    long: "La foscor s'enganxa al portador. Les criatures et detecten a la meitat de distància."
  ring_protection:
    name: "Anell de Protecció"
    gender: "m"
    short: "un anell de protecció"
    long: "Una protecció feble envolta el portador. Atorga +1 a la defensa d'armadura."
  wand_firebolt:
    name: "Vareta de Bola de Foc"
    gender: "f"
    short: "una vareta de bola de foc"
    long: "Desferma un raig de foc contra un objectiu. 2d6 de dany de foc."
  wand_lightning:
    name: "Vareta de Llamp"
    gender: "f"
    short: "una vareta de llamp"
    long: "Arcs d'electricitat salten cap a l'objectiu. 3d4 de dany."
  wand_teleport:
    name: "Vareta de Teletransport"
    gender: "f"
    short: "una vareta de teletransport"
    long: "Teletransporta l'objectiu a un lloc aleatori del nivell."
  wand_poison:
    name: "Vareta de Verí"
    gender: "f"
    short: "una vareta de verí"
    long: "Injecta verí màgic. 2 de dany per torn durant 5 torns."
  wand_slowness:
    name: "Vareta de Lentitud"
    gender: "f"
    short: "una vareta de lentitud"
    long: "El temps s'arrossega al voltant de l'objectiu. Redueix la velocitat 8 torns."
  wand_disintegrate:
    name: "Vareta de Desintegració"
    gender: "f"
    short: "una vareta de desintegració"
    long: "Un raig perforant d'aniquilació. 3d6 de dany en línia."
  wand_magic_missile:
    name: "Vareta de Projectil Màgic"
    gender: "f"
    short: "una vareta de projectil màgic"
    long: "Un dard de força pura que mai falla. 1d6+1 de dany."
  wand_amok:
    name: "Vareta d'Amok"
    gender: "f"
    short: "una vareta d'amok"
    long: "Porta l'objectiu a un frenesí. Confós durant 6 torns."
  scroll_identify:
    name: "Pergamí d'Identificació"
    gender: "m"
    short: "un pergamí brillant"
    long: "Llegir aquest pergamí revela la veritable natura d'un objecte de l'inventari."
  scroll_lightning:
    name: "Pergamí de Llamp"
    gender: "m"
    short: "un pergamí crepitant"
    long: >-
      Un pergamí inscrit amb símbols arcans.
      Llamps salten entre les lletres.
  scroll_sleep:
    name: "Pergamí de Dormir"
    gender: "m"
    short: "un pergamí blau pal·lid"
    long: >-
      Tinta violeta somnolenta omple aquest pergamí amb
      sígils en espiral que semblen moure's lentament.
  scroll_magic_missile:
    name: "Pergamí de Projectil Màgic"
    gender: "m"
    short: "un pergamí lluminós"
    long: >-
      Una notació arcana densa descriu un dard de força
      que vola recte i mai no falla el seu objectiu.
  scroll_hold_person:
    name: "Pergamí de Retenir Persona"
    gender: "m"
    short: "un pergamí groc"
    long: >-
      Paraules de lligament omplen aquest pergamí.
      Els humanoides que les senten pronunciar queden paralitzats.
  scroll_fireball:
    name: "Pergamí de Bola de Foc"
    gender: "m"
    short: "un pergamí cremat"
    long: >-
      Calent al tacte i amb olor de sofre. Un diagrama
      mostra una esfera de flama de sis metres de diàmetre.
  scroll_web:
    name: "Pergamí de Teranyina"
    gender: "m"
    short: "un pergamí enganxós"
    long: >-
      Fils fins estan teixits entre les lletres d'aquest pergamí.
      Omple una sala de teranyines que paralitzen qui les toca.
  scroll_charm_person:
    name: "Pergamí d'Encantar Persona"
    gender: "m"
    short: "un pergamí rosat"
    long: >-
      Cal·ligrafiat en tinta rosa amb espirals i llunes.
      Les paraules fan que un humanoide et vegi com un amic de confiança.
  scroll_bless:
    name: "Pergamí de Benedicció"
    gender: "m"
    short: "un pergamí daurat"
    long: >-
      Gravat en or sobre pergamí blanc. Llegir-lo
      omple els aliats de coratge diví i determinació marcial.
  scroll_mirror_image:
    name: "Pergamí d'Imatge en Mirall"
    gender: "m"
    short: "un pergamí platejat"
    long: >-
      El pergamí reflecteix la teva cara. Llegir-lo
      conjura 1d4 duplicats il·lusoris per confondre els atacants.
  scroll_invisibility:
    name: "Pergamí d'Invisibilitat"
    gender: "m"
    short: "un pergamí translúcid"
    long: >-
      Pergamí quasi transparent amb paraules visibles sols
      a certs angles. Llegir-lo et torna invisible.
  scroll_haste:
    name: "Pergamí d'Acceleració"
    gender: "m"
    short: "un pergamí borrós"
    long: >-
      Les lletres semblen moure's mentre llegeixes el pergamí.
      L'acceleració dobla els teus atacs durant 3 torns.
  scroll_cure_wounds:
    name: "Pergamí de Curar Ferides"
    gender: "m"
    short: "un pergamí verd"
    long: >-
      Escrit en tinta esmeralda tranquil·litzadora. Llegir-lo
      tanca ferides menors i restaura 1d6+1 PV.
  scroll_protection_evil:
    name: "Pergamí de Protecció del Mal"
    gender: "m"
    short: "un pergamí blau brillant"
    long: >-
      Inscrit amb guàrdies santes i cercles protectors.
      Atorga +1 als salvaments i dificulta les criatures malvades durant 12 torns.
  scroll_detect_magic:
    name: "Pergamí de Detectar Màgia"
    gender: "m"
    short: "un pergamí cian brillant"
    long: >-
      Runes polsen suaument en aquest pergamí. Llegir-lo revela
      tots els objectes màgics del nivell actual.
  scroll_detect_evil:
    name: "Pergamí de Detectar el Mal"
    gender: "m"
    short: "un pergamí pàl·lid amb runes fosques"
    long: >-
      Inscrit amb sígils vermells sang que semblen retorçar-se. Llegir-lo
      revela les criatures hostils fins i tot a través de les parets.
  scroll_detect_invisibility:
    name: "Pergamí de Detectar Invisibilitat"
    gender: "m"
    short: "un pergamí centellejant"
    long: >-
      El pergamí alterna entre visible i translúcid. Llegir-lo
      atorga visió de criatures invisibles durant 12 torns.
  scroll_find_traps:
    name: "Pergamí de Trobar Trampes"
    gender: "m"
    short: "un pergamí groc cautelós"
    long: >-
      Diagrames geomètrics omplen aquest pergamí. Llegir-lo revela
      totes les trampes ocultes del nivell actual.
  scroll_light:
    name: "Pergamí de Llum"
    gender: "m"
    short: "un pergamí radiant"
    long: >-
      Llum daurada càlida surt d'entre les vores enrotllades. Llegir-lo
      banya l'àrea de llum brillant durant 20 torns.
  scroll_remove_fear:
    name: "Pergamí de Treure Por"
    gender: "m"
    short: "un pergamí blanc tranquil"
    long: >-
      Paraules reconfortants de coratge omplen aquest pergamí. Llegir-lo
      dissipa la paràlisi i la por de la teva ment.
  scroll_shield:
    name: "Pergamí d'Escut Màgic"
    gender: "m"
    short: "un pergamí reforçat"
    long: >-
      Un diagrama de barrera centellejant cobreix aquest pergamí. Llegir-lo
      conjura un escut màgic que atorga +2 CA durant 8 torns.
  scroll_resist_cold:
    name: "Pergamí de Resistir Fred"
    gender: "m"
    short: "un pergamí voreiat de gel"
    long: >-
      Cristalls de gel es formen al llarg de les vores del pergamí.
      Llegir-lo redueix a la meitat tot el dany de fred durant 12 torns.
  scroll_resist_fire:
    name: "Pergamí de Resistir Foc"
    gender: "m"
    short: "un pergamí resistent a la calor"
    long: >-
      El pergamí és calent al tacte però mai no crema. Llegir-lo
      redueix a la meitat tot el dany de foc durant 12 torns.
  scroll_levitate:
    name: "Pergamí de Levitar"
    gender: "m"
    short: "un pergamí sense pes"
    long: >-
      Aquest pergamí flota amunt si el deixes anar. Llegir-lo et
      permet flotar sobre el terra, evitant trampes durant 12 torns.
  scroll_fly:
    name: "Pergamí de Volar"
    gender: "m"
    short: "un pergamí bufat pel vent"
    long: >-
      Tinta lleugera com una ploma traça patrons d'ales. Llegir-lo
      atorga vol lliure durant 6 torns.
  scroll_dispel_magic:
    name: "Pergamí de Dissipar Màgia"
    gender: "m"
    short: "un pergamí anul·lador"
    long: >-
      Sígils antimàgia cobreixen cada centímetre del pergamí. Llegir-lo
      elimina tots els efectes màgics de les criatures properes.
  scroll_protection_missiles:
    name: "Pergamí de Protecció de Projectils"
    gender: "m"
    short: "un pergamí blau protegit"
    long: >-
      Cercles protectors concèntrics cobreixen aquest pergamí. Llegir-lo
      desvia tots els atacs a distància durant 12 torns.
  scroll_silence:
    name: "Pergamí de Silenci"
    gender: "m"
    short: "un pergamí gris mut"
    long: >-
      Cap so surt quan fulleges aquest pergamí. Llegir-lo
      crea una zona de silenci absolut durant 12 torns.
  scroll_phantasmal_force:
    name: "Pergamí de Força Fantasmal"
    gender: "m"
    short: "un pergamí arremolinat"
    long: >-
      Formes il·lusòries ballen sobre el pergamí. Llegir-lo omple
      la ment dels enemics amb al·lucinacions aterridores.
  scroll_clairvoyance:
    name: "Pergamí de Clarividència"
    gender: "m"
    short: "un pergamí de visió llunyana"
    long: >-
      Un ull diminut està dibuixat al centre del pergamí. Llegir-lo
      revela la disposició de l'àrea circumdant.
  scroll_infravision:
    name: "Pergamí d'Infravisió"
    gender: "m"
    short: "un pergamí vermell fosc"
    long: >-
      Escrit amb tinta visible només en la foscor. Llegir-lo atorga
      la capacitat de veure signatures de calor durant 20 torns.
  scroll_continual_light:
    name: "Pergamí de Llum Contínua"
    gender: "m"
    short: "un pergamí llampant"
    long: >-
      Text blanc encegador sobre pergamí daurat. Llegir-lo crea
      una font de llum permanent que mai no s'esvaeix.
  scroll_water_breathing:
    name: "Pergamí de Respirar sota l'Aigua"
    gender: "m"
    short: "un pergamí humit"
    long: >-
      La tinta centellea com l'aigua. Llegir-lo atorga la capacitat
      de respirar sota l'aigua durant 20 torns.
  scroll_charm_snakes:
    name: "Pergamí d'Encantar Serps"
    gender: "m"
    short: "un pergamí serpentejant"
    long: >-
      Patrons sinuosos es cargolen pel pergamí. Llegir-lo
      pacifica totes les criatures de tipus serp properes.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Trampa de Fossa"
    short: "una fossa oculta"
    long: "Les lloses aquí semblen subtilment diferents — més clares, com si haguessin estat col·locades més recentment."
  trap_fire:
    name: "Trampa de Foc"
    short: "una trampa de foc"
    long: "Marques de cremada a la pedra delaten sortidors de flama ocults."
  trap_poison:
    name: "Trampa de Verí"
    short: "una trampa de verí"
    long: "Forats diminuts a la paret amaguen dards prims com agulles, untats amb verí."
  trap_paralysis:
    name: "Trampa de Paràlisi"
    short: "una trampa de paràlisi"
    long: "Una olor química tènue persisteix — una trampa de gas que congela els músculs."
  trap_alarm:
    name: "Trampa d'Alarma"
    short: "una trampa d'alarma"
    long: "Un fil prim connecta amb un mecanisme xisclador a la paret."
  trap_teleport:
    name: "Trampa de Teleportació"
    short: "una trampa de teleportació"
    long: "Runes arcanes brillen tènuement al terra, formant un cercle de teleportació."
  trap_summoning:
    name: "Trampa d'Invocació"
    short: "una trampa d'invocació"
    long: "Un pentagram és gravat a la pedra, preparat per conjurar criatures."
  trap_gripping:
    name: "Trampa de Mandíbules"
    short: "una trampa de mandíbules"
    long: "Mandíbules de ferro jauen ocultes sota una fina capa de pols i pedra."
  trap_arrow:
    name: "Trampa de Fletxa"
    short: "una trampa de fletxa"
    long: "Una escletxa diminuta a la paret amaga un mecanisme de ballesta carregada."
  trap_darts:
    name: "Trampa de Dards"
    short: "una trampa de dards"
    long: "Tres forats de sarbatana estan astutament dissimulats a la pedra."
  trap_falling_stone:
    name: "Trampa de Pedra"
    short: "una trampa de pedra"
    long: "Una esquerda al sostre marca on una pedra pesada contrapesada espera per caure."
  trap_spores:
    name: "Trampa d'Espores"
    short: "una trampa d'espores"
    long: "Beines fúngiques seques nien entre les lloses, a punt d'esclatar."
