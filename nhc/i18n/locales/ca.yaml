  hold_no_humanoids: "No hi ha humanoides a la vista."
  fireball_cast: "Una bola de foc rugent explota!"
  fireball_hits: "{target} és calcinat per {damage} de dany!"
  web_cast: "Teranyines enganxoses sorgeixen del pergamí!"
  web_caught: "{target} queda atrapat en les teranyines!"
  charm_cast: "Paraules de glamur embriaguen els teus enemics..."
