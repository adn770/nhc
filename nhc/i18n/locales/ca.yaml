# NHC Catalan locale — traducció al català
# Les claus utilitzen notació amb punts: secció.subsecció.clau
# Utilitzar {nom} per a marcadors d'interpolació

# ── Combat ────────────────────────────────────────────────────────────
combat:
  hit: "{attacker} colpeja {target} per {damage} de dany."
  miss: "{attacker} falla {target}."
  slain: "{target} ha estat abatut!"
  destroyed: "{target} ha estat destruït!"
  drops: "{target} deixa caure: {items}."
  unarmed: "desarmat"
  drained: "{attacker} drena la vida de {target}! PV màxims reduïts."
  poisoned: "{target} ha estat enverrinat!"
  poison_tick: "{target} es retorç d'agonia pel verí! {damage} de dany."
  petrified: "{target} mira als ulls del basilisc i es converteix en pedra!"
  petrify_saved: "{target} aparta la vista just a temps."
  paralyzed_turn: "Estàs paralitzat i no pots moure't!"
  sleeping_turn: "Dormes indefens..."
  miss_invisible: "{target} és invisible — el teu cop no troba res!"
  mirror_absorbed: "El teu cop impacta una imatge de {target} — es trenca! ({remaining} queden)"
  blood_drain: "{attacker} s'agafa a {target} i li drena la sang! ({damage} de drenatge)"
  petrify_touch: "{target} sent un fred de pedra que li recorre el cos — paralitzat!"
  frost_breath: "{attacker} exhala un buf de fred àrtic sobre {target} per {damage} de dany!"
  disenchant: "{attacker} drena la màgia de {item} de {target}! Es desintegra en pols."
  shrieker_shriek: "El {creature} emet un crit estrident!"
  shriek_wakes: "{creature} es desperta sobresaltat pel soroll terrible!"
  regenerates: "{creature} regenera la carn davant dels teus ulls!"
  rot_drain: "{target} sent la podridura de la mòmia debilitar el seu cos! PV màxims reduïts."
  charm_touch: "{target} cau sota un encantament màgic!"
  mummy_rot: "{target} sent el terror de la podridura de la mòmia apoderar-se d'ell!"
  magic_weapon_needed: "La teva arma llisca sobre {target} — només la màgia pot fer-li mal!"
  banshee_wail: "{creature} emet un udol que esquinça l'ànima!"
  banshee_kills: "{target} sucumbeix a l'udol de la banshee!"
  banshee_saved: "{target} resisteix l'udol de la banshee!"

