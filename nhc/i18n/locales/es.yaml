# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "un goblin gruñón"
    long: >-
      Una criatura delgada de piel verde con colmillos amarillentos
      y una hoja oxidada.
  skeleton:
    name: "Esqueleto"
    short: "un esqueleto ruidoso"
    long: >-
      Huesos blanqueados sostenidos por magia oscura,
      empuñando una hoja mellada.
  giant_rat:
    name: "Rata Gigante"
    short: "una rata gigante"
    long: >-
      Una rata sarnosa del tamaño de un perro, con ojos
      brillantes de hambre salvaje.
  orc:
    name: "Orco"
    short: "un orco corpulento"
    long: >-
      Un bruto musculoso con colmillos y armadura de hierro tosca.
      Gruñe agresivamente.
  zombie:
    name: "Zombi"
    short: "un zombi tambaleante"
    long: >-
      Un cadáver en descomposición que se niega a quedarse muerto.
      El hedor es abrumador.
  gnoll:
    name: "Gnoll"
    short: "un gnoll con cabeza de hiena"
    long: >-
      Un humanoide corpulento con cabeza de hiena.
      Ríe maniacamente mientras se prepara para atacar.
  giant_bee:
    name: "Abeja Gigante"
    short: "una abeja gigante"
    long: >-
      Una abeja del tamaño de un gato, con el aguijón
      goteando veneno ámbar.
  wight:
    name: "Aparecido"
    short: "un pálido aparecido"
    long: >-
      Un horror no muerto que irradia malicia fría.
      Su toque drena la propia fuerza vital.
  spectre:
    name: "Espectro"
    short: "una sombra espectral"
    long: >-
      Un fantasma translúcido que flota sobre el suelo.
      Su mirada te hiela hasta los huesos.
  basilisk:
    name: "Basilisco"
    short: "un basilisco"
    long: >-
      Un lagarto de ocho patas con ojos brillantes.
      No le mires a los ojos o te petrificará.
  kobold:
    name: "Kobold"
    short: "un kobold peleón"
    long: >-
      Un humanoide diminuto con hocico de perro vestido con retazos de cuero.
      Chilla y se lanza con una hoja oxidada.
  hobgoblin:
    name: "Hobgoblin"
    short: "un soldado hobgoblin"
    long: >-
      Un goblinoide grande de piel rojiza con porte militar.
      Se mueve en formación disciplinada y combate sin piedad.
  osgo:
    name: "Bugbear"
    short: "un imponente bugbear"
    long: >-
      Un goblinoide peludo parecido a un oso que se mueve con inquietante
      silencio. Sus garras están teñidas de sangre vieja.
  ogre:
    name: "Ogro"
    short: "un ogro colosal"
    long: >-
      Un gigante enorme y torpe que aplasta todo a su paso.
      Porta un tronco de árbol como maza.
  bandoler:
    name: "Bandido"
    short: "un bandido encapuchado"
    long: >-
      Un proscrito humano con cara marcada y ojos hambrientos.
      Sale de las sombras con la hoja desenvainada.
  uarg:
    name: "Warg"
    short: "un gran warg"
    long: >-
      Un enorme lobo de pelaje negro y ojos inteligentes y crueles.
      Caza junto a orcos y gruñe con voz gutural.
  llop:
    name: "Lobo"
    short: "un lobo gris"
    long: >-
      Un lobo gris y ágil que rodea cautelosamente antes de lanzarse.
      En manada son verdaderamente letales.
  llop_terrible:
    name: "Lobo Terrible"
    short: "un lobo terrible"
    long: >-
      Un lobo del tamaño de un caballo, con mandíbulas capaces de
      triturar piedra. Sus ojos rojos te fijan con certeza depredadora.
  ratpenat_gegant:
    name: "Murciélago Gigante"
    short: "un murciélago gigante"
    long: >-
      Un murciélago con una envergadura de alas más ancha que un hombre alto.
      Se abalanza desde la oscuridad con un chillido.
  os_negre:
    name: "Oso Negro"
    short: "un oso negro"
    long: >-
      Un oso compacto pero poderoso, generalmente desconfiado con los humanos.
      Acorralado, combate con salvaje ferocidad.
  os_bru:
    name: "Oso Pardo"
    short: "un oso pardo"
    long: >-
      Un enorme oso pardo de casi dos metros y medio de altura.
      Su rugido hace temblar las paredes de la mazmorra.
  granyotic:
    name: "Hombre Rana"
    short: "un guerrero hombre rana"
    long: >-
      Un humanoide con piel verde moteada, ojos saltones y
      piernas poderosas que lo llevan sobre obstáculos de un salto.
  llangardanic:
    name: "Hombre Lagarto"
    short: "un hombre lagarto"
    long: >-
      Un lagarto bípedo con armadura tosca, escamoso y de sangre fría.
      Sus ojos sin párpados siguen cada uno de tus movimientos.
  escarabat_foc:
    name: "Escarabajo de Fuego Gigante"
    short: "un escarabajo de fuego"
    long: >-
      Un escarabajo del tamaño de un perro, con glándulas naranjas brillantes
      en el tórax y abdomen que emiten una siniestra luz carmesí.
  gentmalgama:
    name: "Quimérico"
    short: "un quimérico"
    long: >-
      Una criatura ensamblada con partes animales dispares.
      Dos cabezas discuten desde qué lado atacar.
  gul:
    name: "Gul"
    short: "un fétido gul"
    long: >-
      Un horror no muerto que apesta a tumba. Sus garras
      drenan la chispa vital de los vivos.
  escorpi_gegant:
    name: "Escorpión Gigante"
    short: "un escorpión gigante"
    long: >-
      Un arácnido del tamaño de un caballo con enormes pinzas y
      una cola con aguijón chorreando potente veneno.
  centpeus_gegant:
    name: "Ciempiés Gigante"
    short: "un ciempiés gigante"
    long: >-
      Un horror segmentado de sesenta centímetros con cientos de
      patas y mandíbulas venenosas. Su mordisco es sorprendentemente peligroso.
  tarantula_gegant:
    name: "Tarántula Gigante"
    short: "una tarántula gigante"
    long: >-
      Una araña peluda lo suficientemente grande para atacar a un hombre.
      Sus colmillos inyectan un veneno lento y agónico.
  home_serp:
    name: "Hombre Serpiente"
    short: "un escamoso hombre serpiente"
    long: >-
      Un humanoide con cabeza de cobra y piel verde escamosa.
      Silba una maldición antes de golpear con precisión.
  stirge:
    name: "Estirge"
    short: "un estirge chupasingre"
    long: >-
      Un horror con alas de mosquito y trompa de aguja.
      Una vez perfora la carne, drena la sangre a velocidad aterradora.
  sangonera_gegant:
    name: "Sanguijuela Gigante"
    short: "una sanguijuela gigante"
    long: >-
      Un gusano gordo y gomoso de casi un metro de largo. Se aferra
      a su presa y le drena la sangre hasta saciarse o morir.
  cocatriu:
    name: "Cocatriz"
    short: "una cocatriz"
    long: >-
      Un dragón de dos patas con cabeza de gallo y cola de serpiente.
      Su toque convierte la carne en piedra fría y gris.
  ocell_mal_averany:
    name: "Pájaro de Mal Agüero"
    short: "un pájaro de mal agüero"
    long: >-
      Un cuervo gigante de plumas negras como la noche y ojos pálidos
      que brillan con malicia sobrenatural. Su grito hiela la sangre.
  cuc_tentacles:
    name: "Gusano de Tentáculos"
    short: "un gusano de tentáculos"
    long: >-
      Un gusano pálido y gordo rodeado de tentáculos que agarran.
      Segrega un veneno adormecedor que deja a las presas indefensas.
  llop_hivern:
    name: "Lobo de Invierno"
    short: "un lobo de invierno"
    long: >-
      Un gran lobo blanco del norte helado. Exhala hielo ártico
      que cubre a los enemigos mientras los muerde salvajemente.
  desencantador:
    name: "Desencantador"
    short: "un desencantador"
    long: >-
      Un depredador pálido con forma de babosa que se alimenta
      de energía mágica. Su toque deshace encantamientos y deja
      los pergaminos hechos polvo.
  cridaner:
    name: "Chillador"
    short: "un chillador"
    long: >-
      Un hongo de sombrero violeta que emite un chillido ensordecedor
      cuando es perturbado, alertando a todas las criaturas del área.
  serp_gegant:
    name: "Serpiente Gigante"
    short: "una serpiente gigante"
    long: >-
      Una serpiente colosal capaz de tragarse a un hombre entero.
      Sus colmillos huecos inyectan un veneno letal.
  troll:
    name: "Trol"
    short: "un repugnante trol"
    long: >-
      Un gigante gomoso y desgarbado con una boca enorme y garras de
      hierro negro. Sus heridas se cierran ante tus ojos — solo el
      fuego detiene su regeneración.
  mummy:
    name: "Momia"
    short: "una momia vendada"
    long: >-
      Un cadáver disecado envuelto en lino amarillento. La simple vista
      inspira un pavor sobrenatural, y su toque esparce la podredumbre
      que consume lentamente a los vivos.
  gargoyle:
    name: "Gárgola"
    short: "una gárgola de piedra"
    long: >-
      Una estatua alada que ha aprendido a vivir. La piel de piedra
      desvía las armas ordinarias — solo la magia puede atravesar
      su piel.
  banshee:
    name: "Banshee"
    short: "una banshee aulladora"
    long: >-
      El espíritu de una mujer agraviada en vida, flotando con
      ropas fúnebres rasgadas. Su grito puede detener un corazón.
  mimic:
    name: "Mímico"
    short: "un cofre del tesoro"
    long: >-
      Lo que tomaste por un cofre del tesoro se abalanza con una boca
      llena de dientes. Los mímicos son cazadores de emboscada
      pacientes y letales.
  harpy:
    name: "Arpía"
    short: "una arpía cantora"
    long: >-
      Una mujer alada con cuerpo de buitre y voz como campanas de plata.
      Su canción obliga a los oyentes a caminar ciegamente hacia sus
      garras.
  dryad:
    name: "Dríade"
    short: "una dríade fascinadora"
    long: >-
      Un espíritu del bosque de belleza inmaculada, guardián de un
      árbol antiguo. Su toque teje un encantamiento que convierte a
      los enemigos en sirvientes voluntarios.
  wyvern:
    name: "Víbora Alada"
    short: "una letal víbora alada"
    long: >-
      Un depredador dracónico de dos patas con una cola con púas
      cubierta de veneno. Carece de la magia de un dragón pero lo
      compensa con ferocidad.
  wraith:
    name: "Aparecido"
    short: "un aparecido espectral"
    long: >-
      Un horror incorpóreo de sombra y malicia. Su toque helado
      drena la vida de los vivientes, dejando solo cáscaras frías.
  rat:
    name: "Rata"
    short: "una rata"
    long: >-
      Una rata común, pequeña y rápida. Sola apenas es una molestia,
      pero en enjambres pueden abrumar a los desprevenidos.
  bat:
    name: "Murciélago"
    short: "un murciélago"
    long: >-
      Un pequeño murciélago que vuela erráticamente por los pasillos
      oscuros. Su ecolocalización lo guía infaliblemente en la oscuridad.
  giant_eagle:
    name: "Águila Gigante"
    short: "un águila gigante"
    long: >-
      Un rapaz magnífico con una envergadura de seis metros.
      Se lanza desde arriba con garras que pueden aplastar un cráneo.
  giant_frog:
    name: "Rana Gigante"
    short: "una rana gigante"
    long: >-
      Un anfibio hinchado del tamaño de un poni. Su lengua pegajosa
      se extiende para arrastrar a las presas a su garganta cavernosa.
  owlbear:
    name: "Oso Búho"
    short: "un oso búho furioso"
    long: >-
      Un híbrido monstruoso de búho y oso, con un pico ganchudo y
      brazos aplastantes. Abraza a las presas hasta matarlas.
  giant_lizard:
    name: "Lagarto Gigante"
    short: "un lagarto gigante"
    long: >-
      Un reptil masivo con mandíbulas poderosas y una cola pesada.
      Descansa en el calor de la mazmorra, esperando que la presa se acerque.
  werewolf:
    name: "Hombre Lobo"
    short: "un hombre lobo gruñón"
    long: >-
      Un humano maldito atrapado entre lobo y hombre. Solo las armas
      de plata o mágicas pueden atravesar su piel sobrenaturalmente dura.
  wererat:
    name: "Hombre Rata"
    short: "un furtivo hombre rata"
    long: >-
      Una figura delgada con bigotes temblorosos y ojos pequeños. Cambia
      entre forma humana y de rata, acechando en alcantarillas y sombras.
  werebear:
    name: "Hombre Oso"
    short: "un masivo hombre oso"
    long: >-
      Un licántropo imponente con la fuerza de un oso. A diferencia de
      la mayoría de cambiaformas, los hombres oso a veces protegen la
      naturaleza.
  ochre_jelly:
    name: "Gelatina Ocre"
    short: "una gelatina ocre temblorosa"
    long: >-
      Una masa informe de limo ocre que se desliza por suelos y paredes.
      Se divide en copias menores al ser golpeada con armas cortantes.
  green_slime:
    name: "Limo Verde"
    short: "una mancha de limo verde"
    long: >-
      Una película verde brillante pegada al techo. Cae sobre los
      desprevenidos, disolviendo armadura y carne a velocidad aterradora.
  black_pudding:
    name: "Pudín Negro"
    short: "un pudín negro"
    long: >-
      El más grande y letal de los oozes, una masa alquitranosa de ácido
      que disuelve armas metálicas al contacto y se divide al ser golpeado.
  violet_fungus:
    name: "Hongo Violeta"
    short: "un hongo violeta"
    long: >-
      Un crecimiento similar a un hongo con tentáculos que se retuercen
      con podredumbre necrótica. Su toque marchita la carne al contacto.
  yellow_mold:
    name: "Moho Amarillo"
    short: "una mancha de moho amarillo"
    long: >-
      Un crecimiento dorado peludo que cubre las paredes. Cuando es
      perturbado libera una nube de esporas mortales que ahogan los pulmones.
  mycelian:
    name: "Miceliano"
    short: "un miceliano"
    long: >-
      Una criatura fúngica inteligente que se comunica mediante nubes
      de esporas. Cuida sus jardines subterráneos con calma.
  carnivorous_flower:
    name: "Flor Carnívora"
    short: "una flor carnívora"
    long: >-
      Una floración masiva con pétalos dentados que se cierran sobre
      la presa. Un perfume dulce enmascara el hedor de víctimas digeridas.
  dung_worm:
    name: "Gusano de Estiércol"
    short: "un gusano de estiércol"
    long: >-
      Un gusano segmentado que excava entre la basura y la tierra suelta.
      Sus secreciones ácidas disuelven la materia orgánica con facilidad.
  animated_armor:
    name: "Armadura Animada"
    short: "una armadura animada"
    long: >-
      Una armadura de placas vacía que se mueve con un propósito
      inquietante. Ninguna mente habita dentro — solo la magia anima
      su cáscara hueca.
  invisible_stalker:
    name: "Acechador Invisible"
    short: "un temblor en el aire"
    long: >-
      Un elemental de aire atado a la servidumbre, permanentemente
      invisible. Solo la más leve distorsión en el aire delata su presencia.
  centaur:
    name: "Centauro"
    short: "un centauro"
    long: >-
      Una criatura noble con el torso de un humano y el cuerpo de un
      caballo. Carga con la lanza baja a velocidad tremenda.
  dragon_lizard:
    name: "Lagarto Dragón"
    short: "un lagarto dragón"
    long: >-
      Un reptil grande con alas vestigiales y una garganta que brilla
      con fuego interior. Escupe chorros de llama a todo lo que se mueve.
  geckonid:
    name: "Lagarto Gecónido"
    short: "un lagarto gecónido"
    long: >-
      Un lagarto ágil con almohadillas adhesivas en los pies que le
      permiten correr por paredes y techos con velocidad antinatural.
  cave_locust:
    name: "Langosta de Cueva Gigante"
    short: "una langosta de cueva gigante"
    long: >-
      Un insecto enorme con poderosas patas traseras que lo impulsan
      en grandes saltos. Escupe un líquido marrón asqueroso cuando se
      siente amenazado.
  insect_swarm:
    name: "Enjambre de Insectos"
    short: "un enjambre de insectos zumbante"
    long: >-
      Una nube agitada de insectos que muerden y pican. Los golpes
      individuales hacen poco — el enjambre debe ser quemado o huido.
  mechanical_raven:
    name: "Cuervo Mecánico"
    short: "un cuervo mecánico"
    long: >-
      Un pájaro de relojería de latón y engranajes de plata. Sus
      ojos de cristal registran todo lo que ven para su amo distante.
  chaos_spawn:
    name: "Desori"
    short: "un desori retorcido"
    long: >-
      Una criatura de pura entropía, su forma cambiando constantemente
      entre estados. La realidad se deforma y se deshace a su paso caótico.
  fell_spirit:
    name: "Drapat"
    short: "un drapat cacareante"
    long: >-
      Una pequeña criatura parecida a un diablillo con alas de murciélago
      y una sonrisa perversa. Se deleita en travesuras y bromas crueles.
  gray_ooze:
    name: "Limo Gris"
    short: "un limo gris"
    long: >-
      Una poza de limo gris viscoso que se asemeja a piedra mojada. Su
      cuerpo ácido disuelve el metal al contacto, arruinando armas y
      armaduras.
  merchant:
    name: "Mercader"
    short: "un mercader itinerante"
    long: >-
      Un comerciante curtido con un fardo pesado y ojos astutos.
      Se aventura en las profundidades de la mazmorra buscando beneficio
      y hallazgos raros.
  animated_bones:
    name: "Huesos Animados"
    short: "un montón de huesos animados"
    long: >-
      Una colección de huesos sostenidos por nigromancia desvaneciéndose.
      Traquetean y raspan mientras se arrastran hacia los vivos.

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Espada"
    short: "una espada de acero"
    long: >-
      Una hoja bien equilibrada de acero templado, gastada pero afilada.
  dagger:
    name: "Daga"
    short: "una daga afilada"
    long: >-
      Una hoja corta con empuñadura de cuero.
      Rápida de sacar, rápida de cortar.
  short_sword:
    name: "Espada Corta"
    short: "una espada corta"
    long: >-
      Una hoja compacta preferida por los escaramuzadores.
      Ideal para espacios reducidos.
  healing_potion:
    name: "Poción de Curación"
    short: "una poción carmesí"
    long: >-
      Un pequeño frasco de cristal lleno de un líquido rojo brillante.
      Huele ligeramente a hierro y hierbas.
  gold:
    name: "Oro"
    short: "un montón de monedas de oro"
    long: >-
      Monedas ennegrecidas con un emblema desconocido.
      Todavía lo suficientemente buenas para gastar.
  shield:
    name: "Escudo"
    short: "un escudo de madera"
    long: >-
      Un escudo redondo de madera reforzado con bandas de hierro.
      Otorga +1 defensa de armadura.
  scroll_lightning:
    name: "Pergamino de Rayo"
    short: "un pergamino crepitante"
    long: >-
      Un pergamino inscrito con símbolos arcanos.
      Rayos saltan entre las letras.
  scroll_sleep:
    name: "Pergamino de Dormir"
    short: "un pergamino azul pálido"
    long: >-
      Tinta violeta soñolienta llena este pergamino con
      sígiles en espiral que parecen moverse lentamente.
  scroll_magic_missile:
    name: "Pergamino de Proyectil Mágico"
    short: "un pergamino reluciente"
    long: >-
      Una densa notación arcana describe un dardo de fuerza
      que vuela recto y nunca falla a su objetivo.
  scroll_hold_person:
    name: "Pergamino de Retener Persona"
    short: "un pergamino amarillo"
    long: >-
      Palabras de atadura llenan este pergamino. Los humanoides
      que las escuchan pronunciadas quedan paralizados.
  scroll_fireball:
    name: "Pergamino de Bola de Fuego"
    short: "un pergamino chamuscado"
    long: >-
      Caliente al tacto y con olor a azufre. Un diagrama
      muestra una esfera de llamas de seis metros de diámetro.
  scroll_web:
    name: "Pergamino de Telaraña"
    short: "un pergamino pegajoso"
    long: >-
      Hilos finos están tejidos entre las letras de este pergamino.
      Llena una sala de telarañas que inmovilizan a quien las toca.
  scroll_charm_person:
    name: "Pergamino de Encantar Persona"
    short: "un pergamino rosado"
    long: >-
      Caligrafía en tinta rosa con espirales y lunas.
      Las palabras hacen que un humanoide te vea como un amigo de confianza.
  scroll_bless:
    name: "Pergamino de Bendición"
    short: "un pergamino dorado"
    long: >-
      Grabado en oro sobre pergamino blanco. Leerlo
      llena a los aliados de coraje divino y determinación marcial.
  scroll_mirror_image:
    name: "Pergamino de Imagen Especular"
    short: "un pergamino plateado"
    long: >-
      El pergamino refleja tu cara. Leerlo
      conjura 1d4 duplicados ilusorios para confundir a los atacantes.
  scroll_invisibility:
    name: "Pergamino de Invisibilidad"
    short: "un pergamino translúcido"
    long: >-
      Pergamino casi transparente con palabras visibles solo
      en ciertos ángulos. Leerlo te vuelve invisible.
  scroll_haste:
    name: "Pergamino de Prisa"
    short: "un pergamino borroso"
    long: >-
      Las letras parecen moverse mientras lees este pergamino.
      La prisa duplica tus ataques durante 3 turnos.
  scroll_cure_wounds:
    name: "Pergamino de Curar Heridas"
    short: "un pergamino verde"
    long: >-
      Escrito en tranquilizadora tinta esmeralda. Leerlo
      cierra heridas menores y restaura 1d6+1 PV.
  scroll_protection_evil:
    name: "Pergamino de Protección del Mal"
    short: "un pergamino azul brillante"
    long: >-
      Inscrito con protecciones santas y círculos de guarda.
      Otorga +1 a las salvaciones y dificulta a las criaturas malignas durante 12 turnos.
  scroll_detect_magic:
    name: "Pergamino de Detectar Magia"
    short: "un pergamino cian brillante"
    long: >-
      Runas pulsan suavemente en este pergamino. Leerlo revela
      todos los objetos mágicos del nivel actual.
  scroll_detect_evil:
    name: "Pergamino de Detectar el Mal"
    short: "un pergamino pálido con runas oscuras"
    long: >-
      Inscrito con sigilos rojo sangre que parecen retorcerse. Leerlo
      revela las criaturas hostiles incluso a través de las paredes.
  scroll_detect_invisibility:
    name: "Pergamino de Detectar Invisibilidad"
    short: "un pergamino centelleante"
    long: >-
      El pergamino alterna entre visible y translúcido. Leerlo
      otorga visión de criaturas invisibles durante 12 turnos.
  scroll_find_traps:
    name: "Pergamino de Encontrar Trampas"
    short: "un pergamino amarillo cauteloso"
    long: >-
      Diagramas geométricos llenan este pergamino. Leerlo revela
      todas las trampas ocultas del nivel actual.
  scroll_light:
    name: "Pergamino de Luz"
    short: "un pergamino radiante"
    long: >-
      Luz dorada cálida sale de entre los bordes enrollados. Leerlo
      baña el área con luz brillante durante 20 turnos.
  scroll_remove_fear:
    name: "Pergamino de Quitar Miedo"
    short: "un pergamino blanco tranquilo"
    long: >-
      Palabras reconfortantes de coraje llenan este pergamino. Leerlo
      disipa la parálisis y el miedo de tu mente.
  scroll_shield:
    name: "Pergamino de Escudo Mágico"
    short: "un pergamino reforzado"
    long: >-
      Un diagrama de barrera centelleante cubre este pergamino. Leerlo
      conjura un escudo mágico que otorga +2 CA durante 8 turnos.
  scroll_resist_cold:
    name: "Pergamino de Resistir Frío"
    short: "un pergamino bordeado de escarcha"
    long: >-
      Cristales de hielo se forman a lo largo de los bordes del pergamino.
      Leerlo reduce a la mitad todo el daño de frío durante 12 turnos.
  scroll_resist_fire:
    name: "Pergamino de Resistir Fuego"
    short: "un pergamino resistente al calor"
    long: >-
      El pergamino está caliente al tacto pero nunca se quema. Leerlo
      reduce a la mitad todo el daño de fuego durante 12 turnos.
  scroll_levitate:
    name: "Pergamino de Levitar"
    short: "un pergamino ingrávido"
    long: >-
      Este pergamino flota hacia arriba si lo sueltas. Leerlo te
      permite flotar sobre el suelo, evitando trampas durante 12 turnos.
  scroll_fly:
    name: "Pergamino de Volar"
    short: "un pergamino azotado por el viento"
    long: >-
      Tinta ligera como pluma traza patrones de alas. Leerlo
      otorga vuelo libre durante 6 turnos.
  scroll_dispel_magic:
    name: "Pergamino de Disipar Magia"
    short: "un pergamino anulador"
    long: >-
      Sigilos antimágicos cubren cada centímetro del pergamino. Leerlo
      elimina todos los efectos mágicos de las criaturas cercanas.
  scroll_protection_missiles:
    name: "Pergamino de Protección de Proyectiles"
    short: "un pergamino azul protegido"
    long: >-
      Círculos protectores concéntricos cubren este pergamino. Leerlo
      desvía todos los ataques a distancia durante 12 turnos.
  scroll_silence:
    name: "Pergamino de Silencio"
    short: "un pergamino gris mudo"
    long: >-
      Ningún sonido sale al hojear este pergamino. Leerlo
      crea una zona de silencio absoluto durante 12 turnos.
  scroll_phantasmal_force:
    name: "Pergamino de Fuerza Fantasmal"
    short: "un pergamino arremolinado"
    long: >-
      Formas ilusorias danzan sobre el pergamino. Leerlo llena
      la mente de los enemigos con alucinaciones aterradoras.
  scroll_clairvoyance:
    name: "Pergamino de Clarividencia"
    short: "un pergamino de visión lejana"
    long: >-
      Un ojo diminuto está dibujado en el centro del pergamino. Leerlo
      revela la disposición del área circundante.
  scroll_infravision:
    name: "Pergamino de Infravisión"
    short: "un pergamino rojo oscuro"
    long: >-
      Escrito con tinta visible solo en la oscuridad. Leerlo otorga
      la capacidad de ver firmas de calor durante 20 turnos.
  scroll_continual_light:
    name: "Pergamino de Luz Continua"
    short: "un pergamino resplandeciente"
    long: >-
      Texto blanco cegador sobre pergamino dorado. Leerlo crea
      una fuente de luz permanente que nunca se apaga.
  scroll_water_breathing:
    name: "Pergamino de Respirar bajo el Agua"
    short: "un pergamino húmedo"
    long: >-
      La tinta centellea como agua. Leerlo otorga la capacidad
      de respirar bajo el agua durante 20 turnos.
  scroll_charm_snakes:
    name: "Pergamino de Encantar Serpientes"
    short: "un pergamino serpentino"
    long: >-
      Patrones sinuosos se enroscan por el pergamino. Leerlo
      pacifica todas las criaturas de tipo serpiente cercanas.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Trampa de Foso"
    short: "un foso oculto"
    long: >-
      Las losas aquí parecen sutilmente diferentes — más claras,
      como si hubieran sido colocadas más recientemente.
