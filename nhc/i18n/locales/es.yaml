# ── Atmósfera de nivel ────────────────────────────────────────────────
atmosphere:
  dungeon:
    "1": "El aire es denso con olor a piedra húmeda y hierro viejo."
    "2": "La luz de las antorchas parpadea contra muros resbaladizos de humedad."
    "3": "Ecos distantes sugieren que estas salas no están del todo vacías."
    "4": "Las telarañas se aferran a cada rincón, intactas desde hace siglos."
    "5": "El techo gotea sin cesar, cada gota un pequeño latido en la oscuridad."
    "6": "Cadenas oxidadas cuelgan de los muros, restos de prisioneros olvidados."
    "7": "Una corriente de aire frío se enrosca en tus tobillos como dedos invisibles."
    "8": "Las losas están desgastadas por innumerables pies — o garras."
    "9": "En algún lugar adelante, metal raspa contra piedra."
    "10": "Grabados desvaídos en los muros insinúan advertencias ignoradas hace tiempo."
    "11": "El silencio aquí es opresivo, roto solo por tu propia respiración."
    "12": "Un leve olor a descomposición llega desde más adentro."
  crypt:
    "1": "El aire estancado lleva la dulzura de las hierbas de embalsamar."
    "2": "Nichos en los muros contienen los restos desmoronados de los sepultados."
    "3": "Cabos de vela crepitan en hornacinas, como si alguien los encendiera hace poco."
    "4": "Motas de polvo flotan en la penumbra como pequeñas almas perdidas."
    "5": "Los sarcófagos de piedra tienen rostros esculpidos desgastados por el tiempo."
    "6": "Un gemido bajo sube y baja — el viento, quizás, o algo más."
    "7": "Estandartes funerarios desgarrados cuelgan del techo abovedado."
    "8": "El suelo está granuloso con polvo de hueso que cruje bajo los pies."
    "9": "El frío emana de los muros como si los propios muertos lo respiraran."
    "10": "Epitafios en escrituras olvidadas cubren cada superficie."
    "11": "Un altar al fondo aún lleva manchas oscuras."
    "12": "El silencio aquí tiene peso, presionando sobre tus hombros."
  cave:
    "1": "El agua gotea de estalactitas hacia pozas invisibles abajo."
    "2": "Las paredes de la cueva brillan con depósitos minerales a la luz."
    "3": "Una brisa húmeda trae el olor terroso de la piedra profunda."
    "4": "Hongos bioluminiscentes proyectan un tenue resplandor azulado en los muros."
    "5": "El pasaje se estrecha, la roca presionando por todos lados."
    "6": "En algún lugar en la oscuridad, algo chapotea en agua quieta."
    "7": "Cristales incrustados en la roca capturan la luz y la dispersan."
    "8": "El aire es más fresco aquí, cargado de olor a arcilla húmeda."
    "9": "Excrementos de murciélago crujen bajo los pies — no eres el primer visitante."
    "10": "La cueva se abre en una cámara vasta, su techo perdido en la sombra."
    "11": "Ecos extraños hacen imposible distinguir la dirección o la distancia."
    "12": "Una niebla fina se aferra al suelo, arremolinándose a tus pies."
  castle:
    "1": "Grandes tapices cuelgan hechos jirones, sus colores desvaídos como fantasmas."
    "2": "Los suelos de mármol están agrietados pero aún brillan tenuemente."
    "3": "Armaduras completas hacen de centinelas silenciosos a lo largo del corredor."
    "4": "Una lámpara de araña yace destrozada en el suelo, sus cristales esparcidos."
    "5": "Los restos de un festín se pudren sobre una larga mesa de banquete."
    "6": "Altos ventanales dejan entrar luz pálida a través de vidrieras rotas."
    "7": "Un trono se asienta vacío al fondo, cubierto de telarañas."
    "8": "Escudos heráldicos cubren los muros, sus insignias ya sin sentido."
    "9": "La alfombra está raída pero aún amortigua tus pasos."
    "10": "Un reloj de pie en el rincón se ha detenido a medianoche."
    "11": "Los retratos en los muros parecen seguirte con ojos pintados."
    "12": "El aire huele a cera para madera y decadencia lenta."
  abyss:
    "1": "La oscuridad aquí es absoluta — tu luz apenas la contiene."
    "2": "La realidad se siente fina, como si el mundo pudiera desgarrarse con un toque."
    "3": "Susurros se deslizan al borde del oído, hablando ninguna lengua conocida."
    "4": "La piedra pulsa con un calor tenue e irregular."
    "5": "La gravedad se siente errónea, tirando en direcciones sutiles y cambiantes."
    "6": "El aire sabe a ozono y a algo más antiguo, algo maligno."
    "7": "Formas se mueven en la periferia de tu visión, desaparecen cuando miras."
    "8": "Los muros son lisos y negros, como obsidiana pulida."
    "9": "Una vibración baja zumba por el suelo, más sentida que escuchada."
    "10": "Estrellas parecen brillar dentro de la roca misma."
    "11": "Tu sombra se comporta extrañamente, rezagándose detrás de ti."
    "12": "El silencio aquí no está vacío — está esperando."

