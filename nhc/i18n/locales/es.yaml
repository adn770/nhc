# NHC Spanish locale — traducción al español
# Las claves usan notación con puntos: sección.subsección.clave
# Usar {nombre} para marcadores de interpolación

# ── Combat ────────────────────────────────────────────────────────────
combat:
  hit: "{attacker} golpea a {target} por {damage} de daño."
  miss: "{attacker} falla a {target}."
  slain: "¡{target} ha sido abatido!"
  destroyed: "¡{target} ha sido destruido!"
  drops: "{target} deja caer: {items}."
  unarmed: "desarmado"
  drained: "¡{attacker} drena la vida de {target}! PV máximos reducidos."
  poisoned: "¡{target} ha sido envenenado!"
  poison_tick: "¡{target} se retuerce de agonía por el veneno! {damage} de daño."
  petrified: "¡{target} mira a los ojos del basilisco y se convierte en piedra!"
  petrify_saved: "{target} aparta la vista justo a tiempo."
  paralyzed_turn: "¡Estás paralizado y no puedes moverte!"
  sleeping_turn: "Duermes indefenso..."
  miss_invisible: "¡{target} es invisible — tu golpe no encuentra nada!"
  mirror_absorbed: "¡Tu golpe impacta una imagen de {target} — ¡se rompe! ({remaining} quedan)"
  blood_drain: "¡{attacker} se aferra a {target} y le drena la sangre! ({damage} de drenaje)"
  petrify_touch: "¡{target} siente un frío pétreo que le recorre el cuerpo — paralizado!"
  frost_breath: "¡{attacker} exhala un soplo de frío ártico sobre {target} por {damage} de daño!"
  disenchant: "¡{attacker} drena la magia del {item} de {target}! Se desintegra en polvo."
  shrieker_shriek: "¡El {creature} emite un chillido estridente!"
  shriek_wakes: "¡{creature} se despierta sobresaltado por el terrible ruido!"

# ── Movement & Exploration ────────────────────────────────────────────
explore:
  open_door: "{actor} abre una puerta."
  see_item: "Ves {item} aquí."
  see_items: "Ves {count} objetos aquí: {items}."
  see_feature: "Ves {feature} aquí."
  see_creature: "Ves {creature}{status}."
  nothing_special: "Nada especial aquí."
  spot_creature: "¡Divisas {creature}!"
  descend: "Desciendes más profundo en la mazmorra..."

# ── Health status descriptions ────────────────────────────────────────
health_status:
  uninjured: " (ileso)"
  lightly_wounded: " (levemente herido)"
  badly_wounded: " (gravemente herido)"
  near_death: " (al borde de la muerte)"

# ── Feature names ─────────────────────────────────────────────────────
feature:
  stairs_up: "unas escaleras hacia arriba"
  stairs_down: "unas escaleras hacia abajo"
  door_open: "una puerta abierta"
  door_closed: "una puerta cerrada"

# ── Items & Inventory ─────────────────────────────────────────────────
item:
  picked_up: "Has recogido {item}."
  equipped: "Has equipado {item}."
  full_inventory: "¡El inventario está lleno!"
  nothing_to_pickup: "No hay nada que recoger aquí."
  full_health: "Ya estás a plena salud."
  quaff_heal: "Bebes {item}. Curado {amount} PV."
  nothing_happens: "No pasa nada."
  no_target: "¡Ningún objetivo a la vista!"
  lightning_strike: >-
    ¡Un rayo de {item} golpea a {target}
    por {damage} de daño!
  sleep_cast: "El pergamino se desmorona en polvo..."
  sleep_affects: "¡{target} cae en un sueño mágico!"
  sleep_none: "Ninguna criatura se queda dormida."
  missile_hits: "¡Un dardo de fuerza golpea a {target} por {damage} de daño!"
  hold_cast: "Palabras de poder resuenan por la mazmorra..."
  hold_affects: "¡{target} queda inmovilizado!"
  hold_no_humanoids: "No hay humanoides a la vista."
  fireball_cast: "¡Una rugiente bola de fuego explota!"
  fireball_hits: "¡{target} es chamuscado por {damage} de daño!"
  web_cast: "¡Telarañas pegajosas brotan del pergamino!"
  web_caught: "¡{target} queda atrapado en las telarañas!"
  charm_cast: "Palabras de glamour envuelven a tus enemigos..."
  charm_affects: "{target} te mira con ojos adoradores."
  charm_no_target: "No hay criaturas lo suficientemente cerca para encantar."
  bless_cast: "Un cálido resplandor te llena."
  bless_active: "¡Te sientes bendecido y combates con mayor resolución!"
  invis_cast: "Te disuelves en las sombras."
  invis_active: "¡Eres invisible!"
  haste_cast: "El mundo parece ralentizarse mientras tú te aceleras."
  haste_active: "¡Te mueves a velocidad cegadora!"
  protect_cast: "Un escudo de poder sagrado se asienta sobre ti."
  protect_active: "¡Las criaturas malignas tienen dificultades para hacerte daño!"
  mirror_cast: "¡Copias parpadeantes tuyas aparecen!"
  mirror_images: "{count} imágenes especulares te rodean."

# ── Traps ─────────────────────────────────────────────────────────────
trap:
  avoided: "¡{entity} detecta {trap} y la evita!"
  triggered: "¡{entity} cae en {trap}! ¡{damage} de daño!"

# ── Game state ────────────────────────────────────────────────────────
game:
  welcome: "Bienvenido a {name}."
  died: "¡Has muerto!"
  slain_by: "¡Has sido abatido por {killer}!"
  game_saved: "Partida guardada."
  save_failed: "Error al guardar: {error}"
  no_save: "No se encontró partida guardada."
  game_loaded: "Partida cargada."
  load_failed: "Error al cargar: {error}"
  xp_gained: "+{xp} XP"
  player_name: "Tú"

# ── Level up ──────────────────────────────────────────────────────────
levelup:
  with_ability: "¡Nivel {level}! +{hp} PV, +1 {ability}."
  no_ability: "¡Nivel {level}! +{hp} PV."

# ── UI labels ─────────────────────────────────────────────────────────
ui:
  depth: "Profundidad"
  turn: "Turno"
  empty: "vacío"
  scroll_hint: "desplazar"
  esc_cancel: "  ESC para cancelar"
  inventory_title: "Inventario (ESC para cerrar)"
  use_which: "¿Qué objeto quieres usar?"
  victory_title: "¡VICTORIA!"
  victory_desc: "Has descendido más profundo en la mazmorra."
  death_title: "HAS MUERTO"
  death_desc: "Tu aventura termina aquí."
  end_footer: "Sobreviviste {turn} turnos. Pulsa cualquier tecla para salir."

# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "un goblin gruñón"
    long: >-
      Una criatura delgada de piel verde con colmillos amarillentos
      y una hoja oxidada.
  skeleton:
    name: "Esqueleto"
    short: "un esqueleto ruidoso"
    long: >-
      Huesos blanqueados sostenidos por magia oscura,
      empuñando una hoja mellada.
  rat:
    name: "Rata Gigante"
    short: "una rata gigante"
    long: >-
      Una rata sarnosa del tamaño de un perro, con ojos
      brillantes de hambre salvaje.
  orc:
    name: "Orco"
    short: "un orco corpulento"
    long: >-
      Un bruto musculoso con colmillos y armadura de hierro tosca.
      Gruñe agresivamente.
  zombie:
    name: "Zombi"
    short: "un zombi tambaleante"
    long: >-
      Un cadáver en descomposición que se niega a quedarse muerto.
      El hedor es abrumador.
  gnoll:
    name: "Gnoll"
    short: "un gnoll con cabeza de hiena"
    long: >-
      Un humanoide corpulento con cabeza de hiena.
      Ríe maniacamente mientras se prepara para atacar.
  giant_bee:
    name: "Abeja Gigante"
    short: "una abeja gigante"
    long: >-
      Una abeja del tamaño de un gato, con el aguijón
      goteando veneno ámbar.
  wight:
    name: "Aparecido"
    short: "un pálido aparecido"
    long: >-
      Un horror no muerto que irradia malicia fría.
      Su toque drena la propia fuerza vital.
  spectre:
    name: "Espectro"
    short: "una sombra espectral"
    long: >-
      Un fantasma translúcido que flota sobre el suelo.
      Su mirada te hiela hasta los huesos.
  basilisk:
    name: "Basilisco"
    short: "un basilisco"
    long: >-
      Un lagarto de ocho patas con ojos brillantes.
      No le mires a los ojos o te petrificará.
  kobold:
    name: "Kobold"
    short: "un kobold peleón"
    long: >-
      Un humanoide diminuto con hocico de perro vestido con retazos de cuero.
      Chilla y se lanza con una hoja oxidada.
  hobgoblin:
    name: "Hobgoblin"
    short: "un soldado hobgoblin"
    long: >-
      Un goblinoide grande de piel rojiza con porte militar.
      Se mueve en formación disciplinada y combate sin piedad.
  osgo:
    name: "Bugbear"
    short: "un imponente bugbear"
    long: >-
      Un goblinoide peludo parecido a un oso que se mueve con inquietante
      silencio. Sus garras están teñidas de sangre vieja.
  ogre:
    name: "Ogro"
    short: "un ogro colosal"
    long: >-
      Un gigante enorme y torpe que aplasta todo a su paso.
      Porta un tronco de árbol como maza.
  bandoler:
    name: "Bandido"
    short: "un bandido encapuchado"
    long: >-
      Un proscrito humano con cara marcada y ojos hambrientos.
      Sale de las sombras con la hoja desenvainada.
  uarg:
    name: "Warg"
    short: "un gran warg"
    long: >-
      Un enorme lobo de pelaje negro y ojos inteligentes y crueles.
      Caza junto a orcos y gruñe con voz gutural.
  llop:
    name: "Lobo"
    short: "un lobo gris"
    long: >-
      Un lobo gris y ágil que rodea cautelosamente antes de lanzarse.
      En manada son verdaderamente letales.
  llop_terrible:
    name: "Lobo Terrible"
    short: "un lobo terrible"
    long: >-
      Un lobo del tamaño de un caballo, con mandíbulas capaces de
      triturar piedra. Sus ojos rojos te fijan con certeza depredadora.
  ratpenat_gegant:
    name: "Murciélago Gigante"
    short: "un murciélago gigante"
    long: >-
      Un murciélago con una envergadura de alas más ancha que un hombre alto.
      Se abalanza desde la oscuridad con un chillido.
  os_negre:
    name: "Oso Negro"
    short: "un oso negro"
    long: >-
      Un oso compacto pero poderoso, generalmente desconfiado con los humanos.
      Acorralado, combate con salvaje ferocidad.
  os_bru:
    name: "Oso Pardo"
    short: "un oso pardo"
    long: >-
      Un enorme oso pardo de casi dos metros y medio de altura.
      Su rugido hace temblar las paredes de la mazmorra.
  granyotic:
    name: "Hombre Rana"
    short: "un guerrero hombre rana"
    long: >-
      Un humanoide con piel verde moteada, ojos saltones y
      piernas poderosas que lo llevan sobre obstáculos de un salto.
  llangardanic:
    name: "Hombre Lagarto"
    short: "un hombre lagarto"
    long: >-
      Un lagarto bípedo con armadura tosca, escamoso y de sangre fría.
      Sus ojos sin párpados siguen cada uno de tus movimientos.
  escarabat_foc:
    name: "Escarabajo de Fuego Gigante"
    short: "un escarabajo de fuego"
    long: >-
      Un escarabajo del tamaño de un perro, con glándulas naranjas brillantes
      en el tórax y abdomen que emiten una siniestra luz carmesí.
  gentmalgama:
    name: "Quimérico"
    short: "un quimérico"
    long: >-
      Una criatura ensamblada con partes animales dispares.
      Dos cabezas discuten desde qué lado atacar.
  gul:
    name: "Gul"
    short: "un fétido gul"
    long: >-
      Un horror no muerto que apesta a tumba. Sus garras
      drenan la chispa vital de los vivos.
  escorpi_gegant:
    name: "Escorpión Gigante"
    short: "un escorpión gigante"
    long: >-
      Un arácnido del tamaño de un caballo con enormes pinzas y
      una cola con aguijón chorreando potente veneno.
  centpeus_gegant:
    name: "Ciempiés Gigante"
    short: "un ciempiés gigante"
    long: >-
      Un horror segmentado de sesenta centímetros con cientos de
      patas y mandíbulas venenosas. Su mordisco es sorprendentemente peligroso.
  tarantula_gegant:
    name: "Tarántula Gigante"
    short: "una tarántula gigante"
    long: >-
      Una araña peluda lo suficientemente grande para atacar a un hombre.
      Sus colmillos inyectan un veneno lento y agónico.
  home_serp:
    name: "Hombre Serpiente"
    short: "un escamoso hombre serpiente"
    long: >-
      Un humanoide con cabeza de cobra y piel verde escamosa.
      Silba una maldición antes de golpear con precisión.
  stirge:
    name: "Estirge"
    short: "un estirge chupasingre"
    long: >-
      Un horror con alas de mosquito y trompa de aguja.
      Una vez perfora la carne, drena la sangre a velocidad aterradora.
  sangonera_gegant:
    name: "Sanguijuela Gigante"
    short: "una sanguijuela gigante"
    long: >-
      Un gusano gordo y gomoso de casi un metro de largo. Se aferra
      a su presa y le drena la sangre hasta saciarse o morir.
  cocatriu:
    name: "Cocatriz"
    short: "una cocatriz"
    long: >-
      Un dragón de dos patas con cabeza de gallo y cola de serpiente.
      Su toque convierte la carne en piedra fría y gris.
  ocell_mal_averany:
    name: "Pájaro de Mal Agüero"
    short: "un pájaro de mal agüero"
    long: >-
      Un cuervo gigante de plumas negras como la noche y ojos pálidos
      que brillan con malicia sobrenatural. Su grito hiela la sangre.
  cuc_tentacles:
    name: "Gusano de Tentáculos"
    short: "un gusano de tentáculos"
    long: >-
      Un gusano pálido y gordo rodeado de tentáculos que agarran.
      Segrega un veneno adormecedor que deja a las presas indefensas.
  llop_hivern:
    name: "Lobo de Invierno"
    short: "un lobo de invierno"
    long: >-
      Un gran lobo blanco del norte helado. Exhala hielo ártico
      que cubre a los enemigos mientras los muerde salvajemente.
  desencantador:
    name: "Desencantador"
    short: "un desencantador"
    long: >-
      Un depredador pálido con forma de babosa que se alimenta
      de energía mágica. Su toque deshace encantamientos y deja
      los pergaminos hechos polvo.
  cridaner:
    name: "Chillador"
    short: "un chillador"
    long: >-
      Un hongo de sombrero violeta que emite un chillido ensordecedor
      cuando es perturbado, alertando a todas las criaturas del área.
  serp_gegant:
    name: "Serpiente Gigante"
    short: "una serpiente gigante"
    long: >-
      Una serpiente colosal capaz de tragarse a un hombre entero.
      Sus colmillos huecos inyectan un veneno letal.

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Espada"
    short: "una espada de acero"
    long: >-
      Una hoja bien equilibrada de acero templado, gastada pero afilada.
  dagger:
    name: "Daga"
    short: "una daga afilada"
    long: >-
      Una hoja corta con empuñadura de cuero.
      Rápida de sacar, rápida de cortar.
  short_sword:
    name: "Espada Corta"
    short: "una espada corta"
    long: >-
      Una hoja compacta preferida por los escaramuzadores.
      Ideal para espacios reducidos.
  healing_potion:
    name: "Poción de Curación"
    short: "una poción carmesí"
    long: >-
      Un pequeño frasco de cristal lleno de un líquido rojo brillante.
      Huele ligeramente a hierro y hierbas.
  gold:
    name: "Oro"
    short: "un montón de monedas de oro"
    long: >-
      Monedas ennegrecidas con un emblema desconocido.
      Todavía lo suficientemente buenas para gastar.
  shield:
    name: "Escudo"
    short: "un escudo de madera"
    long: >-
      Un escudo redondo de madera reforzado con bandas de hierro.
      Otorga +1 defensa de armadura.
  scroll_lightning:
    name: "Pergamino de Rayo"
    short: "un pergamino crepitante"
    long: >-
      Un pergamino inscrito con símbolos arcanos.
      Rayos saltan entre las letras.
  scroll_sleep:
    name: "Pergamino de Dormir"
    short: "un pergamino azul pálido"
    long: >-
      Tinta violeta soñolienta llena este pergamino con
      sígiles en espiral que parecen moverse lentamente.
  scroll_magic_missile:
    name: "Pergamino de Proyectil Mágico"
    short: "un pergamino reluciente"
    long: >-
      Una densa notación arcana describe un dardo de fuerza
      que vuela recto y nunca falla a su objetivo.
  scroll_hold_person:
    name: "Pergamino de Retener Persona"
    short: "un pergamino amarillo"
    long: >-
      Palabras de atadura llenan este pergamino. Los humanoides
      que las escuchan pronunciadas quedan paralizados.
  scroll_fireball:
    name: "Pergamino de Bola de Fuego"
    short: "un pergamino chamuscado"
    long: >-
      Caliente al tacto y con olor a azufre. Un diagrama
      muestra una esfera de llamas de seis metros de diámetro.
  scroll_web:
    name: "Pergamino de Telaraña"
    short: "un pergamino pegajoso"
    long: >-
      Hilos finos están tejidos entre las letras de este pergamino.
      Llena una sala de telarañas que inmovilizan a quien las toca.
  scroll_charm_person:
    name: "Pergamino de Encantar Persona"
    short: "un pergamino rosado"
    long: >-
      Caligrafía en tinta rosa con espirales y lunas.
      Las palabras hacen que un humanoide te vea como un amigo de confianza.
  scroll_bless:
    name: "Pergamino de Bendición"
    short: "un pergamino dorado"
    long: >-
      Grabado en oro sobre pergamino blanco. Leerlo
      llena a los aliados de coraje divino y determinación marcial.
  scroll_mirror_image:
    name: "Pergamino de Imagen Especular"
    short: "un pergamino plateado"
    long: >-
      El pergamino refleja tu cara. Leerlo
      conjura 1d4 duplicados ilusorios para confundir a los atacantes.
  scroll_invisibility:
    name: "Pergamino de Invisibilidad"
    short: "un pergamino translúcido"
    long: >-
      Pergamino casi transparente con palabras visibles solo
      en ciertos ángulos. Leerlo te vuelve invisible.
  scroll_haste:
    name: "Pergamino de Prisa"
    short: "un pergamino borroso"
    long: >-
      Las letras parecen moverse mientras lees este pergamino.
      La prisa duplica tus ataques durante 3 turnos.
  scroll_cure_wounds:
    name: "Pergamino de Curar Heridas"
    short: "un pergamino verde"
    long: >-
      Escrito en tranquilizadora tinta esmeralda. Leerlo
      cierra heridas menores y restaura 1d6+1 PV.
  scroll_protection_evil:
    name: "Pergamino de Protección del Mal"
    short: "un pergamino azul brillante"
    long: >-
      Inscrito con protecciones santas y círculos de guarda.
      Otorga +1 a las salvaciones y dificulta a las criaturas malignas durante 12 turnos.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Trampa de Foso"
    short: "un foso oculto"
    long: >-
      Las losas aquí parecen sutilmente diferentes — más claras,
      como si hubieran sido colocadas más recientemente.
