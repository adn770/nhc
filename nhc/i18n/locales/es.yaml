    long: >-
      El pergamino huele ligeramente a pan fresco. Leerlo revela
      todas las fuentes de sustento del nivel actual.
  scroll_detect_evil:
    name: "Pergamino de Detectar el Mal"
    short: "un pergamino pálido con runas oscuras"
    long: >-
      Inscrito con sigilos rojo sangre que parecen retorcerse. Leerlo
      revela las criaturas hostiles incluso a través de las paredes.
  scroll_detect_invisibility:
    name: "Pergamino de Detectar Invisibilidad"
    short: "un pergamino centelleante"
    long: >-
      El pergamino alterna entre visible y translúcido. Leerlo
      otorga visión de criaturas invisibles durante 12 turnos.
  scroll_find_traps:
    name: "Pergamino de Encontrar Trampas"
    short: "un pergamino amarillo cauteloso"
    long: >-
      Diagramas geométricos llenan este pergamino. Leerlo revela
      todas las trampas ocultas del nivel actual.
  scroll_light:
    name: "Pergamino de Luz"
    short: "un pergamino radiante"
    long: >-
      Luz dorada cálida sale de entre los bordes enrollados. Leerlo
      baña el área con luz brillante durante 20 turnos.
  scroll_remove_fear:
    name: "Pergamino de Quitar Miedo"
    short: "un pergamino blanco tranquilo"
    long: >-
      Palabras reconfortantes de coraje llenan este pergamino. Leerlo
      disipa la parálisis y el miedo de tu mente.
  scroll_shield:
    name: "Pergamino de Escudo Mágico"
    short: "un pergamino reforzado"
    long: >-
      Un diagrama de barrera centelleante cubre este pergamino. Leerlo
      conjura un escudo mágico que otorga +2 CA durante 8 turnos.
  scroll_resist_cold:
    name: "Pergamino de Resistir Frío"
    short: "un pergamino bordeado de escarcha"
    long: >-
      Cristales de hielo se forman a lo largo de los bordes del pergamino.
      Leerlo reduce a la mitad todo el daño de frío durante 12 turnos.
  scroll_resist_fire:
    name: "Pergamino de Resistir Fuego"
    short: "un pergamino resistente al calor"
    long: >-
      El pergamino está caliente al tacto pero nunca se quema. Leerlo
      reduce a la mitad todo el daño de fuego durante 12 turnos.
  scroll_levitate:
    name: "Pergamino de Levitar"
    short: "un pergamino ingrávido"
    long: >-
      Este pergamino flota hacia arriba si lo sueltas. Leerlo te
      permite flotar sobre el suelo, evitando trampas durante 12 turnos.
  scroll_fly:
    name: "Pergamino de Volar"
    short: "un pergamino azotado por el viento"
    long: >-
      Tinta ligera como pluma traza patrones de alas. Leerlo
      otorga vuelo libre durante 6 turnos.
  scroll_dispel_magic:
    name: "Pergamino de Disipar Magia"
    short: "un pergamino anulador"
    long: >-
      Sigilos antimágicos cubren cada centímetro del pergamino. Leerlo
      elimina todos los efectos mágicos de las criaturas cercanas.
  scroll_protection_missiles:
    name: "Pergamino de Protección de Proyectiles"
    short: "un pergamino azul protegido"
    long: >-
      Círculos protectores concéntricos cubren este pergamino. Leerlo
      desvía todos los ataques a distancia durante 12 turnos.
  scroll_silence:
    name: "Pergamino de Silencio"
    short: "un pergamino gris mudo"
    long: >-
      Ningún sonido sale al hojear este pergamino. Leerlo
      crea una zona de silencio absoluto durante 12 turnos.
  scroll_phantasmal_force:
    name: "Pergamino de Fuerza Fantasmal"
    short: "un pergamino arremolinado"
    long: >-
      Formas ilusorias danzan sobre el pergamino. Leerlo llena
      la mente de los enemigos con alucinaciones aterradoras.
  scroll_clairvoyance:
    name: "Pergamino de Clarividencia"
    short: "un pergamino de visión lejana"
    long: >-
      Un ojo diminuto está dibujado en el centro del pergamino. Leerlo
      revela la disposición del área circundante.
  scroll_infravision:
    name: "Pergamino de Infravisión"
    short: "un pergamino rojo oscuro"
    long: >-
      Escrito con tinta visible solo en la oscuridad. Leerlo otorga
      la capacidad de ver firmas de calor durante 20 turnos.
  scroll_continual_light:
    name: "Pergamino de Luz Continua"
    short: "un pergamino resplandeciente"
    long: >-
      Texto blanco cegador sobre pergamino dorado. Leerlo crea
      una fuente de luz permanente que nunca se apaga.
  scroll_water_breathing:
    name: "Pergamino de Respirar bajo el Agua"
    short: "un pergamino húmedo"
    long: >-
      La tinta centellea como agua. Leerlo otorga la capacidad
      de respirar bajo el agua durante 20 turnos.
  scroll_charm_snakes:
    name: "Pergamino de Encantar Serpientes"
    short: "un pergamino serpentino"
    long: >-
      Patrones sinuosos se enroscan por el pergamino. Leerlo
      pacifica todas las criaturas de tipo serpiente cercanas.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Trampa de Foso"
    short: "un foso oculto"
    long: "Las losas aquí parecen sutilmente diferentes — más claras, como si hubieran sido colocadas más recientemente."
  trap_fire:
    name: "Trampa de Fuego"
    short: "una trampa de fuego"
    long: "Marcas de quemaduras en la piedra delatan chorros de llama ocultos."
  trap_poison:
    name: "Trampa de Veneno"
    short: "una trampa de veneno"
    long: "Agujeros diminutos en la pared ocultan dardos finos como agujas, untados con veneno."
  trap_paralysis:
    name: "Trampa de Parálisis"
    short: "una trampa de parálisis"
    long: "Un tenue olor químico persiste — una trampa de gas que congela los músculos."
  trap_alarm:
    name: "Trampa de Alarma"
    short: "una trampa de alarma"
    long: "Un hilo fino conecta con un mecanismo chillón en la pared."
  trap_teleport:
    name: "Trampa de Teletransporte"
    short: "una trampa de teletransporte"
    long: "Runas arcanas brillan tenuemente en el suelo, formando un círculo de teletransporte."
  trap_summoning:
    name: "Trampa de Invocación"
    short: "una trampa de invocación"
    long: "Un pentagrama está grabado en la piedra, listo para conjurar criaturas."
  trap_gripping:
    name: "Trampa de Mandíbulas"
    short: "una trampa de mandíbulas"
    long: "Mandíbulas de hierro yacen ocultas bajo una fina capa de polvo y piedra."
  trap_arrow:
    name: "Trampa de Flecha"
    short: "una trampa de flecha"
    long: "Una ranura diminuta en la pared oculta un mecanismo de ballesta cargada."
  trap_darts:
    name: "Trampa de Dardos"
    short: "una trampa de dardos"
    long: "Tres agujeros de cerbatana están astutamente disimulados en la piedra."
  trap_falling_stone:
    name: "Trampa de Piedra"
    short: "una trampa de piedra"
    long: "Una grieta en el techo marca donde una piedra pesada contrapesada espera para caer."
  trap_spores:
    name: "Trampa de Esporas"
    short: "una trampa de esporas"
    long: "Vainas fúngicas secas anidan entre las losas, listas para estallar."
  trap_trapdoor:
    name: "Trampilla"
    short: "una trampilla oculta"
    long: "El suelo aquí es más fino de lo que parece — una sección con bisagras lista para abrirse."
