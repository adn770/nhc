# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "a snarling goblin"
    long: >-
      A wiry, green-skinned creature with yellowed fangs
      and a rusty blade.
  skeleton:
    name: "Skeleton"
    short: "a rattling skeleton"
    long: >-
      Bleached bones held together by dark magic,
      wielding a notched blade.
  giant_rat:
    name: "Giant Rat"
    short: "a giant rat"
    long: >-
      A mangy rat the size of a dog, its eyes gleaming
      with feral hunger.
  orc:
    name: "Orc"
    short: "a hulking orc"
    long: >-
      A muscular brute with tusks and crude iron armor.
      It grunts aggressively.
  zombie:
    name: "Zombie"
    short: "a shambling zombie"
    long: >-
      A decomposing corpse that refuses to stay dead.
      The stench is overwhelming.
  gnoll:
    name: "Gnoll"
    short: "a hyena-headed gnoll"
    long: >-
      A hulking humanoid with the head of a hyena.
      It laughs maniacally as it prepares to strike.
  giant_bee:
    name: "Giant Bee"
    short: "a giant bee"
    long: >-
      A bee the size of a house cat, its stinger
      dripping with amber venom.
  wight:
    name: "Wight"
    short: "a pale wight"
    long: >-
      An undead horror radiating cold malice.
      Its touch drains the very life force.
  spectre:
    name: "Spectre"
    short: "a spectral shade"
    long: >-
      A translucent wraith that drifts above the ground.
      Its gaze chills you to the bone.
  basilisk:
    name: "Basilisk"
    short: "a basilisk"
    long: >-
      A massive eight-legged lizard with glowing eyes.
      Do not meet its gaze or face petrification.
  kobold:
    name: "Kobold"
    short: "a scrappy kobold"
    long: >-
      A tiny, dog-snouted humanoid dressed in scraps of leather.
      It chatters shrilly and lunges with a rusty blade.
  hobgoblin:
    name: "Hobgoblin"
    short: "a hobgoblin soldier"
    long: >-
      A large, red-skinned goblinoid with military bearing.
      It moves in disciplined formation and fights without mercy.
  bugbear:
    name: "Bugbear"
    short: "a looming bugbear"
    long: >-
      A shaggy, bear-like goblinoid that moves with unnerving silence.
      Its claws are stained dark with old blood.
  ogre:
    name: "Ogre"
    short: "a towering ogre"
    long: >-
      A massive, dim-witted giant that smashes everything in its path.
      It carries a tree trunk as a club.
  bandit:
    name: "Bandit"
    short: "a hooded bandit"
    long: >-
      A human outlaw with a scarred face and hungry eyes.
      They step out of the shadows with blade drawn.
  warg:
    name: "Warg"
    short: "a great warg"
    long: >-
      An enormous wolf with black fur and cruel, intelligent eyes.
      It hunts alongside orcs and speaks in guttural growls.
  wolf:
    name: "Wolf"
    short: "a grey wolf"
    long: >-
      A lean grey wolf that circles warily before lunging.
      In packs they are truly deadly.
  dire_wolf:
    name: "Dire Wolf"
    short: "a dire wolf"
    long: >-
      A wolf the size of a horse, with jaws that could crush stone.
      Its red eyes fix on you with predatory certainty.
  giant_bat:
    name: "Giant Bat"
    short: "a giant bat"
    long: >-
      A bat with a wingspan wider than a man is tall.
      It swoops from the darkness with a shriek.
  black_bear:
    name: "Black Bear"
    short: "a black bear"
    long: >-
      A compact but powerful bear, usually wary of humans.
      When cornered it fights with savage ferocity.
  brown_bear:
    name: "Brown Bear"
    short: "a brown bear"
    long: >-
      A massive brown bear standing nearly eight feet tall.
      Its roar shakes the walls of the dungeon.
  frogman:
    name: "Frogman"
    short: "a frogman warrior"
    long: >-
      A humanoid with mottled green skin, bulging eyes, and
      powerful legs that can carry it over obstacles in a single leap.
  lizardman:
    name: "Lizardman"
    short: "a lizardman"
    long: >-
      A bipedal lizard in crude armor, scaled and cold-blooded.
      Its unblinking eyes track your every move.
  fire_beetle:
    name: "Giant Fire Beetle"
    short: "a fire beetle"
    long: >-
      A beetle the size of a dog, with glowing orange glands on its
      thorax and abdomen that cast eerie crimson light.
  amalgamkin:
    name: "Chimera-Ling"
    short: "a chimera-ling"
    long: >-
      A patchwork creature assembled from mismatched animal parts.
      Two heads argue over which direction to attack from.
  ghoul:
    name: "Ghoul"
    short: "a foul ghoul"
    long: >-
      An undead horror that reeks of the grave. Its clawed touch
      drains the vital spark of the living.
  giant_scorpion:
    name: "Giant Scorpion"
    short: "a giant scorpion"
    long: >-
      An arachnid the size of a horse with massive pincers and a
      barbed tail dripping with potent venom.
  giant_centipede:
    name: "Giant Centipede"
    short: "a giant centipede"
    long: >-
      A segmented horror two feet long with hundreds of legs and
      tiny venomous mandibles. Its bite is surprisingly dangerous.
  giant_tarantula:
    name: "Giant Tarantula"
    short: "a giant tarantula"
    long: >-
      A hairy spider large enough to tackle a man. Its fangs
      deliver a slow, agonizing venom.
  snakeman:
    name: "Snakeman"
    short: "a serpentine snakeman"
    long: >-
      A humanoid with a cobra's head and scaly green skin.
      It hisses a curse before striking with practiced precision.
  stirge:
    name: "Stirge"
    short: "a blood-sucking stirge"
    long: >-
      A mosquito-winged horror with a needle proboscis.
      Once it pierces flesh it drains blood with terrifying speed.
  giant_leech:
    name: "Giant Leech"
    short: "a giant leech"
    long: >-
      A bloated, rubbery worm nearly three feet long. It attaches
      itself to prey and drains blood until sated or slain.
  cockatrice:
    name: "Cockatrice"
    short: "a cockatrice"
    long: >-
      A two-legged dragon with a rooster's head and a serpentine
      tail. Its touch turns flesh to cold grey stone.
  ill_omen_bird:
    name: "Bird of Ill Omen"
    short: "a bird of ill omen"
    long: >-
      A giant raven with midnight-black feathers and pale eyes
      that gleam with unnatural malice. Its cry chills the blood.
  tentacle_worm:
    name: "Tentacle Worm"
    short: "a tentacle worm"
    long: >-
      A fat pale worm ringed with grasping tentacles. It secretes
      a numbing venom that leaves prey helpless.
  winter_wolf:
    name: "Winter Wolf"
    short: "a winter wolf"
    long: >-
      A great white wolf from the frozen north. It exhales arctic
      frost that coats enemies in ice alongside its savage bite.
  disenchanter:
    name: "Disenchanter"
    short: "a disenchanter"
    long: >-
      A pale, slug-like predator that feeds on magical energy.
      Its touch unravels enchantments and leaves scrolls as dust.
  shrieker:
    name: "Shrieker"
    short: "a shrieker"
    long: >-
      A violet-capped mushroom that emits a deafening shriek when
      disturbed, alerting every creature in earshot.
  giant_snake:
    name: "Giant Snake"
    short: "a giant snake"
    long: >-
      A colossal serpent that can swallow a man whole. Its hollow
      fangs inject a lethal venom.
  troll:
    name: "Troll"
    short: "a loathsome troll"
    long: >-
      A rubbery, loping giant with a gaping maw and claws like black
      iron. Its wounds knit closed before your eyes — only fire stops
      its regeneration.
  mummy:
    name: "Mummy"
    short: "a bandaged mummy"
    long: >-
      A desiccated corpse wrapped in yellowed linen. The mere sight
      inspires supernatural dread, and its touch spreads the rot
      that slowly consumes the living.
  gargoyle:
    name: "Gargoyle"
    short: "a stone gargoyle"
    long: >-
      A winged statue that has learned to live. Stone skin turns
      aside ordinary weapons — only magic can pierce its hide.
  banshee:
    name: "Banshee"
    short: "a wailing banshee"
    long: >-
      The spirit of a woman wronged in life, hovering in torn burial
      robes. Her scream can stop a heart cold.
  mimic:
    name: "Mimic"
    short: "a treasure chest"
    long: >-
      What you took for a treasure chest lunges at you with a
      tooth-lined maw. Mimics are patient, deadly ambush hunters.
  harpy:
    name: "Harpy"
    short: "a singing harpy"
    long: >-
      A winged woman with a vulture's body and a voice like silver
      bells. Her song compels listeners to walk blindly into her claws.
  dryad:
    name: "Dryad"
    short: "a beguiling dryad"
    long: >-
      A wood-spirit of flawless beauty, guardian of an ancient tree.
      Her touch weaves a charm that turns enemies into willing servants.
  wyvern:
    name: "Wyvern"
    short: "a lethal wyvern"
    long: >-
      A two-legged draconic predator with a barbed tail coated in
      venom. It lacks a dragon's magic but makes up for it in savagery.
  wraith:
    name: "Wraith"
    short: "a spectral wraith"
    long: >-
      An incorporeal horror of shadow and malice. Its chilling touch
      drains the life from the living, leaving only cold husks behind.
  rat:
    name: "Rat"
    short: "a scurrying rat"
    long: >-
      A common rat, small and quick. Alone it is barely a nuisance,
      but in swarms they can overwhelm the unwary.
  bat:
    name: "Bat"
    short: "a fluttering bat"
    long: >-
      A small bat that flits erratically through the dark corridors.
      Its echolocation guides it unerringly in pitch darkness.
  giant_eagle:
    name: "Giant Eagle"
    short: "a giant eagle"
    long: >-
      A magnificent raptor with a wingspan of twenty feet. It dives
      from above with talons that can crush a man's skull.
  giant_frog:
    name: "Giant Frog"
    short: "a giant frog"
    long: >-
      A bloated amphibian the size of a pony. Its sticky tongue
      lashes out to drag prey into its cavernous gullet.
  owlbear:
    name: "Owlbear"
    short: "a raging owlbear"
    long: >-
      A monstrous hybrid of owl and bear, with a hooked beak and
      crushing forelimbs. It hugs prey to death in a feathered embrace.
  giant_lizard:
    name: "Giant Lizard"
    short: "a giant lizard"
    long: >-
      A massive reptile with powerful jaws and a heavy tail.
      It basks in the dungeon's warmth, waiting for prey to wander close.
  werewolf:
    name: "Werewolf"
    short: "a snarling werewolf"
    long: >-
      A cursed human trapped between wolf and man. Only silver or
      magic weapons can pierce its supernaturally tough hide.
  wererat:
    name: "Wererat"
    short: "a shifty wererat"
    long: >-
      A gaunt figure with twitching whiskers and beady eyes. It shifts
      between human and rat form, lurking in sewers and shadows.
  werebear:
    name: "Werebear"
    short: "a massive werebear"
    long: >-
      A towering lycanthrope with the strength of a bear. Unlike most
      shapeshifters, werebears are sometimes protectors of the wild.
  ochre_jelly:
    name: "Ochre Jelly"
    short: "a quivering ochre jelly"
    long: >-
      A shapeless mass of ochre slime that oozes along floors and walls.
      It splits into smaller copies when struck with slashing weapons.
  green_slime:
    name: "Green Slime"
    short: "a patch of green slime"
    long: >-
      A glistening green film clinging to the ceiling. It drops onto
      the unwary, dissolving armor and flesh with terrifying speed.
  black_pudding:
    name: "Black Pudding"
    short: "a black pudding"
    long: >-
      The largest and deadliest of oozes, a tarry mass of acid that
      dissolves metal weapons on contact and splits when struck.
  violet_fungus:
    name: "Violet Fungus"
    short: "a violet fungus"
    long: >-
      A mushroom-like growth with writhing tendrils tipped in necrotic
      rot. Its touch withers flesh on contact.
  yellow_mold:
    name: "Yellow Mold"
    short: "a patch of yellow mold"
    long: >-
      A fuzzy golden growth coating the walls. When disturbed it
      releases a cloud of deadly spores that choke the lungs.
  mycelian:
    name: "Mycelian"
    short: "a mycelian"
    long: >-
      An intelligent fungal creature that communicates through spore
      clouds. It tends its underground gardens with quiet purpose.
  carnivorous_flower:
    name: "Carnivorous Flower"
    short: "a carnivorous flower"
    long: >-
      A massive bloom with toothed petals that snap shut on prey.
      Sweet perfume masks the stench of digesting victims within.
  dung_worm:
    name: "Dung Worm"
    short: "a dung worm"
    long: >-
      A segmented worm that burrows through refuse and loose earth.
      Its acidic secretions dissolve organic matter with ease.
  animated_armor:
    name: "Animated Armor"
    short: "a suit of animated armor"
    long: >-
      An empty suit of plate mail that moves with eerie purpose.
      No mind dwells within — only magic animates its hollow shell.
  invisible_stalker:
    name: "Invisible Stalker"
    short: "a shimmer in the air"
    long: >-
      An air elemental bound to servitude, permanently invisible.
      Only the faintest distortion in the air betrays its presence.
  centaur:
    name: "Centaur"
    short: "a centaur"
    long: >-
      A noble creature with the torso of a human and the body of a
      horse. It charges with lance lowered at tremendous speed.
  dragon_lizard:
    name: "Dragon Lizard"
    short: "a dragon lizard"
    long: >-
      A large reptile with vestigial wings and a throat that glows
      with inner fire. It spews gouts of flame at anything that moves.
  geckonid:
    name: "Geckonid Lizard"
    short: "a geckonid lizard"
    long: >-
      A nimble lizard with adhesive pads on its feet that let it
      scurry across walls and ceilings with unnatural speed.
  cave_locust:
    name: "Giant Cave Locust"
    short: "a giant cave locust"
    long: >-
      An enormous insect with powerful hind legs that propel it in
      great leaps. It spits a foul brown liquid when threatened.
  insect_swarm:
    name: "Insect Swarm"
    short: "a buzzing insect swarm"
    long: >-
      A roiling cloud of biting, stinging insects. Individual blows
      do little — the swarm must be burned or fled from.
  mechanical_raven:
    name: "Mechanical Raven"
    short: "a mechanical raven"
    long: >-
      A clockwork bird of brass and silver gears. Its glass eyes
      record everything they see for its distant master.
  chaos_spawn:
    name: "Desori"
    short: "a writhing desori"
    long: >-
      A creature of pure entropy, its form constantly shifting between
      states. Reality warps and frays in its chaotic wake.
  fell_spirit:
    name: "Drapat"
    short: "a cackling drapat"
    long: >-
      A tiny imp-like creature with bat wings and a wicked grin.
      It delights in petty mischief and cruel pranks.
  gray_ooze:
    name: "Gray Ooze"
    short: "a gray ooze"
    long: >-
      A pool of viscous gray slime that resembles wet stone. Its
      acidic body dissolves metal on contact, ruining weapons and armor.
  merchant:
    name: "Merchant"
    short: "a travelling merchant"
    long: >-
      A weathered trader with a heavy pack and shrewd eyes. They
      brave the dungeon depths in search of profit and rare finds.
  animated_bones:
    name: "Animated Bones"
    short: "a pile of animated bones"
    long: >-
      A loose collection of bones held together by fading necromancy.
      They clatter and scrape as they drag themselves toward the living.

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Sword"
    short: "a steel sword"
    long: >-
      A well-balanced blade of tempered steel, worn but sharp.
  dagger:
    name: "Dagger"
    short: "a sharp dagger"
    long: >-
      A short blade with a leather-wrapped grip.
      Quick to draw, quick to cut.
  short_sword:
    name: "Short Sword"
    short: "a short sword"
    long: >-
      A compact blade favored by skirmishers.
      Well-suited for close quarters.
  healing_potion:
    name: "Healing Potion"
    short: "a crimson potion"
    long: >-
      A small glass vial filled with a glowing red liquid.
      It smells faintly of iron and herbs.
  potion_strength:
    name: "Potion of Strength"
    short: "a fiery red potion"
    long: >-
      A thick red liquid that surges with inner power.
      Permanently increases your strength.
  potion_frost:
    name: "Potion of Frost"
    short: "an ice-blue potion"
    long: >-
      Frozen crystals swirl inside this vial. When consumed,
      it sends a wave of freezing cold outward.
  potion_invisibility:
    name: "Potion of Invisibility"
    short: "a transparent potion"
    long: >-
      Nearly impossible to see — the liquid is perfectly clear.
      Drinking it renders you invisible for a time.
  potion_levitation:
    name: "Potion of Levitation"
    short: "a light white potion"
    long: >-
      Weightless bubbles float within this vial. Drinking it
      lets you drift above the ground, avoiding traps.
  potion_liquid_flame:
    name: "Potion of Liquid Flame"
    short: "a volatile orange potion"
    long: >-
      Warm to the touch. The liquid roils with contained fire.
      Drinking it unleashes flames on all nearby.
  potion_mind_vision:
    name: "Potion of Mind Vision"
    short: "a swirling purple potion"
    long: >-
      Purple wisps dance within the vial. Drinking it attunes
      your senses to detect living creatures through walls.
  potion_paralytic_gas:
    name: "Potion of Paralytic Gas"
    short: "a yellow potion"
    long: >-
      Thick yellow fumes press against the stopper. Drinking it
      releases a numbing gas that paralyzes nearby foes.
  potion_purification:
    name: "Potion of Purification"
    short: "a bright green potion"
    long: >-
      Glowing with inner clarity. Drinking it cleanses all
      poison and harmful effects from your body.
  gold:
    name: "Gold"
    short: "a pile of gold coins"
    long: >-
      Tarnished coins bearing an unfamiliar crest.
      Still good enough to spend.
  shield:
    name: "Shield"
    short: "a wooden shield"
    long: >-
      A round wooden shield reinforced with iron bands.
      Grants +1 armor defense.
  helmet:
    name: "Helmet"
    short: "an iron helmet"
    long: "A sturdy iron helmet that protects the head. +1 armor defense."
  gambeson:
    name: "Gambeson"
    short: "a quilted gambeson"
    long: "Thick padded cloth armor. Light and quiet. Defense 12."
  brigantine:
    name: "Brigantine"
    short: "a brigantine vest"
    long: "Small steel plates riveted inside a leather vest. Defense 13."
  chain_mail:
    name: "Chain Mail"
    short: "a chain mail hauberk"
    long: "Interlocking iron rings woven into a full shirt. Defense 14."
  plate_cuirass:
    name: "Plate Cuirass"
    short: "a steel cuirass"
    long: "A breastplate of tempered steel. Heavy but formidable. Defense 15."
  full_plate:
    name: "Full Plate"
    short: "a suit of full plate"
    long: "Complete plate armor covering the entire body. Defense 16."
  club:
    name: "Club"
    short: "a heavy club"
    long: "A thick wooden club, crude but effective. 1d4 damage."
  spear:
    name: "Spear"
    short: "a sharp spear"
    long: "A wooden shaft tipped with a steel point. 1d8 damage."
  mace:
    name: "Mace"
    short: "a flanged mace"
    long: "A heavy iron head on a wooden haft. Crushes armor. 1d8 damage."
  axe:
    name: "Axe"
    short: "a battle axe"
    long: "A broad-bladed axe built for war, not timber. 1d8 damage."
  halberd:
    name: "Halberd"
    short: "a long halberd"
    long: "An axe blade mounted on a six-foot pole. Two-handed. 1d10 damage."
  war_hammer:
    name: "War Hammer"
    short: "a war hammer"
    long: "A heavy hammer designed to dent plate armor. Two-handed. 1d10 damage."
  sling:
    name: "Sling"
    short: "a leather sling"
    long: "A simple strip of leather for hurling stones. 1d4 damage."
  bow:
    name: "Bow"
    short: "a shortbow"
    long: "A compact bow of yew wood. Two-handed. 1d6 damage."
  rope:
    name: "Rope"
    short: "a coil of rope"
    long: "Fifty feet of sturdy hemp rope. Useful for climbing and binding."
  torch:
    name: "Torch"
    short: "a pitch torch"
    long: "A wooden torch dipped in pitch. Burns for about one hour."
  lantern:
    name: "Lantern"
    short: "an oil lantern"
    long: "A tin lantern with glass panes. Burns oil for steady light."
  crowbar:
    name: "Crowbar"
    short: "an iron crowbar"
    long: "A heavy iron bar for prying open doors, lids, and grates."
  hammer:
    name: "Hammer"
    short: "a claw hammer"
    long: "A common hammer for driving stakes and nails."
  lockpicks:
    name: "Lockpicks"
    short: "a set of lockpicks"
    long: "Thin metal picks for opening locks without a key."
  mirror:
    name: "Mirror"
    short: "a small silver mirror"
    long: "A palm-sized polished silver mirror. Useful for peeking around corners."
  pole:
    name: "Pole"
    short: "a ten-foot pole"
    long: "A wooden pole ten feet long. Pokes traps from a safe distance."
  sack:
    name: "Sack"
    short: "a cloth sack"
    long: "A large cloth sack for carrying loot."
  candles:
    name: "Candles"
    short: "a bundle of candles"
    long: "Five tallow candles. Each burns for about four hours."
  chain:
    name: "Chain"
    short: "an iron chain"
    long: "Ten feet of heavy iron chain. Strong enough to bind a prisoner."
  grappling_hook:
    name: "Grappling Hook"
    short: "a grappling hook"
    long: "A three-pronged iron hook for climbing when attached to rope."
  tent:
    name: "Tent"
    short: "a canvas tent"
    long: "A small tent for one person. Provides shelter from the elements."
  tinderbox:
    name: "Tinderbox"
    short: "a tinderbox"
    long: "Flint, steel, and dry tinder for starting fires."
  rations:
    name: "Rations"
    short: "travel rations"
    long: "Dried meat, hard bread, and nuts. Enough for one day."
  staff:
    name: "Quarterstaff"
    short: "a wooden quarterstaff"
    long: "A sturdy six-foot wooden staff. Simple but versatile. 1d4 damage."
  long_sword:
    name: "Long Sword"
    short: "a long two-handed sword"
    long: "A massive blade requiring both hands. Devastating strikes. 1d10 damage."
  hand_axe:
    name: "Hand Axe"
    short: "a hand axe"
    long: "A small axe balanced for throwing or melee. 1d6 damage."
  javelin:
    name: "Javelin"
    short: "a throwing javelin"
    long: "A light spear designed for throwing at range. 1d4 damage."
  silver_dagger:
    name: "Silver Dagger"
    short: "a silver dagger"
    long: "A dagger forged from pure silver. Harms creatures immune to normal weapons."
  leather_armor:
    name: "Leather Armor"
    short: "a leather jerkin"
    long: "Hardened leather shaped into a protective vest. Light and quiet. Defense 11."
  garlic:
    name: "Garlic"
    short: "a braid of garlic"
    long: "Three heads of pungent garlic. Undead creatures recoil from its scent."
  wolfsbane:
    name: "Wolfsbane"
    short: "a sprig of wolfsbane"
    long: "A purple flowering herb also called aconite. Repels lycanthropes."
  holy_symbol:
    name: "Holy Symbol"
    short: "a silver holy symbol"
    long: "A sacred emblem on a silver chain. Required for turning undead."
  oil_flask:
    name: "Oil Flask"
    short: "a flask of oil"
    long: "A clay flask of flammable oil. Throw it to create a burst of flame. 1d8 damage."
  healing_bandage:
    name: "Healing Bandage"
    short: "a linen bandage"
    long: "Clean linen strips treated with healing herbs. Restores 1d2 HP."
  crossbow:
    name: "Crossbow"
    short: "a heavy crossbow"
    long: "A mechanical bow that fires bolts with deadly force. Two-handed. 1d8 damage."
  arrows:
    name: "Arrows"
    short: "a quiver of arrows"
    long: "Twenty feathered arrows for use with bows and crossbows."
  holy_water:
    name: "Holy Water"
    short: "a vial of holy water"
    long: "Blessed water in a glass vial. Burns undead on contact."
  spyglass:
    name: "Spyglass"
    short: "a brass spyglass"
    long: "A collapsible brass telescope for seeing distant things clearly."
  vial:
    name: "Vial"
    short: "an empty glass vial"
    long: "A small glass container for holding liquids."
  glass_marbles:
    name: "Glass Marbles"
    short: "a bag of glass marbles"
    long: "A pouch of smooth glass marbles. Scatter them to trip pursuers."
  air_bladder:
    name: "Air Bladder"
    short: "an inflated bladder"
    long: "An animal bladder inflated with air. Useful for floating."
  waterskin:
    name: "Waterskin"
    short: "a leather waterskin"
    long: "A leather bag for carrying water. Holds enough for one day."
  crampons:
    name: "Crampons"
    short: "a pair of crampons"
    long: "Iron spikes that strap to boots for climbing ice and rock."
  padlock:
    name: "Padlock"
    short: "an iron padlock"
    long: "A sturdy iron padlock with a key. For securing doors and chests."
  bell:
    name: "Bell"
    short: "a small brass bell"
    long: "A tiny bell that rings at the slightest touch. Good for alarms."
  fishing_rod:
    name: "Fishing Rod"
    short: "a fishing rod"
    long: "A simple rod with line and hooks for catching fish."
  chisel:
    name: "Chisel"
    short: "a steel chisel"
    long: "A sharp-edged tool for carving stone and chipping mortar."
  nails:
    name: "Nails"
    short: "a handful of iron nails"
    long: "Twelve iron nails. For securing boards or improvised caltrops."
  glue:
    name: "Glue"
    short: "a pot of glue"
    long: "A small pot of strong adhesive. Sets in minutes."
  twine:
    name: "Twine"
    short: "a ball of twine"
    long: "Three hundred feet of thin but strong string."
  horn:
    name: "Horn"
    short: "a signal horn"
    long: "A curved horn that produces a deep, carrying note."
  incense:
    name: "Incense"
    short: "a packet of incense"
    long: "Aromatic sticks that produce fragrant smoke when lit."
  rope_ladder:
    name: "Rope Ladder"
    short: "a rope ladder"
    long: "A ten-foot ladder of rope and wooden rungs. Rolls up small."
  sponge:
    name: "Sponge"
    short: "a large sponge"
    long: "A natural sea sponge for absorbing liquids."
  iron_stakes:
    name: "Iron Stakes"
    short: "iron stakes"
    long: "Five iron stakes for anchoring ropes or blocking doors."
  wooden_stakes:
    name: "Wooden Stakes"
    short: "wooden stakes"
    long: "Five sharpened wooden stakes. Effective against vampires."
  bucket:
    name: "Bucket"
    short: "a wooden bucket"
    long: "A sturdy wooden bucket for carrying water or other liquids."
  grease:
    name: "Grease"
    short: "a jar of grease"
    long: "Black grease for lubricating mechanisms or making surfaces slippery."
  chalk:
    name: "Chalk"
    short: "a bundle of chalk"
    long: "Ten pieces of white chalk for marking walls and surfaces."
  instrument:
    name: "Musical Instrument"
    short: "a musical instrument"
    long: "A portable instrument — perhaps a flute, lute, or drum."
  loaded_dice:
    name: "Loaded Dice"
    short: "a set of loaded dice"
    long: "Weighted dice that always roll in your favor. If no one checks."
  fake_jewels:
    name: "Fake Jewels"
    short: "a pouch of fake jewels"
    long: "Glass stones cut to look like gems. Convincing to the untrained eye."
  lens:
    name: "Lens"
    short: "a magnifying lens"
    long: "A polished glass lens for examining small details or focusing light."
  blank_book:
    name: "Blank Book"
    short: "a blank book"
    long: "A leather-bound book with empty pages. For notes or sketches."
  metal_file:
    name: "Metal File"
    short: "a metal file"
    long: "A coarse steel file for cutting through iron bars and chains."
  manacles:
    name: "Manacles"
    short: "a pair of iron manacles"
    long: "Heavy iron shackles for restraining prisoners."
  bellows:
    name: "Bellows"
    short: "a pair of bellows"
    long: "Leather bellows for fanning flames or blowing dust."
  pots_and_pans:
    name: "Pots and Pans"
    short: "a set of pots and pans"
    long: "Cooking equipment. Makes noise if disturbed."
  shovel:
    name: "Shovel"
    short: "a short shovel"
    long: "A folding shovel for digging holes and trenches."
  perfume:
    name: "Perfume"
    short: "a bottle of perfume"
    long: "A small crystal bottle of strong perfume. Masks scent."
  pick:
    name: "Pick"
    short: "a mining pick"
    long: "A heavy pointed tool for breaking rock and digging."
  iron_tongs:
    name: "Iron Tongs"
    short: "a pair of iron tongs"
    long: "Long-handled tongs for gripping hot or dangerous objects."
  face_paint:
    name: "Face Paint"
    short: "a tin of face paint"
    long: "Colored paste for disguises, war paint, or camouflage."
  quill_and_ink:
    name: "Quill and Ink"
    short: "a quill and ink pot"
    long: "A goose feather quill and a small pot of black ink."
  pulley:
    name: "Pulley"
    short: "a rope pulley"
    long: "A small wooden pulley for lifting heavy loads with rope."
  tar_pot:
    name: "Tar Pot"
    short: "a pot of tar"
    long: "A sealed pot of thick black tar. Burns fiercely when lit."
  hourglass:
    name: "Hourglass"
    short: "a small hourglass"
    long: "A brass-framed hourglass that measures one hour precisely."
  soap:
    name: "Soap"
    short: "a bar of soap"
    long: "A cake of harsh lye soap. Cleans anything, eventually."
  sleeping_bag:
    name: "Sleeping Bag"
    short: "a bedroll"
    long: "A rolled blanket and ground cloth for sleeping outdoors."
  saw:
    name: "Saw"
    short: "a hand saw"
    long: "A short-bladed saw for cutting wood and bone."
  bear_trap:
    name: "Bear Trap"
    short: "a bear trap"
    long: "A spring-loaded iron jaw trap. Deadly to anything that steps on it."
  drill:
    name: "Drill"
    short: "a hand drill"
    long: "A spiral-pointed tool for boring holes in wood and thin stone."
  net:
    name: "Net"
    short: "a throwing net"
    long: "A weighted net for entangling creatures."
  whistle:
    name: "Whistle"
    short: "a tin whistle"
    long: "A shrill whistle for signaling or distracting."
  lamp_oil:
    name: "Lamp Oil"
    short: "a flask of lamp oil"
    long: "A flask of oil for lanterns. Burns for eight hours."
  ring_mending:
    name: "Ring of Mending"
    short: "a ring of mending"
    long: "A warm ring that pulses gently. Regenerates 1 HP every 5 turns while worn."
  ring_haste:
    name: "Ring of Haste"
    short: "a ring of haste"
    long: "Time seems to blur around this ring. Grants an extra action each turn."
  ring_detection:
    name: "Ring of Detection"
    short: "a ring of detection"
    long: "Tingles near hidden things. Automatically reveals traps and secret doors."
  ring_elements:
    name: "Ring of Elements"
    short: "a ring of elements"
    long: "Shimmers with inner fire and frost. Halves fire and cold damage."
  ring_accuracy:
    name: "Ring of Accuracy"
    short: "a ring of accuracy"
    long: "Steadies the hand. Grants +2 to melee attack rolls."
  ring_evasion:
    name: "Ring of Evasion"
    short: "a ring of evasion"
    long: "Light as a feather on the finger. Grants +2 to armor defense."
  ring_shadows:
    name: "Ring of Shadows"
    short: "a ring of shadows"
    long: "Darkness clings to the wearer. Creatures detect you at half range."
  ring_protection:
    name: "Ring of Protection"
    short: "a ring of protection"
    long: "A faint ward surrounds the wearer. Grants +1 to armor defense."
  wand_firebolt:
    name: "Wand of Firebolt"
    short: "a wand of firebolt"
    long: "Unleashes a bolt of fire at a target. 2d6 fire damage."
  wand_lightning:
    name: "Wand of Lightning"
    short: "a wand of lightning"
    long: "Arcs of electricity leap toward the target. 3d4 damage."
  wand_teleport:
    name: "Wand of Teleportation"
    short: "a wand of teleportation"
    long: "Blinks the target to a random location on the level."
  wand_poison:
    name: "Wand of Poison"
    short: "a wand of poison"
    long: "Injects magical venom. 2 damage per turn for 5 turns."
  wand_slowness:
    name: "Wand of Slowness"
    short: "a wand of slowness"
    long: "Time crawls around the target. Halves speed for 8 turns."
  wand_disintegrate:
    name: "Wand of Disintegration"
    short: "a wand of disintegration"
    long: "A piercing beam of annihilation. 3d6 damage in a line."
  wand_magic_missile:
    name: "Wand of Magic Missile"
    short: "a wand of magic missile"
    long: "A bolt of pure force that never misses. 1d6+1 damage."
  wand_amok:
    name: "Wand of Amok"
    short: "a wand of amok"
    long: "Drives the target into a frenzy. Confused for 6 turns."
  scroll_lightning:
    name: "Scroll of Lightning"
    short: "a crackling scroll"
    long: >-
      A parchment scroll inscribed with arcane symbols.
      Lightning arcs between the letters.
  scroll_sleep:
    name: "Scroll of Sleep"
    short: "a pale blue scroll"
    long: >-
      Drowsy violet ink fills this parchment with spiraling
      sigils. The words blur and slow before your eyes.
  scroll_magic_missile:
    name: "Scroll of Magic Missile"
    short: "a shimmering scroll"
    long: >-
      Dense arcane notation describes an arrow of force
      that flies true and never misses its mark.
  scroll_hold_person:
    name: "Scroll of Hold Person"
    short: "a yellow scroll"
    long: >-
      Words of binding fill this scroll. Humanoids who
      hear them spoken are frozen in place.
  scroll_fireball:
    name: "Scroll of Fireball"
    short: "a scorched scroll"
    long: >-
      Warm to the touch and smelling of sulfur. A diagram
      depicts a 20-foot sphere of roaring flame.
  scroll_web:
    name: "Scroll of Web"
    short: "a sticky scroll"
    long: >-
      Fine threads are woven between the letters of this scroll.
      It fills a room with clinging webs that slow all who touch them.
  scroll_charm_person:
    name: "Scroll of Charm Person"
    short: "a rose-tinted scroll"
    long: >-
      Calligraphed in rose ink with spiraling hearts and moons.
      The words make one humanoid see you as a trusted friend.
  scroll_bless:
    name: "Scroll of Bless"
    short: "a gilded scroll"
    long: >-
      Etched in gold leaf on white parchment. Reading it
      fills allies with divine courage and martial resolve.
  scroll_mirror_image:
    name: "Scroll of Mirror Image"
    short: "a silvered scroll"
    long: >-
      The parchment reflects your face back at you. Reading it
      conjures 1d4 illusory duplicates to confuse attackers.
  scroll_invisibility:
    name: "Scroll of Invisibility"
    short: "a translucent scroll"
    long: >-
      Nearly transparent parchment with faint words visible only
      at certain angles. Reading it renders you unseen.
  scroll_haste:
    name: "Scroll of Haste"
    short: "a blurred scroll"
    long: >-
      The letters seem to move as you read this scroll.
      Haste doubles your attacks for 3 turns.
  scroll_cure_wounds:
    name: "Scroll of Cure Wounds"
    short: "a green scroll"
    long: >-
      Written in soothing emerald ink. Reading it closes
      minor wounds and restores 1d6+1 HP.
  scroll_protection_evil:
    name: "Scroll of Protection from Evil"
    short: "a bright-blue scroll"
    long: >-
      Inscribed with holy wards and warding circles.
      Grants +1 saves and hampers evil creatures for 12 turns.
  scroll_detect_magic:
    name: "Scroll of Detect Magic"
    short: "a glowing cyan scroll"
    long: >-
      Runes pulse faintly on this parchment. Reading it reveals
      every magical item on the current level.
  scroll_detect_evil:
    name: "Scroll of Detect Evil"
    short: "a pale scroll with dark runes"
    long: >-
      Inked in blood-red sigils that seem to writhe. Reading it
      reveals hostile creatures even through walls.
  scroll_detect_invisibility:
    name: "Scroll of Detect Invisibility"
    short: "a shimmering scroll"
    long: >-
      The parchment shifts between visible and translucent. Reading
      it grants sight of invisible creatures for 12 turns.
  scroll_find_traps:
    name: "Scroll of Find Traps"
    short: "a cautious yellow scroll"
    long: >-
      Geometric diagrams fill this parchment. Reading it reveals
      every hidden trap on the current level.
  scroll_light:
    name: "Scroll of Light"
    short: "a radiant scroll"
    long: >-
      Warm golden light seeps from between the rolled edges. Reading
      it bathes the area in bright light for 20 turns.
  scroll_remove_fear:
    name: "Scroll of Remove Fear"
    short: "a calming white scroll"
    long: >-
      Soothing words of courage fill this parchment. Reading it
      dispels paralysis and fear from your mind.
  scroll_shield:
    name: "Scroll of Shield"
    short: "a reinforced scroll"
    long: >-
      A shimmering barrier diagram covers this parchment. Reading
      it conjures a magical shield granting +2 AC for 8 turns.
  scroll_resist_cold:
    name: "Scroll of Resist Cold"
    short: "a frost-rimmed scroll"
    long: >-
      Ice crystals form along the edges of this parchment. Reading
      it halves all cold damage for 12 turns.
  scroll_resist_fire:
    name: "Scroll of Resist Fire"
    short: "a heat-resistant scroll"
    long: >-
      The parchment is warm to the touch yet never burns. Reading
      it halves all fire damage for 12 turns.
  scroll_levitate:
    name: "Scroll of Levitate"
    short: "a weightless scroll"
    long: >-
      This scroll drifts upward if released. Reading it lets you
      float above the ground, avoiding traps for 12 turns.
  scroll_fly:
    name: "Scroll of Fly"
    short: "a wind-swept scroll"
    long: >-
      Feather-light ink traces wing patterns on this scroll. Reading
      it grants free flight for 6 turns.
  scroll_dispel_magic:
    name: "Scroll of Dispel Magic"
    short: "a nullifying scroll"
    long: >-
      Anti-magic sigils cover every inch of this parchment. Reading
      it strips all magical effects from creatures nearby.
  scroll_protection_missiles:
    name: "Scroll of Protection from Missiles"
    short: "a warded blue scroll"
    long: >-
      Concentric warding circles cover this scroll. Reading it
      deflects all ranged attacks for 12 turns.
  scroll_silence:
    name: "Scroll of Silence"
    short: "a mute grey scroll"
    long: >-
      No sound emerges when you ruffle this parchment. Reading it
      creates a zone of absolute silence for 12 turns.
  scroll_phantasmal_force:
    name: "Scroll of Phantasmal Force"
    short: "a swirling scroll"
    long: >-
      Illusory shapes dance across the parchment. Reading it fills
      enemies' minds with terrifying hallucinations.
  scroll_clairvoyance:
    name: "Scroll of Clairvoyance"
    short: "a far-seeing scroll"
    long: >-
      A tiny eye is drawn at the center of this scroll. Reading it
      reveals the layout of the surrounding area.
  scroll_infravision:
    name: "Scroll of Infravision"
    short: "a dark-red scroll"
    long: >-
      Written in ink visible only in darkness. Reading it grants
      the ability to see heat signatures for 20 turns.
  scroll_continual_light:
    name: "Scroll of Continual Light"
    short: "a blazing scroll"
    long: >-
      Blinding white text on golden parchment. Reading it creates
      a permanent light source that never dims.
  scroll_water_breathing:
    name: "Scroll of Water Breathing"
    short: "a damp scroll"
    long: >-
      The ink shimmers like water. Reading it grants the ability
      to breathe underwater for 20 turns.
  scroll_charm_snakes:
    name: "Scroll of Charm Snakes"
    short: "a serpentine scroll"
    long: >-
      Sinuous patterns coil across this parchment. Reading it
      pacifies all serpent-type creatures nearby.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Pit Trap"
    short: "a concealed pit"
    long: >-
      The flagstones here look subtly different — lighter,
      as if placed more recently.
