# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Pit Trap"
    short: "a concealed pit"
    long: "The flagstones here look subtly different — lighter, as if placed more recently."
  trap_fire:
    name: "Fire Trap"
    short: "a fire trap"
    long: "Scorch marks on the stone hint at hidden jets of flame."
  trap_poison:
    name: "Poison Trap"
    short: "a poison trap"
    long: "Tiny holes in the wall conceal needle-thin darts tipped with venom."
  trap_paralysis:
    name: "Paralysis Trap"
    short: "a paralysis trap"
    long: "A faint chemical smell lingers — a gas trap rigged to freeze muscles."
  trap_alarm:
    name: "Alarm Trap"
    short: "an alarm trap"
    long: "A thin tripwire connects to a shrieking mechanism in the wall."
  trap_teleport:
    name: "Teleport Trap"
    short: "a teleport trap"
    long: "Arcane runes shimmer faintly on the floor, forming a teleportation circle."
  trap_summoning:
    name: "Summoning Trap"
    short: "a summoning trap"
    long: "A pentagram is etched into the stone, ready to conjure creatures."
  trap_gripping:
    name: "Gripping Trap"
    short: "a gripping trap"
    long: "Iron jaws lie hidden beneath a thin layer of dust and stone."
  trap_arrow:
    name: "Arrow Trap"
    short: "an arrow trap"
    long: "A tiny slit in the wall hides a loaded crossbow mechanism."
  trap_darts:
    name: "Darts Trap"
    short: "a darts trap"
    long: "Three sets of blowpipe holes are cunningly concealed in the stonework."
  trap_falling_stone:
    name: "Falling Stone Trap"
    short: "a falling stone trap"
    long: "A crack in the ceiling marks where a heavy counterweighted stone waits to drop."
  trap_spores:
    name: "Spore Trap"
    short: "a spore trap"
    long: "Dried fungal pods are nestled between the flagstones, ready to burst."
  trap_trapdoor:
    name: "Trap Door"
    short: "a concealed trap door"
    long: "The floor here is thinner than it looks — a hinged section ready to swing open."

