# NHC English locale — authoritative string catalog
# Keys use dotted notation: section.subsection.key
# Use {name} for interpolation placeholders

# ── Combat ────────────────────────────────────────────────────────────
combat:
  hit: "{attacker} hits {target} for {damage} damage."
  miss: "{attacker} misses {target}."
  slain: "{target} is slain!"
  destroyed: "{target} is destroyed!"
  drops: "{target} drops: {items}."
  unarmed: "unarmed"
  drained: "{attacker} drains the life from {target}! Max HP reduced."
  poisoned: "{target} is poisoned!"
  poison_tick: "{target} writhes in agony from the poison! {damage} damage."
  petrified: "{target} meets the basilisk's gaze and turns to stone!"
  petrify_saved: "{target} averts their eyes just in time."
  paralyzed_turn: "You are paralyzed and cannot move!"
  sleeping_turn: "You sleep helplessly..."

# ── Movement & Exploration ────────────────────────────────────────────
explore:
  open_door: "{actor} opens a door."
  see_item: "You see {item} here."
  see_items: "You see {count} items here: {items}."
  see_feature: "You see {feature} here."
  see_creature: "You see {creature}{status}."
  nothing_special: "Nothing special here."
  spot_creature: "You spot {creature}!"
  descend: "You descend deeper into the dungeon..."

# ── Health status descriptions ────────────────────────────────────────
health_status:
  uninjured: " (uninjured)"
  lightly_wounded: " (lightly wounded)"
  badly_wounded: " (badly wounded)"
  near_death: " (near death)"

# ── Feature names ─────────────────────────────────────────────────────
feature:
  stairs_up: "stairs leading up"
  stairs_down: "stairs leading down"
  door_open: "an open door"
  door_closed: "a closed door"

# ── Items & Inventory ─────────────────────────────────────────────────
item:
  picked_up: "Picked up {item}."
  equipped: "Equipped {item}."
  full_inventory: "Inventory is full!"
  nothing_to_pickup: "Nothing to pick up here."
  full_health: "Already at full health."
  quaff_heal: "Quaff {item}. Healed {amount} HP."
  nothing_happens: "Nothing happens."
  no_target: "No target in sight!"
  lightning_strike: "Lightning from {item} strikes {target} for {damage} damage!"
  sleep_cast: "The scroll crumbles to dust..."
  sleep_affects: "{target} falls into a magical slumber!"
  sleep_none: "No creatures fall asleep."
  missile_hits: "A bolt of force strikes {target} for {damage} damage!"
  hold_cast: "Words of power echo through the dungeon..."
  hold_affects: "{target} freezes in place!"
  hold_no_humanoids: "No humanoids are in sight."
  fireball_cast: "A roaring ball of fire explodes!"
  fireball_hits: "{target} is scorched for {damage} damage!"

# ── Traps ─────────────────────────────────────────────────────────────
trap:
  avoided: "{entity} notices {trap} and avoids it!"
  triggered: "{entity} falls into {trap}! {damage} damage!"

# ── Game state ────────────────────────────────────────────────────────
game:
  welcome: "Welcome to {name}."
  died: "You have died!"
  slain_by: "You were slain by {killer}!"
  game_saved: "Game saved."
  save_failed: "Save failed: {error}"
  no_save: "No save file found."
  game_loaded: "Game loaded."
  load_failed: "Load failed: {error}"
  xp_gained: "+{xp} XP"
  player_name: "You"

# ── Level up ──────────────────────────────────────────────────────────
levelup:
  with_ability: "Level {level}! +{hp} HP, +1 {ability}."
  no_ability: "Level {level}! +{hp} HP."

# ── UI labels ─────────────────────────────────────────────────────────
ui:
  depth: "Depth"
  turn: "Turn"
  empty: "empty"
  scroll_hint: "scroll"
  esc_cancel: "  ESC to cancel"
  inventory_title: "Inventory (ESC to close)"
  use_which: "Use which item?"
  victory_title: "VICTORY!"
  victory_desc: "You have descended deeper into the dungeon."
  death_title: "YOU DIED"
  death_desc: "Your adventure ends here."
  end_footer: "Survived {turn} turns. Press any key to exit."

# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "a snarling goblin"
    long: >-
      A wiry, green-skinned creature with yellowed fangs
      and a rusty blade.
  skeleton:
    name: "Skeleton"
    short: "a rattling skeleton"
    long: >-
      Bleached bones held together by dark magic,
      wielding a notched blade.
  rat:
    name: "Giant Rat"
    short: "a giant rat"
    long: >-
      A mangy rat the size of a dog, its eyes gleaming
      with feral hunger.
  orc:
    name: "Orc"
    short: "a hulking orc"
    long: >-
      A muscular brute with tusks and crude iron armor.
      It grunts aggressively.
  zombie:
    name: "Zombie"
    short: "a shambling zombie"
    long: >-
      A decomposing corpse that refuses to stay dead.
      The stench is overwhelming.
  gnoll:
    name: "Gnoll"
    short: "a hyena-headed gnoll"
    long: >-
      A hulking humanoid with the head of a hyena.
      It laughs maniacally as it prepares to strike.
  giant_bee:
    name: "Giant Bee"
    short: "a giant bee"
    long: >-
      A bee the size of a house cat, its stinger
      dripping with amber venom.
  wight:
    name: "Wight"
    short: "a pale wight"
    long: >-
      An undead horror radiating cold malice.
      Its touch drains the very life force.
  spectre:
    name: "Spectre"
    short: "a spectral shade"
    long: >-
      A translucent wraith that drifts above the ground.
      Its gaze chills you to the bone.
  basilisk:
    name: "Basilisk"
    short: "a basilisk"
    long: >-
      A massive eight-legged lizard with glowing eyes.
      Do not meet its gaze or face petrification.
  kobold:
    name: "Kobold"
    short: "a scrappy kobold"
    long: >-
      A tiny, dog-snouted humanoid dressed in scraps of leather.
      It chatters shrilly and lunges with a rusty blade.
  hobgoblin:
    name: "Hobgoblin"
    short: "a hobgoblin soldier"
    long: >-
      A large, red-skinned goblinoid with military bearing.
      It moves in disciplined formation and fights without mercy.
  osgo:
    name: "Bugbear"
    short: "a looming bugbear"
    long: >-
      A shaggy, bear-like goblinoid that moves with unnerving silence.
      Its claws are stained dark with old blood.
  ogre:
    name: "Ogre"
    short: "a towering ogre"
    long: >-
      A massive, dim-witted giant that smashes everything in its path.
      It carries a tree trunk as a club.
  bandoler:
    name: "Bandit"
    short: "a hooded bandit"
    long: >-
      A human outlaw with a scarred face and hungry eyes.
      They step out of the shadows with blade drawn.
  uarg:
    name: "Warg"
    short: "a great warg"
    long: >-
      An enormous wolf with black fur and cruel, intelligent eyes.
      It hunts alongside orcs and speaks in guttural growls.
  llop:
    name: "Wolf"
    short: "a grey wolf"
    long: >-
      A lean grey wolf that circles warily before lunging.
      In packs they are truly deadly.
  llop_terrible:
    name: "Dire Wolf"
    short: "a dire wolf"
    long: >-
      A wolf the size of a horse, with jaws that could crush stone.
      Its red eyes fix on you with predatory certainty.
  ratpenat_gegant:
    name: "Giant Bat"
    short: "a giant bat"
    long: >-
      A bat with a wingspan wider than a man is tall.
      It swoops from the darkness with a shriek.
  os_negre:
    name: "Black Bear"
    short: "a black bear"
    long: >-
      A compact but powerful bear, usually wary of humans.
      When cornered it fights with savage ferocity.
  os_bru:
    name: "Brown Bear"
    short: "a brown bear"
    long: >-
      A massive brown bear standing nearly eight feet tall.
      Its roar shakes the walls of the dungeon.
  granyotic:
    name: "Frogman"
    short: "a frogman warrior"
    long: >-
      A humanoid with mottled green skin, bulging eyes, and
      powerful legs that can carry it over obstacles in a single leap.
  llangardanic:
    name: "Lizardman"
    short: "a lizardman"
    long: >-
      A bipedal lizard in crude armor, scaled and cold-blooded.
      Its unblinking eyes track your every move.
  escarabat_foc:
    name: "Giant Fire Beetle"
    short: "a fire beetle"
    long: >-
      A beetle the size of a dog, with glowing orange glands on its
      thorax and abdomen that cast eerie crimson light.
  gentmalgama:
    name: "Chimera-Ling"
    short: "a chimera-ling"
    long: >-
      A patchwork creature assembled from mismatched animal parts.
      Two heads argue over which direction to attack from.

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Sword"
    short: "a steel sword"
    long: >-
      A well-balanced blade of tempered steel, worn but sharp.
  dagger:
    name: "Dagger"
    short: "a sharp dagger"
    long: >-
      A short blade with a leather-wrapped grip.
      Quick to draw, quick to cut.
  short_sword:
    name: "Short Sword"
    short: "a short sword"
    long: >-
      A compact blade favored by skirmishers.
      Well-suited for close quarters.
  healing_potion:
    name: "Healing Potion"
    short: "a crimson potion"
    long: >-
      A small glass vial filled with a glowing red liquid.
      It smells faintly of iron and herbs.
  gold:
    name: "Gold"
    short: "a pile of gold coins"
    long: >-
      Tarnished coins bearing an unfamiliar crest.
      Still good enough to spend.
  shield:
    name: "Shield"
    short: "a wooden shield"
    long: >-
      A round wooden shield reinforced with iron bands.
      Grants +1 armor defense.
  scroll_lightning:
    name: "Scroll of Lightning"
    short: "a crackling scroll"
    long: >-
      A parchment scroll inscribed with arcane symbols.
      Lightning arcs between the letters.
  scroll_sleep:
    name: "Scroll of Sleep"
    short: "a pale blue scroll"
    long: >-
      Drowsy violet ink fills this parchment with spiraling
      sigils. The words blur and slow before your eyes.
  scroll_magic_missile:
    name: "Scroll of Magic Missile"
    short: "a shimmering scroll"
    long: >-
      Dense arcane notation describes an arrow of force
      that flies true and never misses its mark.
  scroll_hold_person:
    name: "Scroll of Hold Person"
    short: "a yellow scroll"
    long: >-
      Words of binding fill this scroll. Humanoids who
      hear them spoken are frozen in place.
  scroll_fireball:
    name: "Scroll of Fireball"
    short: "a scorched scroll"
    long: >-
      Warm to the touch and smelling of sulfur. A diagram
      depicts a 20-foot sphere of roaring flame.

# ── Feature descriptions ─────────────────────────────────────────────
features:
  trap_pit:
    name: "Pit Trap"
    short: "a concealed pit"
    long: >-
      The flagstones here look subtly different — lighter,
      as if placed more recently.
