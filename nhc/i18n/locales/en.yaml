  died: "You have died!"
  slain_by: "You were slain by {killer}!"
  game_saved: "Game saved."
  save_failed: "Save failed: {error}"
  no_save: "No save file found."
  game_loaded: "Game loaded."
  load_failed: "Load failed: {error}"
  xp_gained: "+{xp} XP"
  player_name: "You"

# ── Level up ──────────────────────────────────────────────────────────
levelup:
  with_ability: "Level {level}! +{hp} HP, +1 {ability}."
  no_ability: "Level {level}! +{hp} HP."

