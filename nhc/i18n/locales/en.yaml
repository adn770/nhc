# ── Creature descriptions ────────────────────────────────────────────
creature:
  goblin:
    name: "Goblin"
    short: "a snarling goblin"
    long: >-
      A wiry, green-skinned creature with yellowed fangs
      and a rusty blade.
  skeleton:
    name: "Skeleton"
    short: "a rattling skeleton"
    long: >-
      Bleached bones held together by dark magic,
      wielding a notched blade.
  giant_rat:
    name: "Giant Rat"
    short: "a giant rat"
    long: >-
      A mangy rat the size of a dog, its eyes gleaming
      with feral hunger.
  orc:
    name: "Orc"
    short: "a hulking orc"
    long: >-
      A muscular brute with tusks and crude iron armor.
      It grunts aggressively.
  zombie:
    name: "Zombie"
    short: "a shambling zombie"
    long: >-
      A decomposing corpse that refuses to stay dead.
      The stench is overwhelming.
  gnoll:
    name: "Gnoll"
    short: "a hyena-headed gnoll"
    long: >-
      A hulking humanoid with the head of a hyena.
      It laughs maniacally as it prepares to strike.
  giant_bee:
    name: "Giant Bee"
    short: "a giant bee"
    long: >-
      A bee the size of a house cat, its stinger
      dripping with amber venom.
  wight:
    name: "Wight"
    short: "a pale wight"
    long: >-
      An undead horror radiating cold malice.
      Its touch drains the very life force.
  spectre:
    name: "Spectre"
    short: "a spectral shade"
    long: >-
      A translucent wraith that drifts above the ground.
      Its gaze chills you to the bone.
  basilisk:
    name: "Basilisk"
    short: "a basilisk"
    long: >-
      A massive eight-legged lizard with glowing eyes.
      Do not meet its gaze or face petrification.
  kobold:
    name: "Kobold"
    short: "a scrappy kobold"
    long: >-
      A tiny, dog-snouted humanoid dressed in scraps of leather.
      It chatters shrilly and lunges with a rusty blade.
  hobgoblin:
    name: "Hobgoblin"
    short: "a hobgoblin soldier"
    long: >-
      A large, red-skinned goblinoid with military bearing.
      It moves in disciplined formation and fights without mercy.
  bugbear:
    name: "Bugbear"
    short: "a looming bugbear"
    long: >-
      A shaggy, bear-like goblinoid that moves with unnerving silence.
      Its claws are stained dark with old blood.
  ogre:
    name: "Ogre"
    short: "a towering ogre"
    long: >-
      A massive, dim-witted giant that smashes everything in its path.
      It carries a tree trunk as a club.
  bandit:
    name: "Bandit"
    short: "a hooded bandit"
    long: >-
      A human outlaw with a scarred face and hungry eyes.
      They step out of the shadows with blade drawn.
  warg:
    name: "Warg"
    short: "a great warg"
    long: >-
      An enormous wolf with black fur and cruel, intelligent eyes.
      It hunts alongside orcs and speaks in guttural growls.
  wolf:
    name: "Wolf"
    short: "a grey wolf"
    long: >-
      A lean grey wolf that circles warily before lunging.
      In packs they are truly deadly.
  dire_wolf:
    name: "Dire Wolf"
    short: "a dire wolf"
    long: >-
      A wolf the size of a horse, with jaws that could crush stone.
      Its red eyes fix on you with predatory certainty.
  giant_bat:
    name: "Giant Bat"
    short: "a giant bat"
    long: >-
      A bat with a wingspan wider than a man is tall.
      It swoops from the darkness with a shriek.
  black_bear:
    name: "Black Bear"
    short: "a black bear"
    long: >-
      A compact but powerful bear, usually wary of humans.
      When cornered it fights with savage ferocity.
  brown_bear:
    name: "Brown Bear"
    short: "a brown bear"
    long: >-
      A massive brown bear standing nearly eight feet tall.
      Its roar shakes the walls of the dungeon.
  frogman:
    name: "Frogman"
    short: "a frogman warrior"
    long: >-
      A humanoid with mottled green skin, bulging eyes, and
      powerful legs that can carry it over obstacles in a single leap.
  lizardman:
    name: "Lizardman"
    short: "a lizardman"
    long: >-
      A bipedal lizard in crude armor, scaled and cold-blooded.
      Its unblinking eyes track your every move.
  fire_beetle:
    name: "Giant Fire Beetle"
    short: "a fire beetle"
    long: >-
      A beetle the size of a dog, with glowing orange glands on its
      thorax and abdomen that cast eerie crimson light.
  amalgamkin:
    name: "Chimera-Ling"
    short: "a chimera-ling"
    long: >-
      A patchwork creature assembled from mismatched animal parts.
      Two heads argue over which direction to attack from.
  ghoul:
    name: "Ghoul"
    short: "a foul ghoul"
    long: >-
      An undead horror that reeks of the grave. Its clawed touch
      drains the vital spark of the living.
  giant_scorpion:
    name: "Giant Scorpion"
    short: "a giant scorpion"
    long: >-
      An arachnid the size of a horse with massive pincers and a
      barbed tail dripping with potent venom.
  giant_centipede:
    name: "Giant Centipede"
    short: "a giant centipede"
    long: >-
      A segmented horror two feet long with hundreds of legs and
      tiny venomous mandibles. Its bite is surprisingly dangerous.
  giant_tarantula:
    name: "Giant Tarantula"
    short: "a giant tarantula"
    long: >-
      A hairy spider large enough to tackle a man. Its fangs
      deliver a slow, agonizing venom.
  snakeman:
    name: "Snakeman"
    short: "a serpentine snakeman"
    long: >-
      A humanoid with a cobra's head and scaly green skin.
      It hisses a curse before striking with practiced precision.
  stirge:
    name: "Stirge"
    short: "a blood-sucking stirge"
    long: >-
      A mosquito-winged horror with a needle proboscis.
      Once it pierces flesh it drains blood with terrifying speed.
  giant_leech:
    name: "Giant Leech"
    short: "a giant leech"
    long: >-
      A bloated, rubbery worm nearly three feet long. It attaches
      itself to prey and drains blood until sated or slain.
  cockatrice:
    name: "Cockatrice"
    short: "a cockatrice"
    long: >-
      A two-legged dragon with a rooster's head and a serpentine
      tail. Its touch turns flesh to cold grey stone.
  ill_omen_bird:
    name: "Bird of Ill Omen"
    short: "a bird of ill omen"
    long: >-
      A giant raven with midnight-black feathers and pale eyes
      that gleam with unnatural malice. Its cry chills the blood.
  tentacle_worm:
    name: "Tentacle Worm"
    short: "a tentacle worm"
    long: >-
      A fat pale worm ringed with grasping tentacles. It secretes
      a numbing venom that leaves prey helpless.
  winter_wolf:
    name: "Winter Wolf"
    short: "a winter wolf"
    long: >-
      A great white wolf from the frozen north. It exhales arctic
      frost that coats enemies in ice alongside its savage bite.
  disenchanter:
    name: "Disenchanter"
    short: "a disenchanter"
    long: >-
      A pale, slug-like predator that feeds on magical energy.
      Its touch unravels enchantments and leaves scrolls as dust.
  shrieker:
    name: "Shrieker"
    short: "a shrieker"
    long: >-
      A violet-capped mushroom that emits a deafening shriek when
      disturbed, alerting every creature in earshot.
  giant_snake:
    name: "Giant Snake"
    short: "a giant snake"
    long: >-
      A colossal serpent that can swallow a man whole. Its hollow
      fangs inject a lethal venom.
  troll:
    name: "Troll"
    short: "a loathsome troll"
    long: >-
      A rubbery, loping giant with a gaping maw and claws like black
      iron. Its wounds knit closed before your eyes — only fire stops
      its regeneration.
  mummy:
    name: "Mummy"
    short: "a bandaged mummy"
    long: >-
      A desiccated corpse wrapped in yellowed linen. The mere sight
      inspires supernatural dread, and its touch spreads the rot
      that slowly consumes the living.
  gargoyle:
    name: "Gargoyle"
    short: "a stone gargoyle"
    long: >-
      A winged statue that has learned to live. Stone skin turns
      aside ordinary weapons — only magic can pierce its hide.
  banshee:
    name: "Banshee"
    short: "a wailing banshee"
    long: >-
      The spirit of a woman wronged in life, hovering in torn burial
      robes. Her scream can stop a heart cold.
  mimic:
    name: "Mimic"
    short: "a treasure chest"
    long: >-
      What you took for a treasure chest lunges at you with a
      tooth-lined maw. Mimics are patient, deadly ambush hunters.
  harpy:
    name: "Harpy"
    short: "a singing harpy"
    long: >-
      A winged woman with a vulture's body and a voice like silver
      bells. Her song compels listeners to walk blindly into her claws.
  dryad:
    name: "Dryad"
    short: "a beguiling dryad"
    long: >-
      A wood-spirit of flawless beauty, guardian of an ancient tree.
      Her touch weaves a charm that turns enemies into willing servants.
  wyvern:
    name: "Wyvern"
    short: "a lethal wyvern"
    long: >-
      A two-legged draconic predator with a barbed tail coated in
      venom. It lacks a dragon's magic but makes up for it in savagery.
  wraith:
    name: "Wraith"
    short: "a spectral wraith"
    long: >-
      An incorporeal horror of shadow and malice. Its chilling touch
      drains the life from the living, leaving only cold husks behind.
  rat:
    name: "Rat"
    short: "a scurrying rat"
    long: >-
      A common rat, small and quick. Alone it is barely a nuisance,
      but in swarms they can overwhelm the unwary.
  bat:
    name: "Bat"
    short: "a fluttering bat"
    long: >-
      A small bat that flits erratically through the dark corridors.
      Its echolocation guides it unerringly in pitch darkness.
  giant_eagle:
    name: "Giant Eagle"
    short: "a giant eagle"
    long: >-
      A magnificent raptor with a wingspan of twenty feet. It dives
      from above with talons that can crush a man's skull.
  giant_frog:
    name: "Giant Frog"
    short: "a giant frog"
    long: >-
      A bloated amphibian the size of a pony. Its sticky tongue
      lashes out to drag prey into its cavernous gullet.
  owlbear:
    name: "Owlbear"
    short: "a raging owlbear"
    long: >-
      A monstrous hybrid of owl and bear, with a hooked beak and
      crushing forelimbs. It hugs prey to death in a feathered embrace.
  giant_lizard:
    name: "Giant Lizard"
    short: "a giant lizard"
    long: >-
      A massive reptile with powerful jaws and a heavy tail.
      It basks in the dungeon's warmth, waiting for prey to wander close.
  werewolf:
    name: "Werewolf"
    short: "a snarling werewolf"
    long: >-
      A cursed human trapped between wolf and man. Only silver or
      magic weapons can pierce its supernaturally tough hide.
  wererat:
    name: "Wererat"
    short: "a shifty wererat"
    long: >-
      A gaunt figure with twitching whiskers and beady eyes. It shifts
      between human and rat form, lurking in sewers and shadows.
  werebear:
    name: "Werebear"
    short: "a massive werebear"
    long: >-
      A towering lycanthrope with the strength of a bear. Unlike most
      shapeshifters, werebears are sometimes protectors of the wild.
  ochre_jelly:
    name: "Ochre Jelly"
    short: "a quivering ochre jelly"
    long: >-
      A shapeless mass of ochre slime that oozes along floors and walls.
      It splits into smaller copies when struck with slashing weapons.
  green_slime:
    name: "Green Slime"
    short: "a patch of green slime"
    long: >-
      A glistening green film clinging to the ceiling. It drops onto
      the unwary, dissolving armor and flesh with terrifying speed.
  black_pudding:
    name: "Black Pudding"
    short: "a black pudding"
    long: >-
      The largest and deadliest of oozes, a tarry mass of acid that
      dissolves metal weapons on contact and splits when struck.
  violet_fungus:
    name: "Violet Fungus"
    short: "a violet fungus"
    long: >-
      A mushroom-like growth with writhing tendrils tipped in necrotic
      rot. Its touch withers flesh on contact.
  yellow_mold:
    name: "Yellow Mold"
    short: "a patch of yellow mold"
    long: >-
      A fuzzy golden growth coating the walls. When disturbed it
      releases a cloud of deadly spores that choke the lungs.
  mycelian:
    name: "Mycelian"
    short: "a mycelian"
    long: >-
      An intelligent fungal creature that communicates through spore
      clouds. It tends its underground gardens with quiet purpose.
  carnivorous_flower:
    name: "Carnivorous Flower"
    short: "a carnivorous flower"
    long: >-
      A massive bloom with toothed petals that snap shut on prey.
      Sweet perfume masks the stench of digesting victims within.
  dung_worm:
    name: "Dung Worm"
    short: "a dung worm"
    long: >-
      A segmented worm that burrows through refuse and loose earth.
      Its acidic secretions dissolve organic matter with ease.
  animated_armor:
    name: "Animated Armor"
    short: "a suit of animated armor"
    long: >-
      An empty suit of plate mail that moves with eerie purpose.
      No mind dwells within — only magic animates its hollow shell.
  invisible_stalker:
    name: "Invisible Stalker"
    short: "a shimmer in the air"
    long: >-
      An air elemental bound to servitude, permanently invisible.
      Only the faintest distortion in the air betrays its presence.
  centaur:
    name: "Centaur"
    short: "a centaur"
    long: >-
      A noble creature with the torso of a human and the body of a
      horse. It charges with lance lowered at tremendous speed.
  dragon_lizard:
    name: "Dragon Lizard"
    short: "a dragon lizard"
    long: >-
      A large reptile with vestigial wings and a throat that glows
      with inner fire. It spews gouts of flame at anything that moves.
  geckonid:
    name: "Geckonid Lizard"
    short: "a geckonid lizard"
    long: >-
      A nimble lizard with adhesive pads on its feet that let it
      scurry across walls and ceilings with unnatural speed.
  cave_locust:
    name: "Giant Cave Locust"
    short: "a giant cave locust"
    long: >-
      An enormous insect with powerful hind legs that propel it in
      great leaps. It spits a foul brown liquid when threatened.
  insect_swarm:
    name: "Insect Swarm"
    short: "a buzzing insect swarm"
    long: >-
      A roiling cloud of biting, stinging insects. Individual blows
      do little — the swarm must be burned or fled from.
  mechanical_raven:
    name: "Mechanical Raven"
    short: "a mechanical raven"
    long: >-
      A clockwork bird of brass and silver gears. Its glass eyes
      record everything they see for its distant master.
  chaos_spawn:
    name: "Desori"
    short: "a writhing desori"
    long: >-
      A creature of pure entropy, its form constantly shifting between
      states. Reality warps and frays in its chaotic wake.
  fell_spirit:
    name: "Drapat"
    short: "a cackling drapat"
    long: >-
      A tiny imp-like creature with bat wings and a wicked grin.
      It delights in petty mischief and cruel pranks.
  gray_ooze:
    name: "Gray Ooze"
    short: "a gray ooze"
    long: >-
      A pool of viscous gray slime that resembles wet stone. Its
      acidic body dissolves metal on contact, ruining weapons and armor.
  merchant:
    name: "Merchant"
    short: "a travelling merchant"
    long: >-
      A weathered trader with a heavy pack and shrewd eyes. They
      brave the dungeon depths in search of profit and rare finds.
  innkeeper:
    name: "Innkeeper"
    short: "a friendly innkeeper"
    long: >-
      The keeper of this settlement's common room. They trade in
      warm bread, warmer beds, and the rumours that drift in with
      every caravan.
  priest:
    name: "Priest"
    short: "a robed priest"
    long: >-
      A serene cleric in white robes, tending the altar of a forgotten
      deity. They offer healing, blessings, and holy water to those
      who pay their tithe.
  animated_bones:
    name: "Animated Bones"
    short: "a pile of animated bones"
    long: >-
      A loose collection of bones held together by fading necromancy.
      They clatter and scrape as they drag themselves toward the living.
  adventurer:
    name: "Adventurer"
    short: "a fellow adventurer"
    long: >-
      A seasoned explorer seeking companions for the dungeon depths.
      They offer their sword arm — for the right price.

# ── Henchman UI strings ────────────────────────────────────────────────
death:
  prompt: "You have fallen. What now?"
  permadeath: "Accept your fate (permadeath)"
  cheat_death: "Cheat death (respawn at the last hub)"


encounter:
  prompt: "You run into {count} creature(s) in the {biome}. What do you do?"
  fight: "Fight"
  flee: "Flee"
  talk: "Talk"
  arena_cleared: "You've cleared the field. You head back to the overland."


rumor:
  true_feature: >-
    The innkeeper leans close and whispers: "Folks swear there's
    something at hex ({q}, {r}). Worth a look."
  false_lead: >-
    An old timer nurses his ale and mumbles: "Saw something queer
    out near ({q}, {r}), years ago." The tale feels thin.
  none: >-
    The innkeeper shrugs. "Nothing new today, traveller."
  come_back_later: >-
    The innkeeper wipes a mug. "I've told you everything I
    know. Come back in a few days -- the caravans should bring
    fresh news by then."


henchman:
  recruit_offer: >-
    {name} the adventurer offers to join your party
    for {cost} gold.
  recruited: "{name} joins your party!"
  no_gold: "You cannot afford to hire {name} ({cost} gold)."
  party_full: "You already have two henchmen in your party."
  dismissed: "You dismiss {name} from your party."
  levelup: >-
    {name} has reached level {level}! Pay {cost} gold to
    keep them in the party.
  levelup_paid: "{name} stays in the party (level {level})."
  levelup_left: >-
    {name} leaves the party — you could not pay
    the {cost} gold fee.
  died: "{name} has fallen!"
  call_for_help: "{name} cries out: \"I need healing!\""
  give_prompt: "Give item to which henchman?"
  give_item: "You give {item} to {name}."
  give_full: "{name}'s inventory is full."
  dismiss_prompt: "Dismiss which henchman?"
  welcome: "The adventurer greets you."
  buy: "Buy"
  sell: "Sell"
  hire: "Hire ({cost}g)"
  bought: "Bought {item} from {name} for {price} gold."
  sold: "Sold {item} to {name} for {price} gold."
  cannot_afford_buy: "Not enough gold! ({price} gold needed)"
  hench_cannot_afford: "{name} cannot afford that."
  nothing_to_buy: "{name} has nothing to sell."
  dismiss_to_hire: "Dismiss a henchman to make room:"

# ── Item descriptions ─────────────────────────────────────────────────
items:
  sword:
    name: "Sword"
    short: "a steel sword"
    long: >-
      A well-balanced blade of tempered steel, worn but sharp.
  dagger:
    name: "Dagger"
    short: "a sharp dagger"
    long: >-
      A short blade with a leather-wrapped grip.
      Quick to draw, quick to cut.
  short_sword:
    name: "Short Sword"
    short: "a short sword"
    long: >-
      A compact blade favored by skirmishers.
      Well-suited for close quarters.
  potion_healing:
    name: "Healing Potion"
    short: "a crimson potion"
    long: >-
      A small glass vial filled with a glowing red liquid.
      It smells faintly of iron and herbs.
  potion_strength:
    name: "Potion of Strength"
    short: "a fiery red potion"
    long: >-
      A thick red liquid that surges with inner power.
      Permanently increases your strength.
  potion_frost:
    name: "Potion of Frost"
    short: "an ice-blue potion"
    long: >-
      Frozen crystals swirl inside this vial. When consumed,
      it sends a wave of freezing cold outward.
  potion_invisibility:
    name: "Potion of Invisibility"
    short: "a transparent potion"
    long: >-
      Nearly impossible to see — the liquid is perfectly clear.
      Drinking it renders you invisible for a time.
  potion_levitation:
    name: "Potion of Levitation"
    short: "a light white potion"
    long: >-
      Weightless bubbles float within this vial. Drinking it
      lets you drift above the ground, avoiding traps.
  potion_liquid_flame:
    name: "Potion of Liquid Flame"
    short: "a volatile orange potion"
    long: >-
      Warm to the touch. The liquid roils with contained fire.
      Drinking it unleashes flames on all nearby.
  potion_mind_vision:
    name: "Potion of Mind Vision"
    short: "a swirling purple potion"
    long: >-
      Purple wisps dance within the vial. Drinking it attunes
      your senses to detect living creatures through walls.
  potion_paralytic_gas:
    name: "Potion of Paralytic Gas"
    short: "a yellow potion"
    long: >-
      Thick yellow fumes press against the stopper. Drinking it
      releases a numbing gas that paralyzes nearby foes.
  potion_purification:
    name: "Potion of Purification"
    short: "a bright green potion"
    long: >-
      Glowing with inner clarity. Drinking it cleanses all
      poison and harmful effects from your body.
  potion_speed:
    name: "Potion of Speed"
    short: "a quicksilver potion"
    long: >-
      The liquid inside darts restlessly from side to side.
      Drinking it grants supernatural swiftness for a time.
  potion_confusion:
    name: "Potion of Confusion"
    short: "an iridescent potion"
    long: >-
      The colors in this vial shift unpredictably. Drinking it
      muddles the mind — best thrown at an enemy instead.
  potion_blindness:
    name: "Potion of Blindness"
    short: "an inky potion"
    long: >-
      A vial of impenetrable darkness. Drinking it robs you
      of sight — far more useful as a thrown weapon.
  potion_acid:
    name: "Potion of Acid"
    short: "a hissing potion"
    long: >-
      The stopper fizzes where it meets the glass. Highly
      corrosive when thrown. Drinking it burns, but cures
      petrification.
  potion_sickness:
    name: "Potion of Sickness"
    short: "a foul-smelling potion"
    long: >-
      A nauseating stench seeps through the stopper. This vile
      brew damages and poisons whoever drinks it or is hit by it.
