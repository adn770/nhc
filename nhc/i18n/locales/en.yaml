# NHC English locale — authoritative string catalog
# Keys use dotted notation: section.subsection.key
# Use {name} for interpolation placeholders

# ── Combat ────────────────────────────────────────────────────────────
combat:
  hit: "{attacker} hits {target} for {damage} damage."
  miss: "{attacker} misses {target}."
  slain: "{target} is slain!"
  destroyed: "{target} is destroyed!"
  drops: "{target} drops: {items}."
  corpse: "{name} corpse"
  unarmed: "unarmed"
  # Player attacks
  you_hit: "You hit {target} for {damage} damage."
  you_miss: "You miss {target}."
  you_slain: "You slay {target}!"
  you_destroyed: "You destroy {target}!"
  # Player is attacked
  hit_you: "{attacker} hits you for {damage} damage."
  miss_you: "{attacker} misses you."
  slain_you: "You have been slain!"
  destroyed_you: "You have been destroyed!"
  drained: "{attacker} drains the life from {target}! Max HP reduced."
  poisoned: "{target} is poisoned!"
  poison_tick: "{target} writhes in agony from the poison! {damage} damage."
  petrified: "{target} meets the basilisk's gaze and turns to stone!"
  petrify_saved: "{target} averts their eyes just in time."
  paralyzed_turn: "You are paralyzed and cannot move!"
  sleeping_turn: "You sleep helplessly..."
  miss_invisible: "{target} is invisible — your strike finds only air!"
  mirror_absorbed: "Your blow strikes an image of {target} — it shatters! ({remaining} remain)"
  blood_drain: "{attacker} latches on and drains the blood of {target}! ({damage} drain)"
  petrify_touch: "{target} feels stone-cold dread seep through their body — paralyzed!"
  frost_breath: "{attacker} exhales a blast of arctic cold at {target} for {damage} damage!"
  disenchant: "{attacker} drains the magic from {target}'s {item}! It crumbles to dust."
  shrieker_shriek: "The {creature} emits a piercing shriek!"
  shriek_wakes: "{creature} is jolted awake by the terrible noise!"
  regenerates: "{creature} regenerates flesh before your eyes!"
  rot_drain: "{target} feels mummy rot weaken their body! Max HP reduced."
  charm_touch: "{target} falls under a magical enchantment!"
  mummy_rot: "{target} feels the dread of mummy rot take hold!"
  magic_weapon_needed: "Your weapon glances off {target} — only magic can harm it!"
  banshee_wail: "{creature} releases a soul-shredding wail!"
  banshee_kills: "{target} succumbs to the banshee's wail!"
  banshee_saved: "{target} resists the banshee's wail!"

# ── Movement & Exploration ────────────────────────────────────────────
explore:
  open_door: "{actor} opens a door."
  you_open_door: "You open a door."
  see_item: "You see {item} here."
  see_items: "You see {count} items here: {items}."
  see_feature: "You see {feature} here."
  see_creature: "You see {creature}{status}."
  nothing_special: "Nothing special here."
  spot_creature: "You spot {creature}!"
  descend: "You descend deeper into the dungeon..."

# ── Health status descriptions ────────────────────────────────────────
health_status:
  uninjured: " (uninjured)"
  lightly_wounded: " (lightly wounded)"
  badly_wounded: " (badly wounded)"
  near_death: " (near death)"

# ── Feature names ─────────────────────────────────────────────────────
feature:
  stairs_up: "stairs leading up"
  stairs_down: "stairs leading down"
  door_open: "an open door"
  door_closed: "a closed door"

# ── Items & Inventory ─────────────────────────────────────────────────
item:
  picked_up: "Picked up {item}."
  equipped: "Equipped {item}."
  full_inventory: "Inventory is full!"
  nothing_to_pickup: "Nothing to pick up here."
  full_health: "Already at full health."
  quaff_heal: "Quaff {item}. Healed {amount} HP."
  nothing_happens: "Nothing happens."
  no_target: "No target in sight!"
  lightning_strike: "Lightning from {item} strikes {target} for {damage} damage!"
  sleep_cast: "The scroll crumbles to dust..."
  sleep_affects: "{target} falls into a magical slumber!"
  sleep_none: "No creatures fall asleep."
  missile_hits: "A bolt of force strikes {target} for {damage} damage!"
  hold_cast: "Words of power echo through the dungeon..."
  hold_affects: "{target} freezes in place!"
  hold_no_humanoids: "No humanoids are in sight."
  fireball_cast: "A roaring ball of fire explodes!"
  fireball_hits: "{target} is scorched for {damage} damage!"
  web_cast: "Sticky webs burst from the scroll!"
  web_caught: "{target} is caught in the webs!"
  charm_cast: "Words of glamour wash over your foes..."
  charm_affects: "{target} looks at you with adoring eyes."
  charm_no_target: "No creatures are close enough to charm."
  bless_cast: "A warm radiance flows through you."
  bless_active: "You feel blessed and fight with greater resolve!"
  invis_cast: "You dissolve into the shadows."
  invis_active: "You are invisible!"
  haste_cast: "The world seems to slow as you speed up."
  haste_active: "You move with blinding speed!"
  protect_cast: "A ward of holy power settles over you."
  protect_active: "Evil creatures struggle to harm you!"
  mirror_cast: "Flickering copies of you appear!"
  mirror_images: "{count} mirror images surround you."
  detect_magic_cast: "Arcane sight floods your vision!"
  detect_magic_reveal: "You sense {count} magical items on this level."
  detect_magic_none: "You sense no magic on this level."
  detect_evil_cast: "Your senses extend beyond walls..."
  detect_evil_reveal: "You sense {count} hostile presences nearby."
  detect_evil_none: "You sense no evil nearby."
  detect_invis_cast: "Your eyes pierce the veil of invisibility!"
  detect_invis_active: "You can see invisible creatures!"
  find_traps_cast: "Hidden dangers reveal themselves!"
  find_traps_reveal: "You spot {count} hidden traps."
  find_traps_none: "No hidden traps on this level."
  light_cast: "Brilliant light erupts from the scroll!"
  light_active: "Everything around you is bathed in light!"
  remove_fear_cast: "Courage surges through your veins!"
  remove_fear_active: "Your mind is clear of all fear."
  shield_cast: "A shimmering barrier springs into existence!"
  shield_active: "A magical shield protects you!"
  resist_cold_cast: "A warm aura wraps around you."
  resist_cold_active: "You are resistant to cold!"
  resist_fire_cast: "A cool shimmer coats your skin."
  resist_fire_active: "You are resistant to fire!"
  levitate_cast: "Your feet lift from the ground!"
  levitate_active: "You float above the floor!"
  fly_cast: "Wings of magic carry you aloft!"
  fly_active: "You soar through the air freely!"
  dispel_cast: "A wave of nullifying energy pulses outward!"
  dispel_affects: "Magical effects are stripped from {target}!"
  dispel_none: "There is nothing to dispel."
  prot_missiles_cast: "A deflecting ward surrounds you."
  prot_missiles_active: "Ranged attacks are deflected away from you!"
  silence_cast: "A sphere of silence expands from the scroll..."
  silence_affects: "{target} is engulfed in magical silence!"
  phantasmal_cast: "Terrifying illusions assail your enemies!"
  phantasmal_affects: "{target} is confused by phantasmal horrors!"
  clairvoyance_cast: "Your mind's eye opens wide..."
  clairvoyance_reveal: "The surrounding area is revealed to you!"
  infravision_cast: "Your eyes adjust to see beyond visible light."
  infravision_active: "You see heat signatures in the darkness!"
  continual_light_cast: "A permanent orb of light blazes into existence!"
  water_breathing_cast: "Your lungs adapt to breathe water."
  water_breathing_active: "You can breathe underwater!"
  charm_snakes_cast: "A hypnotic melody fills the air..."
  charm_snakes_affects: "{target} sways peacefully to the music."
  charm_snakes_none: "No serpents are nearby."

# ── Traps ─────────────────────────────────────────────────────────────
trap:
  avoided: "{entity} notices {trap} and avoids it!"
  you_avoided: "You notice {trap} and avoid it!"
  triggered: "{entity} falls into {trap}! {damage} damage!"
  you_triggered: "You fall into {trap}! {damage} damage!"

