  you_paralysis: "Paralyzing gas engulfs you! You can't move!"
  gripping: "{entity} is caught in iron jaws!"
  you_gripping: "Iron jaws clamp your legs! You can't move!"
  fire: "{entity} is scorched by flames!"
  you_fire: "Flames erupt beneath you!"
  alarm: "A piercing shriek echoes through the dungeon!"
  teleport: "{entity} vanishes in a flash of light!"
  you_teleport: "The world spins — you are somewhere else!"
  summoning: "Creatures materialize from thin air!"
  arrow: "{entity} is struck by a crossbow bolt!"
  you_arrow: "A crossbow bolt shoots from the wall!"
  darts: "{entity} is peppered by darts!"
  you_darts: "Three darts shoot from the wall!"
  falling_stone: "A heavy stone crashes down on {entity}!"
  you_falling_stone: "A heavy stone crashes down from the ceiling!"
  spores: "{entity} inhales a cloud of hallucinogenic spores!"
  you_spores: "A cloud of spores bursts — everything looks strange!"
  trapdoor: "The floor gives way beneath {entity}!"
  you_trapdoor: "The floor gives way — you plummet into darkness!"

# ── Level atmosphere ──────────────────────────────────────────────────
atmosphere:
  dungeon:
    "1": "The air is thick with the smell of damp stone and old iron."
    "2": "Torchlight flickers against walls slick with moisture."
    "3": "Distant echoes suggest these halls are not entirely empty."
    "4": "Cobwebs cling to every corner, undisturbed for ages."
    "5": "The ceiling drips steadily, each drop a tiny heartbeat in the dark."
    "6": "Rusted chains hang from the walls, remnants of forgotten prisoners."
    "7": "A cold draught curls around your ankles like invisible fingers."
    "8": "The flagstones are worn smooth by countless feet — or claws."
    "9": "Somewhere ahead, metal scrapes against stone."
    "10": "Faded carvings on the walls hint at warnings long ignored."
    "11": "The silence here is oppressive, broken only by your own breathing."
    "12": "A faint odour of decay drifts from deeper within."
  crypt:
    "1": "The stale air carries the sweetness of embalming herbs."
    "2": "Niches in the walls hold the crumbling remains of the interred."
    "3": "Candle stubs gutter in alcoves, as if someone lit them recently."
    "4": "Dust motes drift through the gloom like tiny lost souls."
    "5": "The stone sarcophagi are carved with faces worn featureless by time."
    "6": "A low moan rises and falls — the wind, perhaps, or something else."
    "7": "Tattered funeral banners hang from the vaulted ceiling."
    "8": "The floor is gritty with bone dust that crunches underfoot."
    "9": "Cold seeps from the walls as if the dead themselves breathe it."
    "10": "Epitaphs in forgotten scripts line every surface."
    "11": "An altar at the far end still bears dark stains."
    "12": "The silence here has weight, pressing down on your shoulders."
  cave:
    "1": "Water drips from stalactites into unseen pools below."
    "2": "The cave walls glisten with mineral deposits in the torchlight."
    "3": "A damp breeze carries the earthy scent of deep stone."
    "4": "Bioluminescent fungi cast a faint blue-green glow on the walls."
    "5": "The passage narrows, the rock pressing close on every side."
    "6": "Somewhere in the darkness, something splashes in still water."
    "7": "Crystals embedded in the rock catch the light and scatter it."
    "8": "The air is cooler here, heavy with the smell of wet clay."
    "9": "Bat droppings crunch underfoot — you are not the first visitor."
    "10": "The cave opens into a vast chamber, its ceiling lost in shadow."
    "11": "Strange echoes make it impossible to tell direction or distance."
    "12": "A thin mist clings to the ground, swirling around your feet."
  castle:
    "1": "Grand tapestries hang in tatters, their colours faded to ghosts."
    "2": "The marble floors are cracked but still gleam faintly."
    "3": "Suits of armour stand as silent sentinels along the corridor."
    "4": "A chandelier lies shattered on the floor, its crystals scattered."
    "5": "The remains of a feast rot on a long banquet table."
    "6": "Tall windows let in pale light through broken stained glass."
    "7": "A throne sits empty at the far end, draped in cobwebs."
    "8": "Heraldic shields line the walls, their sigils meaningless now."
    "9": "The carpet is threadbare but still muffles your steps."
    "10": "A grandfather clock in the corner has stopped at midnight."
    "11": "Portraits on the walls seem to follow you with painted eyes."
    "12": "The air smells of old wood polish and slow decay."
  abyss:
    "1": "The darkness here is absolute — your light barely holds it back."
    "2": "Reality feels thin, as if the world could tear apart at a touch."
    "3": "Whispers slither at the edge of hearing, speaking no known tongue."
    "4": "The stone pulses with a faint, irregular warmth."
    "5": "Gravity feels wrong here, pulling in subtle, shifting directions."
    "6": "The air tastes of ozone and something older, something wrong."
    "7": "Shapes move in the periphery of your vision, gone when you look."
    "8": "The walls are smooth and black, like polished obsidian."
    "9": "A low vibration hums through the floor, felt more than heard."
    "10": "Stars seem to glimmer inside the rock itself."
    "11": "Your shadow behaves strangely, lagging behind your movements."
    "12": "The silence here is not empty — it is waiting."

