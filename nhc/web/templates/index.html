<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NHC — Nethack-like Crawler</title>
  <link rel="stylesheet" href="/static/css/nhc.css?v={{ v }}">
</head>
<body>
  <!-- Login / Game creation screen -->
  <div id="login-screen">
    <h1>NHC</h1>
    <p>Nethack-like Crawler</p>
    {% if player_name %}
    <p id="welcome-msg">Welcome back, {{ player_name }}{% if god_mode %} <span style="color:#e6c07b">[God Mode]</span>{% endif %}</p>
    {% endif %}
    <div class="login-form">
      <label for="lang-select">Language:</label>
      <select id="lang-select">
        <option value="en"{{ ' selected' if player_lang == 'en' or not player_lang }}>English</option>
        <option value="es"{{ ' selected' if player_lang == 'es' }}>Español</option>
        <option value="ca"{{ ' selected' if player_lang == 'ca' }}>Català</option>
      </select>
      <label for="tileset-select">Tileset:</label>
      <select id="tileset-select">
        <option value="classic" selected>Classic</option>
      </select>
      <label for="world-select">World:</label>
      <select id="world-select">
        <option value="dungeon" selected>Classic Dungeon</option>
        <option value="hex-easy">Hexcrawl — Easy</option>
        <option value="hex-survival">Hexcrawl — Survival</option>
      </select>
      <label class="tts-check-label">
        <input type="checkbox" id="tts-check">
        Text to Speech
      </label>
      <button id="continue-btn" class="hidden">Continue</button>
      <button id="new-game-btn">New Game</button>
      <button id="ranking-btn">{{ (welcome_labels or {}).get('ranking_button', 'Ranking') }}</button>
    </div>
    <div id="session-list"></div>
  </div>

  <script>
    window.NHC_WELCOME_LABELS = {{ (welcome_labels or {}) | tojson }};
  </script>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loading-text">Generating dungeon...</p>
    </div>
  </div>

  <!-- Game screen (hidden until game starts) -->
  <div id="game-screen" class="hidden">
    <!-- Zone 1: Map -->
    <div id="map-zone">
      <div id="map-container">
        <div id="floor-svg"></div>
        <canvas id="door-canvas"></canvas>
        <canvas id="hatch-canvas"></canvas>
        <canvas id="fog-canvas"></canvas>
        <canvas id="entity-canvas"></canvas>
        <canvas id="debug-canvas"></canvas>
      </div>
      <!-- Hex overland canvas stack, shown in hex-easy /
           hex-survival mode. Z-order: base → fog → features →
           entities → debug. -->
      <div id="hex-container" class="hidden">
        <canvas id="hex-base-canvas"></canvas>
        <canvas id="hex-fog-canvas"></canvas>
        <canvas id="hex-feature-canvas"></canvas>
        <canvas id="hex-entity-canvas"></canvas>
        <canvas id="hex-debug-canvas"></canvas>
      </div>
      <!-- HUD layer for DOM-backed overlays (the six direction
           arrow buttons live here). Topmost; never touched by
           canvas renders so it never flickers. -->
      <div id="hex-hud" class="hidden"></div>
    </div>

    <!-- Toolbar: clickable action icons -->
    <div id="toolbar-zone"></div>

    <!-- Zone 2: Status bar (3 lines like terminal) -->
    <div id="status-zone">
      <div id="status-lines">
        <div id="status-line1"></div>
        <div id="status-line2"></div>
        <div id="status-line3"></div>
      </div>
      <div id="help-btn" title="Help (?)">&quest;</div>
    </div>

    <!-- Zone 3: History / Narrative log -->
    <div id="history-zone">
      <div id="history-log"></div>
    </div>

    <!-- Zone 4: Input -->
    <div id="input-zone">
      <span id="mode-label" class="mode-label">[classic]</span>
      <span class="prompt">&gt;</span>
      <input type="text" id="game-input" placeholder="Type a command..."
             autocomplete="off" spellcheck="false">
    </div>
  </div>

  <script>window.NHC_GOD_MODE = {{ god_mode | tojson }};</script>
  <script>
  // Console ring buffer — captures log/warn/error for debug bundles.
  (function() {
    const MAX = 500;
    const buf = [];
    window._consoleBuf = buf;
    const ts = () => new Date().toISOString().slice(11, 23);
    ["log", "warn", "error"].forEach(level => {
      const orig = console[level].bind(console);
      console[level] = function() {
        if (buf.length >= MAX) buf.shift();
        buf.push(ts() + " [" + level + "] " +
          Array.from(arguments).map(a =>
            typeof a === "object" ? JSON.stringify(a) : String(a)
          ).join(" "));
        orig.apply(console, arguments);
      };
    });
  })();
  </script>
  <script src="/static/js/ws.js?v={{ v }}"></script>
  <script src="/static/js/map.js?v={{ v }}"></script>
  <script src="/static/js/hex_map.js?v={{ v }}"></script>
  <script src="/static/js/ui.js?v={{ v }}"></script>
  <script src="/static/js/input.js?v={{ v }}"></script>
  <script src="/static/js/tts.js?v={{ v }}"></script>
  <script src="/static/js/debug.js?v={{ v }}"></script>
  <script src="/static/js/nhc.js?v={{ v }}"></script>
</body>
</html>
