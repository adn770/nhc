<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NHC Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e; color: #e0e0e0;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 14px; padding: 24px; max-width: 900px; margin: 0 auto;
    }
    h1 { color: #e6c07b; margin-bottom: 8px; }
    h2 { color: #98c379; margin: 24px 0 12px; font-size: 16px; }
    table {
      width: 100%; border-collapse: collapse; margin-bottom: 16px;
    }
    th, td {
      padding: 6px 10px; text-align: left;
      border-bottom: 1px solid #2a2a4a;
    }
    th { color: #e6c07b; font-size: 12px; text-transform: uppercase; }
    tr:hover { background: #2a2a4a; }
    button {
      background: #3a3a5a; color: #e0e0e0; border: 1px solid #4a4a6a;
      padding: 6px 14px; cursor: pointer; font-family: inherit;
      font-size: 13px; border-radius: 3px;
    }
    button:hover { background: #4a4a6a; }
    button.danger { border-color: #e06c75; color: #e06c75; }
    button.danger:hover { background: #e06c75; color: #1a1a2e; }
    input[type="text"] {
      background: #2a2a4a; color: #e0e0e0; border: 1px solid #4a4a6a;
      padding: 6px 10px; font-family: inherit; font-size: 13px;
      border-radius: 3px; width: 200px;
    }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .link-box {
      background: #2a2a4a; padding: 10px 14px; margin: 10px 0;
      border-radius: 4px; word-break: break-all; display: none;
    }
    .link-box a { color: #61afef; text-decoration: none; }
    .link-box a:hover { text-decoration: underline; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 11px; font-weight: bold;
    }
    .badge.online { background: #2d4a2d; color: #98c379; }
    .badge.offline { background: #3a3a3a; color: #888; }
    .badge.revoked { background: #4a2020; color: #e06c75; }
    .status-bar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
    }
    .status-bar span { color: #888; font-size: 12px; }
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #98c379; color: #1a1a2e; padding: 8px 16px;
      border-radius: 4px; font-size: 13px; display: none;
    }
  </style>
</head>
<body>
  <h1>NHC Admin</h1>

  <div class="status-bar">
    <span id="status-text">Loading...</span>
    <button onclick="refresh()">Refresh</button>
  </div>

  <h2>Register Player</h2>
  <div class="form-row">
    <input type="text" id="player-name" placeholder="Player name">
    <button onclick="registerPlayer()">Register</button>
  </div>
  <div class="link-box" id="new-link-box">
    Player link: <a id="new-link" href="#" target="_blank"></a>
    <button onclick="copyLink()" style="margin-left:8px">Copy</button>
  </div>

  <h2>Players</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th><th>Player ID</th><th>Status</th>
        <th>Save</th><th>Created</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="players-body"></tbody>
  </table>

  <h2>Active Sessions</h2>
  <table>
    <thead>
      <tr>
        <th>Session</th><th>Player</th><th>Lang</th>
        <th>Connected</th><th>Created</th>
      </tr>
    </thead>
    <tbody id="sessions-body"></tbody>
  </table>

  <div id="toast"></div>

<script>
const BASE = location.origin;
let lastToken = "";

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 2500);
}

function fmtDate(ts) {
  if (!ts) return "—";
  return new Date(ts * 1000).toLocaleString();
}

async function loadPlayers() {
  const resp = await fetch("/api/admin/players");
  if (!resp.ok) return;
  const players = await resp.json();
  const tbody = document.getElementById("players-body");
  tbody.innerHTML = "";
  for (const p of players) {
    const tr = document.createElement("tr");
    let status, badge;
    if (p.revoked) {
      badge = "revoked"; status = "Revoked";
    } else if (p.online) {
      badge = "online"; status = "Online";
    } else {
      badge = "offline"; status = "Offline";
    }
    const actions = p.revoked
      ? '<span style="color:#888">revoked</span>'
      : `<button onclick="getLink('${p.player_id}')">Get Link</button> `
        + `<button class="danger" onclick="revokePlayer('${p.player_id}')">Revoke</button>`;
    tr.innerHTML = `
      <td>${esc(p.name)}</td>
      <td><code>${p.player_id}</code></td>
      <td><span class="badge ${badge}">${status}</span></td>
      <td>${p.has_save ? "Yes" : "—"}</td>
      <td>${fmtDate(p.created_at)}</td>
      <td>${actions}</td>
    `;
    tbody.appendChild(tr);
  }
}

async function loadSessions() {
  const resp = await fetch("/api/admin/sessions");
  if (!resp.ok) return;
  const sessions = await resp.json();
  const tbody = document.getElementById("sessions-body");
  tbody.innerHTML = "";
  for (const s of sessions) {
    const tr = document.createElement("tr");
    const badge = s.connected
      ? '<span class="badge online">Yes</span>'
      : '<span class="badge offline">No</span>';
    tr.innerHTML = `
      <td><code>${s.session_id.substring(0, 12)}...</code></td>
      <td><code>${s.player_id || "anon"}</code></td>
      <td>${s.lang}</td>
      <td>${badge}</td>
      <td>${fmtDate(s.created_at)}</td>
    `;
    tbody.appendChild(tr);
  }
  document.getElementById("status-text").textContent =
    `${sessions.length} active session(s) — ` +
    new Date().toLocaleTimeString();
}

async function registerPlayer() {
  const name = document.getElementById("player-name").value.trim();
  if (!name) { toast("Enter a player name"); return; }
  const resp = await fetch("/api/admin/players", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({name}),
  });
  if (!resp.ok) {
    const err = await resp.json();
    toast(err.error || "Registration failed");
    return;
  }
  const data = await resp.json();
  lastToken = data.token;
  const link = `${BASE}/?token=${data.token}`;
  const box = document.getElementById("new-link-box");
  const a = document.getElementById("new-link");
  a.href = link;
  a.textContent = link;
  box.style.display = "block";
  document.getElementById("player-name").value = "";
  toast(`Registered ${data.name}`);
  loadPlayers();
}

async function getLink(pid) {
  const resp = await fetch(`/api/admin/players/${pid}/regenerate`, {
    method: "POST",
  });
  if (!resp.ok) {
    const err = await resp.json();
    toast(err.error || "Failed to generate link");
    return;
  }
  const data = await resp.json();
  lastToken = data.token;
  const link = `${BASE}/?token=${data.token}`;
  const box = document.getElementById("new-link-box");
  const a = document.getElementById("new-link");
  a.href = link;
  a.textContent = link;
  box.style.display = "block";
  toast("New link generated (old link invalidated)");
}

async function revokePlayer(pid) {
  if (!confirm("Revoke this player's access?")) return;
  const resp = await fetch(`/api/admin/players/${pid}`, {
    method: "DELETE",
  });
  if (resp.ok) {
    toast("Player revoked");
    loadPlayers();
  }
}

function copyLink() {
  const a = document.getElementById("new-link");
  const text = a.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => toast("Copied!"));
  } else {
    // Fallback for HTTP (non-secure context)
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    toast("Copied!");
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function refresh() {
  await Promise.all([loadPlayers(), loadSessions()]);
}

// Init
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
