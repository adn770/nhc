id: test_level
name: "The Sunken Cellar"
depth: 1
width: 40
height: 15
theme: crypt
difficulty: 1
ambient: "Damp air clings to the stone. Something drips in the darkness."
faction: undead

narrative_hooks:
  - "Claw marks on the walls suggest something escaped from below."
  - "A faded sigil on the floor hums faintly when you step near it."

# Legend:
#   Box-drawing chars (Рћђ Рћѓ Рћї Рћљ Рћћ Рћў Рћю Рћц Рћг Рћ┤ Рћ╝) = wall
#   '#' = corridor (walkable tunnel, rendered as #)
#   '.' = floor
#   '+' = closed door
#   '<' = stairs up (entrance)
#   '>' = stairs down (exit)
#   '~' = water
#   ' ' = void (not walkable)
map: |
  РћїРћђРћђРћђРћђРћђРћђРћљ            РћїРћђРћђРћђРћђРћђРћђРћђРћђРћгРћђРћђРћђРћђРћђРћђРћђРћђРћђРћљ
  Рћѓ......Рћѓ            Рћѓ........Рћѓ.........Рћѓ
  Рћѓ......Рћѓ            Рћѓ........Рћѓ.........Рћѓ
  Рћѓ.<....+############+........+.........Рћѓ
  Рћѓ......Рћѓ            Рћѓ........Рћѓ.....>...Рћѓ
  Рћѓ......Рћѓ            Рћѓ........Рћѓ.........Рћѓ
  РћћРћђРћђРћђРћђРћђРћђРћў            РћћРћђРћђРћђ+РћђРћђРћђРћђРћц.........Рћѓ
                          #    РћћРћђРћђРћђРћђ+РћђРћђРћђРћђРћў
                      РћїРћђРћђРћђ+РћђРћђРћђРћљ     #
                      Рћѓ.......Рћѓ РћїРћђРћђРћђ+РћђРћђРћђРћђРћљ
                      Рћѓ.......Рћѓ Рћѓ........Рћѓ
                      Рћѓ..~~~..+#+........Рћѓ
                      Рћѓ..~~~..Рћѓ Рћѓ........Рћѓ
                      Рћѓ.......Рћѓ Рћѓ........Рћѓ
                      РћћРћђРћђРћђРћђРћђРћђРћђРћў РћћРћђРћђРћђРћђРћђРћђРћђРћђРћў

legend:
  'Рћђ': wall
  'Рћѓ': wall
  'Рћї': wall
  'Рћљ': wall
  'Рћћ': wall
  'Рћў': wall
  'Рћю': wall
  'Рћц': wall
  'Рћг': wall
  'Рћ┤': wall
  'Рћ╝': wall
  '#': corridor
  '.': floor
  '+': door_closed
  '<': stairs_up
  '>': stairs_down
  '~': water
  ' ': void

rooms:
  - id: entry
    x: 1
    y: 1
    width: 6
    height: 5
    tags: [entry, safe]
    description: >
      A small antechamber with crumbling mortar.
      Broken crates line the walls.
    connections: [corridor_main]

  - id: guard_room
    x: 21
    y: 1
    width: 8
    height: 5
    tags: [combat]
    description: >
      An old guard post. A broken weapon rack
      stands against the north wall.
    connections: [corridor_main, exit_chamber, corridor_cistern]

  - id: exit_chamber
    x: 30
    y: 1
    width: 9
    height: 6
    tags: [exit, treasure]
    description: >
      A large chamber with a vaulted ceiling.
      Stairs descend into deeper darkness.
    connections: [guard_room, corridor_armory]

  - id: cistern
    x: 21
    y: 9
    width: 7
    height: 5
    tags: [water, puzzle]
    description: >
      A flooded cistern. Dark water fills the
      center of the room. Something glints below.
    connections: [corridor_cistern, corridor_cistern_armory]

  - id: armory
    x: 31
    y: 10
    width: 8
    height: 4
    tags: [treasure, hidden]
    description: >
      A forgotten armory. Rusted weapons hang
      from pegs, but one gleams differently.
    connections: [corridor_armory, corridor_cistern_armory]

corridors:
  - id: corridor_main
    points: [[8, 3], [19, 3]]
    connects: [entry, guard_room]

  - id: corridor_cistern
    points: [[24, 7]]
    connects: [guard_room, cistern]

  - id: corridor_armory
    points: [[34, 8]]
    connects: [exit_chamber, armory]

  - id: corridor_cistern_armory
    points: [[29, 11]]
    connects: [cistern, armory]

entities:
  # Creatures
  - type: creature
    id: skeleton
    position: {x: 24, y: 2}

  - type: creature
    id: skeleton
    position: {x: 26, y: 4}

  - type: creature
    id: goblin
    position: {x: 22, y: 10}

  # Items
  - type: item
    id: healing_potion
    position: {x: 3, y: 2}

  - type: item
    id: sword
    position: {x: 35, y: 12}

  # Features
  - type: feature
    id: trap_pit
    position: {x: 14, y: 3}
    extra:
      hidden: true
      dc: 12

player_start:
  x: 2
  y: 3
